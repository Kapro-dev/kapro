---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clustertemplates.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: ClusterTemplate
    listKind: ClusterTemplateList
    plural: clustertemplates
    shortNames:
    - ct
    singular: clustertemplate
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.sourceKind
      name: Source
      type: string
    - jsonPath: .status.discoveredClusters
      name: Discovered
      type: integer
    - jsonPath: .status.importedClusters
      name: Imported
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.lastSyncTime
      name: LastSync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          ClusterTemplate is the universal fleet auto-import CRD. One template
          per cohort: one Fleet/Account/Subscription/ManagedClusterSet × one
          delivery shape. Imported Cluster objects carry ownerRef + managed-by label.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterTemplateSpec defines the desired state of a fleet-template.
            properties:
              interval:
                default: 5m
                description: |-
                  Interval is how often the source is polled. Go duration format
                  ("5m", "1h"). Sources that use CRD watches (RHACM, CAPI) treat this
                  as a resync floor.
                type: string
              prune:
                description: |-
                  Prune deletes imported Cluster objects whose source entry has
                  disappeared. Default false (conservative) — operator opts into the
                  spec §3.5 "full lifecycle" intent. Deletion runs the Cluster
                  finalizer so per-cluster RBAC is cleaned up.
                type: boolean
              selector:
                description: |-
                  Selector filters the discovered cluster set by labels reported by the
                  source. Empty selector imports everything the source returns.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              source:
                description: |-
                  Source selects exactly one discovery branch. Mis-set combinations
                  (none or multiple) are rejected at admission time.
                properties:
                  aws:
                    description: |-
                      AWS discovers EKS clusters in an account/region.
                      Imported clusters get spec.provider.kind=eks.
                      Preview stub; surfaced as a Stalled condition when set.
                    properties:
                      accountID:
                        description: |-
                          AccountID optionally narrows discovery to one AWS account. When empty,
                          the hub identity's default account is used.
                        type: string
                      region:
                        description: Region is the AWS region to enumerate EKS clusters
                          in.
                        minLength: 1
                        type: string
                    required:
                    - region
                    type: object
                  azure:
                    description: |-
                      Azure discovers AKS / Azure Arc-connected clusters in a subscription.
                      Imported clusters get spec.provider.kind=aks-arc.
                      Preview stub.
                    properties:
                      resourceGroup:
                        description: ResourceGroup optionally narrows discovery to
                          one resource group.
                        type: string
                      subscriptionID:
                        description: SubscriptionID is the Azure subscription to enumerate
                          clusters in.
                        minLength: 1
                        type: string
                    required:
                    - subscriptionID
                    type: object
                  capi:
                    description: |-
                      CAPI watches cluster.x-k8s.io Cluster CRs on the management cluster
                      and pairs each with its kubeconfig Secret. Imported clusters get
                      spec.provider.kind=capi. Preview stub.
                    properties:
                      namespace:
                        description: |-
                          Namespace is the namespace to watch CAPI Cluster CRs in. Empty means
                          all namespaces.
                        type: string
                    type: object
                  gcp:
                    description: |-
                      GCP discovers memberships from GKE Fleet (Hub) API in a project.
                      Imported clusters get spec.provider.kind=gcp-fleet (Connect Gateway).
                    properties:
                      project:
                        description: Project is the GCP project whose Fleet memberships
                          are imported.
                        minLength: 1
                        type: string
                    required:
                    - project
                    type: object
                  rhacm:
                    description: |-
                      RHACM watches open-cluster-management.io ManagedCluster CRs on the
                      local hub. Imported clusters get spec.provider.kind=rhacm.
                      Preview stub.
                    properties:
                      namespace:
                        description: |-
                          Namespace is the namespace to watch ManagedCluster CRs in. When
                          empty, the cluster-scoped ManagedCluster API is used (default RHACM
                          deployment).
                        type: string
                    type: object
                  static:
                    description: |-
                      Static is an operator-supplied list with kubeconfig Secret references
                      for on-prem / bare-metal clusters with no Fleet API. Imported
                      clusters get spec.provider.kind=kubeconfig. Preview stub.
                    properties:
                      clusters:
                        description: Clusters lists each on-prem cluster and its kubeconfig
                          Secret.
                        items:
                          description: StaticClusterEntry is one on-prem cluster in
                            a StaticFleetSource.
                          properties:
                            kubeconfigSecretRef:
                              description: KubeconfigSecretRef references a Secret
                                with a "kubeconfig" key.
                              properties:
                                name:
                                  description: name is unique within a namespace to
                                    reference a secret resource.
                                  type: string
                                namespace:
                                  description: namespace defines the space within
                                    which the secret name must be unique.
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                            labels:
                              additionalProperties:
                                type: string
                              description: Labels are merged onto the imported Cluster's
                                metadata.labels.
                              type: object
                            name:
                              description: Name is the Cluster name to create.
                              minLength: 1
                              type: string
                          required:
                          - name
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - clusters
                    type: object
                type: object
              suspend:
                description: |-
                  Suspend pauses reconciliation. Existing imported Cluster objects are
                  left untouched.
                type: boolean
              template:
                description: |-
                  Template is applied verbatim to each imported Cluster.
                  spec.provider.kind is derived from the source branch and ignored
                  here if set.
                properties:
                  metadata:
                    description: |-
                      Metadata holds labels and annotations merged onto each imported
                      Cluster. Source-reported labels are layered underneath these
                      (template labels win on conflict).
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  spec:
                    description: |-
                      Spec is the ClusterSpec applied to each imported cluster.
                      spec.provider.kind is derived from the source branch.
                    properties:
                      bootstrap:
                        description: |-
                          Bootstrap configures one-time cluster self-registration.

                          Protocol (SA-token-mediated CSR; built-in K8s signer; works across any
                          cloud / any cluster / any K8s distribution):

                           1. Platform team creates this Cluster with spec.bootstrap set.
                              `tokenHash` (when supplied) is an opaque slot identifier — its
                              value isn't cryptographically verified by the hub today (the
                              bootstrap ServiceAccount identity is the effective auth factor).
                              Changing it alone does not reset bootstrap state in this release;
                              delete and recreate the Cluster to issue a fresh bootstrap slot.

                           2. The hub Cluster bootstrap reconciler provisions a per-cluster
                              ServiceAccount `kapro-bootstrap-<cluster>` in kapro-system with a
                              narrowly-scoped ClusterRole (CSR-create only, for this signer
                              name). It issues a TokenRequest for that SA (default 1h TTL,
                              audience `kapro-bootstrap`) and writes the rendered kubeconfig
                              into Secret `kapro-bootstrap-kubeconfig-<cluster>`. The Secret
                              name is recorded in `status.bootstrap.issuedBootstrapKubeconfig`.

                           3. The platform team ships that Secret out-of-band to the spoke
                              cluster (Helm chart mount, kubectl image copy, GitOps, etc.).
                              The kapro-cluster-controller pod on the spoke mounts the Secret,
                              generates an ECDSA keypair, and submits a CertificateSigningRequest
                              to the hub apiserver. The CSR carries:
                                signerName = kubernetes.io/kube-apiserver-client
                                Subject.CN = "kapro-cluster:<cluster>"
                                Subject.O  = "kapro:cluster-controllers"
                                Usages     = [client auth]
                              The CSR's `spec.username` is automatically set by the apiserver
                              to the bootstrap SA's identity
                              ("system:serviceaccount:kapro-system:kapro-bootstrap-<cluster>").

                           4. The hub approver validates: (a) signer/CN/O/usages exactly match
                              above; (b) Username equals the SA we provisioned for this
                              Cluster — preventing a leaked Secret for cluster A from
                              registering cluster B; (c) spec.bootstrap.expiresAt is in the
                              future and status.bootstrap.used is false. It then approves the
                              CSR via UpdateApproval. The K8s kube-controller-manager signs the
                              cert with the apiserver's own client CA.

                           5. On approval the hub also creates a long-lived per-cluster
                              ClusterRole and ClusterRoleBinding for the issued cert identity
                              (User CN=`kapro-cluster:<cluster>`). Both names are
                              `kapro:cluster-controller:<cluster>`. resourceNames lock the
                              access scope to THIS cluster's Cluster + its own heartbeat
                              Lease — a compromised spoke cannot patch a sibling.

                           6. The spoke uses the signed client cert for steady-state K8s API
                              calls and rotates it via a renewal CSR before expiry (Username
                              becomes the cluster cert identity rather than the bootstrap SA;
                              the approver recognises the renewal class and skips the bootstrap
                              slot check).

                          RE-BOOTSTRAP: delete and recreate the Cluster to issue a fresh
                          bootstrap slot. Mutating spec.bootstrap.tokenHash alone is recorded
                          as desired state but does not reset status.bootstrap in this release.
                        properties:
                          expiresAt:
                            description: |-
                              ExpiresAt is the absolute UTC time after which this bootstrap slot is invalid.
                              Set explicitly by the platform team for auditability.
                              If empty and TTL is set, the Cluster controller computes it on first reconcile.
                            format: date-time
                            type: string
                          labels:
                            additionalProperties:
                              type: string
                            description: |-
                              Labels are applied to bootstrap resources created during registration
                              (ServiceAccount, kubeconfig Secret). Not used for stage selection — use
                              Cluster.metadata.labels for that.
                            type: object
                          tokenHash:
                            description: |-
                              TokenHash is an opaque, platform-supplied bootstrap-slot identifier in
                              SHA-256-hex shape (exactly 64 lowercase hex chars). It is NOT a
                              pre-image-of-token check today: the hub controller's effective
                              authorization is the bootstrap ServiceAccount it provisions (see the
                              ClusterSpec.Bootstrap protocol). Changing this value is recorded in spec
                              but does not reset status.bootstrap in this release.
                              Validation pattern remains a SHA-256 hex so existing tooling that
                              pre-computes the hash keeps working unmodified.
                            pattern: ^[0-9a-f]{64}$
                            type: string
                          ttl:
                            description: |-
                              TTL is a convenience duration (e.g. "24h") used when ExpiresAt is not set explicitly.
                              The Cluster controller writes spec.bootstrap.expiresAt from
                              metadata.creationTimestamp + TTL at creation time and leaves it immutable.
                            type: string
                        type: object
                      consecutiveFailureThreshold:
                        description: |-
                          ConsecutiveFailureThreshold is the number of consecutive heartbeat
                          misses required before the Cluster Ready condition flips to False
                          and the Phase transitions to Unreachable. Defaults to 3 to absorb
                          transient network blips without flapping. Pattern adopted from Sveltos
                          SveltosCluster.spec.consecutiveFailureThreshold.
                        format: int32
                        maximum: 100
                        minimum: 1
                        type: integer
                      delivery:
                        description: Delivery configures the backend-neutral delivery
                          adapter for this cluster.
                        properties:
                          backendRef:
                            description: |-
                              BackendRef is the Backend name. Built-in profiles commonly use
                              "flux" or "argo"; external profiles may use any platform-defined name.
                            type: string
                          mode:
                            default: pull
                            description: Mode controls who performs delivery.
                            enum:
                            - push
                            - pull
                            type: string
                          parameters:
                            additionalProperties:
                              type: string
                            description: |-
                              Parameters are opaque backend-specific settings, following the
                              StorageClass.parameters pattern. Fleet core does not interpret them.
                            type: object
                        required:
                        - backendRef
                        - mode
                        type: object
                      desiredAppKey:
                        description: |-
                          DesiredAppKey is the key the cluster-controller uses when writing
                          status.currentVersions. Defaults to "default".
                          Deprecated: use DesiredVersions map for multi-artifact promotionruns.
                        type: string
                      desiredVersion:
                        description: |-
                          DesiredVersion is written by the kapro-operator (PromotionRunReconciler).
                          The cluster-controller polls this field and patches the local delivery system.
                          Deprecated: use DesiredVersions map for multi-artifact promotionruns.
                        type: string
                      desiredVersions:
                        additionalProperties:
                          type: string
                        description: |-
                          DesiredVersions is a map of appKey → version written by the kapro-operator.
                          The cluster-controller iterates this map and patches local delivery for each changed entry.
                          This replaces the single DesiredVersion/DesiredAppKey pair for multi-artifact promotionruns.
                        type: object
                      healthCheck:
                        description: HealthCheck configures active health polling
                          for this cluster.
                        properties:
                          endpoint:
                            type: string
                          interval:
                            type: string
                        required:
                        - endpoint
                        - interval
                        type: object
                      provider:
                        description: |-
                          Provider declares how the hub discovers this cluster and reaches it.
                          The kind is one of the registered providers (outbound-agent,
                          gcp-fleet, eks, aks-arc, rhacm, capi, kubeconfig). Parameters are
                          provider-specific and opaque to Fleet core (StorageClass-style).

                          When unset, the hub falls back to the legacy behaviour of looking up
                          a Secret-referenced kubeconfig from cluster annotations — kept for
                          backwards compatibility while existing Cluster objects migrate.
                        properties:
                          kind:
                            description: Kind selects a registered provider implementation.
                            enum:
                            - outbound-agent
                            - gcp-fleet
                            - gcp-connect-gateway
                            - eks
                            - aks-arc
                            - rhacm
                            - capi
                            - kubeconfig
                            type: string
                          parameters:
                            additionalProperties:
                              type: string
                            description: |-
                              Parameters are opaque, provider-specific key/value settings. Fleet
                              core does not interpret them.
                            type: object
                        required:
                        - kind
                        type: object
                      suspend:
                        description: Suspend pauses all reconciliation for this cluster.
                        type: boolean
                      topology:
                        description: Topology holds hardware and scheduling metadata
                          used by Plan stage selectors.
                        properties:
                          accelerator:
                            description: |-
                              Accelerator is the GPU/accelerator type in this cluster.
                              Well-known values: nvidia-h100, nvidia-a100, nvidia-l40s, amd-mi300x, tpu-v5e.
                            type: string
                          gpuCount:
                            description: GPUCount is the total number of GPU devices
                              across all nodes in this cluster.
                            format: int32
                            minimum: 0
                            type: integer
                          gpuMemoryGb:
                            description: GPUMemoryGB is the memory per GPU device
                              in gigabytes (e.g. 80 for H100 SXM).
                            format: int32
                            minimum: 0
                            type: integer
                          nodeCount:
                            description: NodeCount is the number of GPU nodes (not
                              total devices).
                            format: int32
                            minimum: 0
                            type: integer
                          tier:
                            description: |-
                              Tier classifies the cluster's role in the delivery wave.
                              Well-known values: canary, shadow, prod.
                            type: string
                        type: object
                    required:
                    - delivery
                    type: object
                required:
                - spec
                type: object
            required:
            - source
            - template
            type: object
          status:
            description: ClusterTemplateStatus reports the observed state of the auto-import.
            properties:
              conditions:
                description: Conditions summarise template readiness (Ready, Stalled).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              discoveredClusters:
                description: DiscoveredClusters is the count returned by the source
                  (pre selector).
                format: int32
                type: integer
              importedClusters:
                description: |-
                  ImportedClusters is the count of Cluster objects currently
                  owned by this template (post selector).
                format: int32
                type: integer
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful
                  source poll.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              sourceKind:
                description: SourceKind echoes the active source branch (gcp, aws,
                  rhacm, ...).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
