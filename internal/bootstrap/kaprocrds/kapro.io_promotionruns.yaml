---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: promotionruns.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: PromotionRun
    listKind: PromotionRunList
    plural: promotionruns
    shortNames:
    - rel
    singular: promotionrun
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.report.syncedTargets
      name: Synced
      type: integer
    - jsonPath: .status.report.failedTargets
      name: Failed
      type: integer
    - jsonPath: .status.report.pendingTargets
      name: Pending
      type: integer
    - jsonPath: .status.report.totalTargets
      name: Total
      type: integer
    - jsonPath: .status.report.duration
      name: Duration
      type: string
    - jsonPath: .spec.suspended
      name: Suspended
      priority: 1
      type: boolean
    - jsonPath: .status.report.totalArtifacts
      name: Artifacts
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PromotionRun is an immutable execution attempt for a progressive delivery rollout
          across the cluster fleet. User-authored Promotion intent normally stamps
          PromotionRun attempts through the Promotion controller.
          It references an artifact version and PromotionPlans that define the delivery path.
          The PromotionRun controller resolves the promotionplan DAG and creates child
          targets; each PromotionTarget advances through its own delivery FSM.
          Per-target execution state lives in child PromotionTarget objects; PromotionRun.status
          stores only rollout summary, promotionplan progress, and audit metadata.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Uniqueness and dependency-reference validation is enforced by the admission webhook,
              which can perform DAG checks without the quadratic CEL cost budget constraints.
            properties:
              promotionPlans:
                description: PromotionPlans is the DAG of promotionplan nodes.
                items:
                  description: |-
                    PromotionPlanRef is one node in the PromotionRun's promotionplan DAG.
                    Multiple promotionplans can run in parallel; DependsOn declares ordering between them.
                  properties:
                    dependsOn:
                      description: DependsOn lists promotionplan node names that must
                        reach Complete before this one starts.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                    name:
                      description: Name uniquely identifies this promotionplan node
                        within the PromotionRun.
                      type: string
                    promotionPlan:
                      description: PromotionPlan is the name of the PromotionPlan
                        CRD to execute.
                      type: string
                  required:
                  - name
                  - promotionPlan
                  type: object
                maxItems: 64
                minItems: 1
                type: array
              scope:
                description: Scope restricts this PromotionRun to a subset of clusters.
                properties:
                  targets:
                    description: |-
                      Targets is the allowlist of target cluster names.
                      Must be non-empty when Scope is set — an empty list is ignored.
                    items:
                      type: string
                    type: array
                type: object
              suspended:
                default: false
                description: Suspended pauses all advancement when true.
                type: boolean
              timeout:
                description: Timeout is the maximum duration for the entire PromotionRun.
                type: string
              version:
                description: |-
                  Version is the default revision to deliver across the fleet.
                  For brownfield/native sources this is the revision for every unit that is
                  not explicitly listed in versions.
                type: string
              versions:
                additionalProperties:
                  type: string
                description: |-
                  Versions maps promotion unit name to the backend-native revision to
                  deliver. Use this when a PromotionRun promotes multiple existing Argo/Flux
                  objects together without creating a synthetic application object.
                type: object
            required:
            - promotionPlans
            type: object
          status:
            description: PromotionRunStatus defines the observed state of PromotionRun.
            properties:
              auditTrail:
                description: AuditTrail records immutable delivery provenance. Capped
                  at 50 entries.
                items:
                  description: |-
                    AuditEntry records the immutable delivery provenance of a completed PromotionRun.
                    Stored in PromotionRun.status.auditTrail.
                  properties:
                    artifact:
                      description: Artifact is the OCI artifact that was delivered.
                      type: string
                    changedUnits:
                      description: ChangedUnits lists the units that changed relative
                        to the parent artifact.
                      items:
                        type: string
                      type: array
                    completedAt:
                      description: CompletedAt is when the PromotionRun completed.
                      type: string
                    derivedFrom:
                      description: DerivedFrom is the parent Artifact name.
                      type: string
                    promotionRun:
                      description: PromotionRun is the PromotionRun name.
                      type: string
                    promotionRunDerivedFrom:
                      description: PromotionRunDerivedFrom is the parent PromotionRun
                        name.
                      type: string
                    scope:
                      description: Scope lists the target cluster names that were
                        targeted. Nil = full-fleet rollout.
                      items:
                        type: string
                      type: array
                  required:
                  - artifact
                  - promotionRun
                  type: object
                type: array
              completedAt:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              promotionPlanProgress:
                description: PromotionPlanProgress tracks execution state of each
                  promotionplan node in the DAG.
                items:
                  description: PromotionPlanProgress tracks the execution state of
                    one promotionplan node in a PromotionRun.
                  properties:
                    activeStage:
                      description: |-
                        ActiveStage is the name of the currently progressing stage (or the last completed one).
                        Gives operators a quick "where are we?" without expanding StageProgress.
                      type: string
                    name:
                      description: Name matches PromotionPlanRef.name.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration pins the PromotionPlan generation used by this
                        PromotionRun. If the referenced PromotionPlan changes while the run is in
                        flight, the controller fails the run instead of silently switching DAGs.
                      format: int64
                      type: integer
                    phase:
                      description: Phase is the current execution state of this promotionplan
                        node.
                      enum:
                      - Pending
                      - Progressing
                      - Complete
                      - Failed
                      type: string
                    promotionPlan:
                      description: PromotionPlan is the PromotionPlan CRD name.
                      type: string
                    stageProgress:
                      description: StageProgress summarises the state of each stage
                        in this promotionplan.
                      items:
                        description: |-
                          StageProgress tracks the execution state of one Stage within a promotionplan.
                          Designed to render well in k9s describe view — operators see per-stage
                          progress like CI promotionplan steps.
                        properties:
                          completedAt:
                            description: CompletedAt is when all targets in this stage
                              reached a terminal state.
                            type: string
                          deferred:
                            description: |-
                              Deferred is the number of eligible targets not yet bound by the planner
                              or stage strategy.
                            type: integer
                          failed:
                            description: Failed is the number of targets that have
                              reached Failed.
                            type: integer
                          message:
                            description: |-
                              Message is a human-readable summary of stage progress, designed for
                              k9s describe output. Examples:
                                "2/5 clusters converged, soak: 12m/30m remaining"
                                "waiting for canary stage"
                                "blocked: manual approval required for de-prod"
                            type: string
                          name:
                            description: Name is the stage name from PromotionPlan.spec.stages[].name.
                            type: string
                          phase:
                            description: Phase is the current state of this stage.
                            enum:
                            - Pending
                            - Progressing
                            - Complete
                            - Failed
                            type: string
                          plannerResults:
                            description: |-
                              PlannerResults records why targets were skipped or deferred during the
                              latest planning cycle. Capped by the controller.
                            items:
                              description: PlannerResult explains one planner decision
                                for operator visibility.
                              properties:
                                message:
                                  description: Message is a human-readable explanation.
                                  type: string
                                phase:
                                  description: Phase is the planner phase, for example
                                    Filter, Score, Permit, or Bind.
                                  type: string
                                plugin:
                                  description: Plugin is the planner plugin or built-in
                                    strategy that made the decision.
                                  type: string
                                reason:
                                  description: Reason is a short machine-readable
                                    reason.
                                  type: string
                                target:
                                  description: Target is the FleetCluster name affected
                                    by the decision.
                                  type: string
                              type: object
                            type: array
                          startedAt:
                            description: StartedAt is when this stage first had a
                              Progressing target.
                            type: string
                          synced:
                            description: Synced is the number of targets that have
                              reached Converged.
                            type: integer
                          total:
                            description: Total is the number of targets selected by
                              this stage.
                            type: integer
                        required:
                        - name
                        type: object
                      type: array
                  required:
                  - name
                  - promotionPlan
                  type: object
                type: array
              report:
                description: Report is the inline delivery summary.
                properties:
                  artifact:
                    type: string
                  completedAt:
                    type: string
                  deltaArtifacts:
                    description: |-
                      DeltaArtifacts is the number of artifacts explicitly changed by this PromotionRun.
                      For derivedFrom promotionruns, inherited artifacts are excluded.
                    type: integer
                  duration:
                    type: string
                  failedTargets:
                    type: integer
                  pendingApprovals:
                    description: |-
                      PendingApprovals lists "<promotionrun>-<ref>" Approval names that are
                      awaiting human signal. Derived from PromotionTarget objects.
                    items:
                      type: string
                    type: array
                  pendingTargets:
                    type: integer
                  phase:
                    type: string
                  resolvedVersion:
                    type: string
                  rolledBackTargets:
                    type: integer
                  startedAt:
                    type: string
                  syncedTargets:
                    type: integer
                  totalArtifacts:
                    description: TotalArtifacts is the number of artifacts in the
                      resolved (merged) artifact list.
                    type: integer
                  totalTargets:
                    type: integer
                type: object
              resolvedVersion:
                description: |-
                  ResolvedVersion is the OCI digest or tag resolved from spec.version.
                  Set once in Pending and never changed.
                type: string
              startedAt:
                type: string
              targets:
                description: |-
                  Targets is deprecated compatibility state. The authoritative per-target
                  rollout state lives in child PromotionTarget objects.
                items:
                  description: |-
                    TargetStatus records the rollout state of one target cluster rollout. It is
                    used as the status payload of PromotionTarget and retained here as the
                    controller's in-memory execution shape.
                  properties:
                    appKey:
                      description: AppKey is the key used to look up the current version
                        in FleetCluster.status.currentVersions.
                      type: string
                    applyIssued:
                      description: |-
                        ApplyIssued is set once Actuator.Apply() has been called for this delivery
                        cycle. Guards against duplicate Apply() calls on subsequent reconciles while
                        the cluster is converging. Reset automatically on each transition into Applying.
                      type: boolean
                    approvalSentAt:
                      description: ApprovalSentAt records when the approval notification
                        was last dispatched.
                      type: string
                    backendObjects:
                      description: |-
                        BackendObjects records the backend-native objects this target expects to
                        converge, for example Argo CD Applications selected by a label selector.
                        It is status evidence only; backend adapters own the actual resources.
                      items:
                        description: |-
                          BackendObjectStatus reports the health of one backend-native object expected
                          to converge for a PromotionTarget.
                        properties:
                          apiVersion:
                            description: APIVersion is the backend object's API version.
                            type: string
                          currentVersion:
                            description: CurrentVersion is the revision currently
                              reported by the backend object.
                            type: string
                          desiredVersion:
                            description: DesiredVersion is the revision Kapro expects
                              this object to run.
                            type: string
                          healthStatus:
                            description: HealthStatus is the backend health status
                              when available.
                            type: string
                          kind:
                            description: Kind is the backend object's kind.
                            type: string
                          message:
                            description: Message gives a short diagnostic when the
                              object is not converged.
                            type: string
                          name:
                            description: Name is the backend object's name.
                            type: string
                          namespace:
                            description: Namespace is the backend object's namespace.
                            type: string
                          phase:
                            description: Phase summarizes this object's convergence
                              state.
                            type: string
                          syncStatus:
                            description: SyncStatus is the backend sync status when
                              available.
                            type: string
                          unit:
                            description: Unit is the PromotionSource/promotionrun
                              unit this object belongs to.
                            type: string
                        type: object
                      type: array
                    desiredVersions:
                      additionalProperties:
                        type: string
                      description: |-
                        DesiredVersions is the full appKey -> version map for this target rollout.
                        When set, the actuator must converge all of these versions before the target completes.
                      type: object
                    finishedAt:
                      type: string
                    gate:
                      description: Gate is the inline gate policy snapshot applied
                        to this target cluster.
                      properties:
                        approval:
                          properties:
                            approvers:
                              items:
                                type: string
                              type: array
                            required:
                              type: boolean
                          required:
                          - required
                          type: object
                        gate:
                          properties:
                            gateTimeout:
                              description: |-
                                GateTimeout is the maximum duration the metrics gate may remain un-passed
                                before the target is failed. Only applies to MetricsCheck; infrastructure
                                errors (e.g. Prometheus unreachable) do not consume this budget.
                                Uses Go duration format, e.g. "30m", "1h". Empty means retry indefinitely.
                              type: string
                            healthCheck:
                              type: boolean
                            metrics:
                              items:
                                properties:
                                  analysis:
                                    description: |-
                                      Analysis selects optional research-backed metric semantics. Empty keeps
                                      the original threshold behavior for backwards compatibility.
                                    properties:
                                      alpha:
                                        description: |-
                                          Alpha is the false-positive budget for statistical tests. Defaults to
                                          0.05. Lower values are more conservative.
                                        maximum: 1
                                        minimum: 0
                                        type: number
                                      baselineHealthQuery:
                                        description: |-
                                          BaselineHealthQuery must pass before baseline or score analysis can use
                                          the baseline as a control. It should return a positive/true value when
                                          the baseline is healthy.
                                        type: string
                                      baselineQuery:
                                        description: |-
                                          BaselineQuery is required for baseline analysis. The current value is
                                          divided by the baseline value before applying the threshold.
                                        type: string
                                      comparator:
                                        description: |-
                                          Comparator controls threshold comparison.
                                          Defaults to "gt" for threshold/sequential and "lte" for sloBurnRate/baseline.
                                        enum:
                                        - gt
                                        - gte
                                        - lt
                                        - lte
                                        type: string
                                      confidenceThreshold:
                                        description: |-
                                          ConfidenceThreshold is the minimum confidence required for sequential
                                          analysis to make a terminal decision. Defaults to 0.95.
                                        maximum: 1
                                        minimum: 0
                                        type: number
                                      maxSamples:
                                        description: |-
                                          MaxSamples is the maximum number of samples to wait for before a
                                          statistical analysis must return a terminal decision using the evidence
                                          available. Empty means no maximum.
                                        format: int32
                                        minimum: 1
                                        type: integer
                                      minSamples:
                                        description: |-
                                          MinSamples is the minimum number of range samples required for sequential
                                          analysis before Kapro can pass or fail the gate.
                                        format: int32
                                        minimum: 1
                                        type: integer
                                      mode:
                                        description: |-
                                          Mode selects the metric analysis algorithm.
                                          threshold: compare the current value to threshold.
                                          sloBurnRate: treat the current value as an error-budget burn rate.
                                          baseline: compare the current value to a baseline query as a ratio.
                                          sequential: sample over the window and require enough confidence before deciding.
                                          changePoint: detect a statistically meaningful change inside the window.
                                          score: convert the metric into a 0-100 canary score.
                                        enum:
                                        - threshold
                                        - sloBurnRate
                                        - baseline
                                        - sequential
                                        - changePoint
                                        - score
                                        type: string
                                      scoreThreshold:
                                        description: |-
                                          ScoreThreshold is the minimum score required for score analysis. Defaults
                                          to 95.
                                        maximum: 100
                                        minimum: 0
                                        type: number
                                    type: object
                                  config:
                                    format: byte
                                    type: string
                                    x-kubernetes-preserve-unknown-fields: true
                                  endpoint:
                                    type: string
                                  interval:
                                    default: 30s
                                    description: |-
                                      Interval controls how often the metric is re-evaluated while the gate is blocking.
                                      Equivalent to Grafana's "Evaluate every" setting.
                                      Defaults to "30s". Minimum "10s".
                                    type: string
                                  preset:
                                    description: |-
                                      Preset references PromotionPlan.spec.metricPresets by name.
                                      Inline fields override the preset when set.
                                    type: string
                                  provider:
                                    description: Provider selects the metrics backend.
                                      Required when preset is empty.
                                    type: string
                                  query:
                                    description: |-
                                      Query is a PromQL expression. The gate passes when the query returns a non-zero value.
                                      Use range functions directly in the query for window-based checks, e.g.:
                                        min_over_time(error_rate[30m]) < 0.01
                                      Or reference the Window field as a template: {{.Window}} is substituted at evaluation time.
                                      Required when preset is empty.
                                    type: string
                                  threshold:
                                    description: |-
                                      Threshold is optional and presence-aware so an inline metric can
                                      intentionally override a preset threshold to 0.
                                    type: number
                                  window:
                                    default: 5m
                                    description: |-
                                      Window is the lookback duration injected into the query template as {{.Window}}.
                                      When Query already contains a hardcoded range (e.g. [5m]), this field is ignored.
                                      Defaults to "5m".
                                    type: string
                                type: object
                              type: array
                            soakTime:
                              type: string
                            templates:
                              items:
                                description: |-
                                  GateTemplateSpec defines an inline, parameterised gate evaluation config.
                                  Embedded directly in GateSpec.Templates — no separate CRD needed.
                                properties:
                                  args:
                                    items:
                                      description: GateArg declares a named parameter
                                        with an optional default value.
                                      properties:
                                        name:
                                          type: string
                                        value:
                                          type: string
                                      required:
                                      - name
                                      type: object
                                    type: array
                                  cel:
                                    description: CELGateSpec configures the built-in
                                      CEL expression gate.
                                    properties:
                                      expression:
                                        type: string
                                    required:
                                    - expression
                                    type: object
                                  failurePolicy:
                                    default: halt
                                    enum:
                                    - halt
                                    - retry
                                    - skip
                                    type: string
                                  inconclusivePolicy:
                                    default: retry
                                    enum:
                                    - retry
                                    - skip
                                    - halt
                                    type: string
                                  job:
                                    description: JobGateSpec configures the Kubernetes
                                      Job gate.
                                    properties:
                                      args:
                                        items:
                                          type: string
                                        type: array
                                      command:
                                        items:
                                          type: string
                                        type: array
                                      env:
                                        items:
                                          description: EnvVar represents an environment
                                            variable present in a Container.
                                          properties:
                                            name:
                                              description: |-
                                                Name of the environment variable.
                                                May consist of any printable ASCII characters except '='.
                                              type: string
                                            value:
                                              description: |-
                                                Variable references $(VAR_NAME) are expanded
                                                using the previously defined environment variables in the container and
                                                any service environment variables. If a variable cannot be resolved,
                                                the reference in the input string will be unchanged. Double $$ are reduced
                                                to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                                "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                                Escaped references will never be expanded, regardless of whether the variable
                                                exists or not.
                                                Defaults to "".
                                              type: string
                                            valueFrom:
                                              description: Source for the environment
                                                variable's value. Cannot be used if
                                                value is not empty.
                                              properties:
                                                configMapKeyRef:
                                                  description: Selects a key of a
                                                    ConfigMap.
                                                  properties:
                                                    key:
                                                      description: The key to select.
                                                      type: string
                                                    name:
                                                      default: ""
                                                      description: |-
                                                        Name of the referent.
                                                        This field is effectively required, but due to backwards compatibility is
                                                        allowed to be empty. Instances of this type with an empty value here are
                                                        almost certainly wrong.
                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                      type: string
                                                    optional:
                                                      description: Specify whether
                                                        the ConfigMap or its key must
                                                        be defined
                                                      type: boolean
                                                  required:
                                                  - key
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                fieldRef:
                                                  description: |-
                                                    Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                                    spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                                  properties:
                                                    apiVersion:
                                                      description: Version of the
                                                        schema the FieldPath is written
                                                        in terms of, defaults to "v1".
                                                      type: string
                                                    fieldPath:
                                                      description: Path of the field
                                                        to select in the specified
                                                        API version.
                                                      type: string
                                                  required:
                                                  - fieldPath
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                fileKeyRef:
                                                  description: |-
                                                    FileKeyRef selects a key of the env file.
                                                    Requires the EnvFiles feature gate to be enabled.
                                                  properties:
                                                    key:
                                                      description: |-
                                                        The key within the env file. An invalid key will prevent the pod from starting.
                                                        The keys defined within a source may consist of any printable ASCII characters except '='.
                                                        During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                                      type: string
                                                    optional:
                                                      default: false
                                                      description: |-
                                                        Specify whether the file or its key must be defined. If the file or key
                                                        does not exist, then the env var is not published.
                                                        If optional is set to true and the specified key does not exist,
                                                        the environment variable will not be set in the Pod's containers.

                                                        If optional is set to false and the specified key does not exist,
                                                        an error will be returned during Pod creation.
                                                      type: boolean
                                                    path:
                                                      description: |-
                                                        The path within the volume from which to select the file.
                                                        Must be relative and may not contain the '..' path or start with '..'.
                                                      type: string
                                                    volumeName:
                                                      description: The name of the
                                                        volume mount containing the
                                                        env file.
                                                      type: string
                                                  required:
                                                  - key
                                                  - path
                                                  - volumeName
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                resourceFieldRef:
