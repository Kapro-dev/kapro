---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: kaproapps.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: KaproApp
    listKind: KaproAppList
    plural: kaproapps
    shortNames:
    - ka
    singular: kaproapp
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.annotations.kapro\.io/component-count
      name: Components
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KaproApp is an application bundle defining what to deploy across the fleet.
          It is a pure template — no controller, no status. Referenced by Kapro.spec.appRef.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              KaproAppSpec defines an application bundle deployed across the fleet.
              Components, versions, defaults, and per-cluster overrides live here.
              Referenced by Kapro.spec.appRef.
            properties:
              components:
                description: Components defines the deployable units (one HelmRelease
                  per component).
                items:
                  description: |-
                    AppComponent is one deployable unit within a KaproApp.
                    Generates one HelmRelease on the spoke. Inherits from AppDefaults unless overridden.
                  properties:
                    chartName:
                      description: |-
                        ChartName overrides the Helm chart name when different from component name.
                        Example: component "keycloak" uses chart "keycloakx".
                      type: string
                    crds:
                      description: 'CRDs controls CRD install policy: "Skip" (default),
                        "Create", "CreateReplace".'
                      enum:
                      - Skip
                      - Create
                      - CreateReplace
                      type: string
                    dependsOn:
                      description: |-
                        DependsOn lists component names that must be Ready before this one starts.
                        Creates HelmRelease-level dependsOn within the same wave.
                      items:
                        type: string
                      type: array
                    name:
                      description: Name is the component identifier. Used as HelmRelease
                        name and chart name (unless chartName is set).
                      type: string
                    prune:
                      description: |-
                        Prune controls whether Flux deletes resources when removed. Default: true.
                        Set to false for databases, Kafka, PVCs.
                      type: boolean
                    repo:
                      description: Repo references a registry from spec.registries
                        by name. Inherits from defaults if empty.
                      type: string
                    retries:
                      description: Retries for install/upgrade remediation. Inherits
                        from defaults if empty.
                      format: int32
                      type: integer
                    shared:
                      description: Shared marks this as infrastructure NOT duplicated
                        in blue-green slots.
                      type: boolean
                    suspend:
                      description: Suspend pauses reconciliation for this component.
                      type: boolean
                    targetNamespace:
                      description: |-
                        TargetNamespace is where workload pods run on spoke. Inherits from defaults if empty.
                        Supports ${variable} substitution.
                      type: string
                    timeout:
                      description: Timeout for install and upgrade. Inherits from
                        defaults if empty.
                      type: string
                    values:
                      description: Values are inline Helm values. Deep-merged with
                        defaults.values (component wins on conflict).
                      x-kubernetes-preserve-unknown-fields: true
                    valuesFrom:
                      description: |-
                        ValuesFrom references ConfigMaps/Secrets with Helm values.
                        When set, REPLACES defaults.valuesFrom (not appended).
                      items:
                        description: ValuesReference references a ConfigMap or Secret
                          for Helm values.
                        properties:
                          kind:
                            default: ConfigMap
                            description: Kind is "ConfigMap" (default) or "Secret".
                            type: string
                          name:
                            description: Name of the ConfigMap or Secret.
                            type: string
                          optional:
                            description: Optional marks this values source as non-required.
                            type: boolean
                          valuesKey:
                            description: 'ValuesKey is the data key to use. Default:
                              "values.yaml".'
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    version:
                      description: Version is the chart version. Supports ${VARIABLE}
                        substitution from cluster-vars.
                      type: string
                    wave:
                      description: |-
                        Wave controls deployment ordering (lower = earlier). Components in the same wave
                        deploy in parallel. Wave N waits for wave N-1 to be Ready.
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - name
                  - version
                  type: object
                minItems: 1
                type: array
              defaults:
                description: Defaults are inherited by every component unless overridden.
                properties:
                  repo:
                    description: Repo is the default registry name (from spec.registries).
                    type: string
                  retries:
                    default: 3
                    description: Retries is the number of install/upgrade retry attempts.
                    format: int32
                    type: integer
                  targetNamespace:
                    description: TargetNamespace is where workload pods run. Supports
                      ${variable} substitution.
                    type: string
                  timeout:
                    default: 10m
                    description: Timeout for install and upgrade operations.
                    type: string
                  values:
                    description: Values are base Helm values applied to every component
                      (deep-merged with component values).
                    x-kubernetes-preserve-unknown-fields: true
                  valuesFrom:
                    description: ValuesFrom references ConfigMaps/Secrets with Helm
                      values applied to all components.
                    items:
                      description: ValuesReference references a ConfigMap or Secret
                        for Helm values.
                      properties:
                        kind:
                          default: ConfigMap
                          description: Kind is "ConfigMap" (default) or "Secret".
                          type: string
                        name:
                          description: Name of the ConfigMap or Secret.
                          type: string
                        optional:
                          description: Optional marks this values source as non-required.
                          type: boolean
                        valuesKey:
                          description: 'ValuesKey is the data key to use. Default:
                            "values.yaml".'
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                type: object
              helmReleaseNamespace:
                default: flux-system
                description: HelmReleaseNamespace is where HelmRelease CRs live on
                  spokes (not the workloads).
                type: string
              multiVersion:
                description: |-
                  MultiVersion enables running multiple versions simultaneously on a spoke
                  using namespace-based isolation. When nil (default), Kapro does single-namespace
                  in-place upgrades — no extra namespaces, no OPA/Kyverno changes needed.
                properties:
                  slotNames:
                    description: |-
                      SlotNames are the two namespace slot identifiers appended to workloadNamespace.
                      Example with workloadNamespace "{{.Env}}-workloads" and slotNames ["blue","green"]:
                        → "p528-blue-workloads" (active, all store traffic)
                        → "p528-green-workloads" (standby, deploying + verifying)
                    items:
                      type: string
                    maxItems: 2
                    minItems: 2
                    type: array
                  trafficSwitch:
                    description: TrafficSwitch configures how traffic flips between
                      slots.
                    properties:
                      ingressRef:
                        description: |-
                          IngressRef identifies the routing resource to modify.
                          For traefik: an IngressRoute. For nginx: an Ingress.
                          For gateway-api: an HTTPRoute. For istio: a VirtualService.
                        properties:
                          apiVersion:
                            description: APIVersion of the routing resource (e.g.
                              gateway.networking.k8s.io/v1).
                            type: string
                          kind:
                            description: Kind of the routing resource (e.g. HTTPRoute,
                              Ingress, VirtualService).
                            type: string
                          name:
                            description: Name of the resource.
                            type: string
                          namespace:
                            description: Namespace of the resource.
                            type: string
                        required:
                        - apiVersion
                        - kind
                        - name
                        type: object
                      provider:
                        description: Provider is the traffic routing backend that
                          performs the switch.
                        enum:
                        - gateway-api
                        - istio
                        - nginx
                        - traefik
                        - manual
                        type: string
                    required:
                    - provider
                    type: object
                required:
                - trafficSwitch
                type: object
              overrides:
                description: Overrides are per-cluster or per-label value patches
                  layered on top of defaults.
                items:
                  description: AppOverride patches Helm values for a subset of clusters.
                  properties:
                    clusters:
                      description: Clusters is an explicit list of cluster names.
                        Takes precedence over selector.
                      items:
                        type: string
                      type: array
                    component:
                      description: Component restricts this override to a single component.
                        Empty means all.
                      type: string
                    selector:
                      additionalProperties:
                        type: string
                      description: Selector matches clusters by labels. Applied to
                        all matching clusters.
                      type: object
                    values:
                      description: Values are Helm value patches merged on top of
                        defaults.
                      x-kubernetes-preserve-unknown-fields: true
                  type: object
                type: array
              registries:
                description: Registries defines HelmRepository sources. Each becomes
                  a HelmRepository on spoke.
                items:
                  description: AppRegistry defines a Helm chart source. Generates
                    a HelmRepository on spoke.
                  properties:
                    interval:
                      default: 5m
                      description: Interval is how often to check for new chart versions.
                      type: string
                    name:
                      description: Name is the registry identifier referenced by components
                        via repo field.
                      type: string
                    provider:
                      default: generic
                      description: |-
                        Provider is the auth provider: "generic" (default), "gcp", "aws", "azure".
                        "gcp" uses Workload Identity — no credentials needed.
                      type: string
                    type:
                      description: Type is "oci" (auto-detected for oci:// URLs) or
                        "default" (HTTPS).
                      type: string
                    url:
                      description: |-
                        URL is the Helm repository URL (OCI or HTTPS).
                        Supports ${variable} substitution (e.g. oci://${gcpArtifactRegistry}/helm/ldl).
                      type: string
                  required:
                  - name
                  - url
                  type: object
                type: array
            required:
            - components
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
