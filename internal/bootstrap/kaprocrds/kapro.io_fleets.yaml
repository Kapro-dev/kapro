---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleets.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Fleet
    listKind: FleetList
    plural: fleets
    shortNames:
    - flt
    singular: fleet
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.unitCount
      name: Units
      type: integer
    - jsonPath: .status.clusterCount
      name: Clusters
      type: integer
    - jsonPath: .status.convergedCount
      name: Converged
      type: integer
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Fleet is the target-set entry point for fleet delivery. Users select substrate
          defaults and define clusters. DeliveryUnit owns source shape, Plan owns
          rollout strategy, and Promotion remains the explicit action boundary.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FleetSpec defines substrate defaults and target clusters
              for one fleet.
            properties:
              clusters:
                description: Clusters defines the target clusters in the fleet.
                items:
                  description: ClusterRef defines a spoke cluster in the fleet.
                  properties:
                    gcp:
                      description: GCP config (provider=gcp or gcp-fleet).
                      properties:
                        clusterName:
                          description: |-
                            ClusterName is the GKE cluster name (for gcp provider).
                            For gcp-fleet, this is resolved from Fleet membership.
                          type: string
                        project:
                          description: Project is the GCP project ID containing the
                            spoke cluster.
                          type: string
                        region:
                          description: Region is the GKE cluster location (zone or
                            region).
                          type: string
                      required:
                      - project
                      type: object
                    kubeconfigSecret:
                      description: |-
                        KubeconfigSecret references the kubeconfig Secret name (provider=kubeconfig).
                        For gcp/gcp-fleet providers, this is auto-generated by the controller.
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      description: Labels for stage selection.
                      type: object
                    name:
                      description: Name is the cluster identifier.
                      type: string
                    provider:
                      default: kubeconfig
                      description: |-
                        Provider is "kubeconfig" (default), "gcp", or "gcp-fleet".
                        gcp-fleet uses Fleet API for discovery + WI auth via gke-gcloud-auth-plugin.
                      enum:
                      - kubeconfig
                      - gcp
                      - gcp-fleet
                      type: string
                  required:
                  - labels
                  - name
                  type: object
                minItems: 1
                type: array
              plan:
                description: |-
                  Plan is a compatibility hook for legacy inline rollout stages. New
                  manifests should use a standalone Plan and reference it from Promotion or
                  DeliveryUnit defaults.
                properties:
                  stages:
                    description: Stages defines the progressive delivery wave ordering.
                    items:
                      description: StageSpec is one wave in the delivery plan.
                      properties:
                        dependsOn:
                          description: DependsOn declares upstream stage dependencies.
                          items:
                            description: |-
                              StageDependency declares that a stage depends on an upstream stage,
                              with optional soak time and availability strategy.
                              This replaces bare stage name strings — enabling canary-unlock and
                              soak-time patterns without heavyweight GateTemplate configuration.
                            properties:
                              requiredSoakTime:
                                description: |-
                                  RequiredSoakTime is how long ALL (or ANY, per Strategy) targets in the
                                  upstream stage must have been continuously healthy before this stage
                                  becomes eligible. Replaces GateTemplate for the most common gate pattern.
                                  Zero or nil means no soak — advance as soon as the upstream stage completes.
                                type: string
                              stage:
                                description: Stage is the upstream stage name that
                                  must be satisfied.
                                type: string
                              strategy:
                                default: all
                                description: |-
                                  Strategy controls when this dependency is considered satisfied.
                                    "all" (default): every target in the upstream stage must be verified.
                                    "any": at least one target in the upstream stage must be verified
                                           (canary-unlock pattern).
                                enum:
                                - all
                                - any
                                type: string
                            required:
                            - stage
                            type: object
                          type: array
                        gate:
                          description: Gate defines approval/soak/metrics requirements
                            for this stage.
                          properties:
                            approval:
                              description: Approval configures the human approval
                                requirement for manual gates.
                              properties:
                                approvers:
                                  description: |-
                                    Approvers lists identities allowed to approve this gate. Empty means the
                                    default approval policy decides who can approve.
                                  items:
                                    type: string
                                  type: array
                                required:
                                  description: Required makes this gate wait for an
                                    Approval before the target can apply.
                                  type: boolean
                              required:
                              - required
                              type: object
                            expressionRef:
                              description: |-
                                ExpressionRef is reserved for future external gate expression resolution.
                                v0.6.0 rejects this field so referenced gates cannot become a silent no-op.
                              minLength: 1
                              type: string
                            gate:
                              description: |-
                                Gate configures automated checks such as soak time, health checks,
                                metrics, template gates, and delegated verification policy.
                              properties:
                                gateTimeout:
                                  description: |-
                                    GateTimeout is the maximum duration the metrics gate may remain un-passed
                                    before the target is failed. Only applies to MetricsCheck; infrastructure
                                    errors (e.g. Prometheus unreachable) do not consume this budget.
                                    Uses Go duration format, e.g. "30m", "1h". Empty means retry indefinitely.
                                  type: string
                                healthCheck:
                                  type: boolean
                                metrics:
                                  items:
                                    properties:
                                      analysis:
                                        description: |-
                                          Analysis selects optional research-backed metric semantics. Empty keeps
                                          the original threshold behavior for backwards compatibility.
                                        properties:
                                          alpha:
                                            description: |-
                                              Alpha is the false-positive budget for statistical tests. Defaults to
                                              0.05. Lower values are more conservative.
                                            maximum: 1
                                            minimum: 0
                                            type: number
                                          baselineHealthQuery:
                                            description: |-
                                              BaselineHealthQuery must pass before baseline or score analysis can use
                                              the baseline as a control. It should return a positive/true value when
                                              the baseline is healthy.
                                            type: string
                                          baselineQuery:
                                            description: |-
                                              BaselineQuery is required for baseline analysis. The current value is
                                              divided by the baseline value before applying the threshold.
                                            type: string
                                          comparator:
                                            description: |-
                                              Comparator controls threshold comparison.
                                              Defaults to "gt" for threshold/sequential and "lte" for sloBurnRate/baseline.
                                            enum:
                                            - gt
                                            - gte
                                            - lt
                                            - lte
                                            type: string
                                          confidenceThreshold:
                                            description: |-
                                              ConfidenceThreshold is the minimum confidence required for sequential
                                              analysis to make a terminal decision. Defaults to 0.95.
                                            maximum: 1
                                            minimum: 0
                                            type: number
                                          maxSamples:
                                            description: |-
                                              MaxSamples is the maximum number of samples to wait for before a
                                              statistical analysis must return a terminal decision using the evidence
                                              available. Empty means no maximum.
                                            format: int32
                                            minimum: 1
                                            type: integer
                                          minSamples:
                                            description: |-
                                              MinSamples is the minimum number of range samples required for sequential
                                              analysis before Fleet can pass or fail the gate.
                                            format: int32
                                            minimum: 1
                                            type: integer
                                          mode:
                                            description: |-
                                              Mode selects the metric analysis algorithm.
                                              threshold: compare the current value to threshold.
                                              sloBurnRate: treat the current value as an error-budget burn rate.
                                              baseline: compare the current value to a baseline query as a ratio.
                                              sequential: sample over the window and require enough confidence before deciding.
                                              changePoint: detect a statistically meaningful change inside the window.
                                              score: convert the metric into a 0-100 canary score.
                                            enum:
                                            - threshold
                                            - sloBurnRate
                                            - baseline
                                            - sequential
                                            - changePoint
                                            - score
                                            type: string
                                          scoreThreshold:
                                            description: |-
                                              ScoreThreshold is the minimum score required for score analysis. Defaults
                                              to 95.
                                            maximum: 100
                                            minimum: 0
                                            type: number
                                        type: object
                                      config:
                                        format: byte
                                        type: string
                                        x-kubernetes-preserve-unknown-fields: true
                                      endpoint:
                                        type: string
                                      interval:
                                        default: 30s
                                        description: |-
                                          Interval controls how often the metric is re-evaluated while the gate is blocking.
                                          Equivalent to Grafana's "Evaluate every" setting.
                                          Defaults to "30s". Minimum "10s".
                                        type: string
                                      preset:
                                        description: |-
                                          Preset references Plan.spec.metricPresets by name.
                                          Preset fields are copied first; inline fields override the preset when set.
                                        type: string
                                      provider:
                                        description: Provider selects the metrics
                                          substrate. Required when preset is empty.
                                        type: string
                                      query:
                                        description: |-
                                          Query is a PromQL expression. When threshold or analysis is configured,
                                          that configuration decides pass/fail. Without threshold or analysis, a
                                          truthy/non-zero query result passes the gate.
                                          Use range functions directly in the query for window-based checks, e.g.:
                                            min_over_time(error_rate[30m]) < 0.01
                                          Or reference the Window field as a template: {{.Window}} is substituted at evaluation time.
                                          Required when preset is empty.
                                        type: string
                                      threshold:
                                        description: |-
                                          Threshold is optional and presence-aware so an inline metric can
                                          intentionally override a preset threshold to 0.
                                        type: number
                                      window:
                                        default: 5m
                                        description: |-
                                          Window is the lookback duration injected into the query template as {{.Window}}.
                                          When Query already contains a hardcoded range (e.g. [5m]), this field is ignored.
                                          Defaults to "5m".
                                        type: string
                                    type: object
                                  type: array
                                soakTime:
                                  type: string
                                templates:
                                  items:
                                    description: |-
                                      GateTemplateSpec defines an inline, parameterised gate evaluation config.
                                      Embedded directly in GateSpec.Templates — no separate CRD needed.
                                    properties:
                                      args:
                                        items:
                                          description: GateArg declares a named parameter
                                            with an optional default value.
                                          properties:
                                            name:
                                              type: string
                                            value:
                                              type: string
                                          required:
                                          - name
                                          type: object
                                        type: array
                                      cel:
                                        description: CELGateSpec configures the built-in
                                          CEL expression gate.
                                        properties:
                                          expression:
                                            type: string
                                        required:
                                        - expression
                                        type: object
                                      failurePolicy:
                                        default: halt
                                        enum:
                                        - halt
                                        - retry
                                        - skip
                                        type: string
                                      inconclusivePolicy:
                                        default: retry
                                        enum:
                                        - retry
                                        - skip
                                        - halt
                                        type: string
                                      job:
                                        description: JobGateSpec configures the Kubernetes
                                          Job gate.
                                        properties:
                                          args:
                                            items:
                                              type: string
                                            type: array
                                          command:
                                            items:
                                              type: string
                                            type: array
                                          env:
                                            items:
                                              description: EnvVar represents an environment
                                                variable present in a Container.
                                              properties:
                                                name:
                                                  description: |-
                                                    Name of the environment variable.
                                                    May consist of any printable ASCII characters except '='.
                                                  type: string
                                                value:
                                                  description: |-
                                                    Variable references $(VAR_NAME) are expanded
                                                    using the previously defined environment variables in the container and
                                                    any service environment variables. If a variable cannot be resolved,
                                                    the reference in the input string will be unchanged. Double $$ are reduced
                                                    to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                                    "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                                    Escaped references will never be expanded, regardless of whether the variable
                                                    exists or not.
                                                    Defaults to "".
                                                  type: string
                                                valueFrom:
                                                  description: Source for the environment
                                                    variable's value. Cannot be used
                                                    if value is not empty.
                                                  properties:
                                                    configMapKeyRef:
                                                      description: Selects a key of
                                                        a ConfigMap.
                                                      properties:
                                                        key:
                                                          description: The key to
                                                            select.
                                                          type: string
                                                        name:
                                                          default: ""
                                                          description: |-
                                                            Name of the referent.
                                                            This field is effectively required, but due to backwards compatibility is
                                                            allowed to be empty. Instances of this type with an empty value here are
                                                            almost certainly wrong.
                                                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                          type: string
                                                        optional:
                                                          description: Specify whether
                                                            the ConfigMap or its key
                                                            must be defined
                                                          type: boolean
                                                      required:
                                                      - key
                                                      type: object
                                                      x-kubernetes-map-type: atomic
                                                    fieldRef:
                                                      description: |-
                                                        Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                                        spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                                      properties:
                                                        apiVersion:
                                                          description: Version of
                                                            the schema the FieldPath
                                                            is written in terms of,
                                                            defaults to "v1".
                                                          type: string
                                                        fieldPath:
                                                          description: Path of the
                                                            field to select in the
                                                            specified API version.
                                                          type: string
                                                      required:
                                                      - fieldPath
                                                      type: object
                                                      x-kubernetes-map-type: atomic
                                                    fileKeyRef:
                                                      description: |-
                                                        FileKeyRef selects a key of the env file.
                                                        Requires the EnvFiles feature gate to be enabled.
                                                      properties:
                                                        key:
                                                          description: |-
                                                            The key within the env file. An invalid key will prevent the pod from starting.
                                                            The keys defined within a source may consist of any printable ASCII characters except '='.
                                                            During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                                          type: string
                                                        optional:
                                                          default: false
                                                          description: |-
                                                            Specify whether the file or its key must be defined. If the file or key
                                                            does not exist, then the env var is not published.
                                                            If optional is set to true and the specified key does not exist,
                                                            the environment variable will not be set in the Pod's containers.

                                                            If optional is set to false and the specified key does not exist,
                                                            an error will be returned during Pod creation.
                                                          type: boolean
                                                        path:
                                                          description: |-
                                                            The path within the volume from which to select the file.
                                                            Must be relative and may not contain the '..' path or start with '..'.
                                                          type: string
                                                        volumeName:
                                                          description: The name of
                                                            the volume mount containing
                                                            the env file.
                                                          type: string
                                                      required:
                                                      - key
                                                      - path
                                                      - volumeName
                                                      type: object
                                                      x-kubernetes-map-type: atomic
                                                    resourceFieldRef:
                                                      description: |-
                                                        Selects a resource of the container: only resources limits and requests
                                                        (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                                      properties:
                                                        containerName:
                                                          description: 'Container
                                                            name: required for volumes,
                                                            optional for env vars'
                                                          type: string
                                                        divisor:
                                                          anyOf:
                                                          - type: integer
                                                          - type: string
                                                          description: Specifies the
                                                            output format of the exposed
                                                            resources, defaults to
                                                            "1"
                                                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                                          x-kubernetes-int-or-string: true
                                                        resource:
                                                          description: 'Required:
                                                            resource to select'
                                                          type: string
                                                      required:
                                                      - resource
                                                      type: object
                                                      x-kubernetes-map-type: atomic
                                                    secretKeyRef:
                                                      description: Selects a key of
                                                        a secret in the pod's namespace
                                                      properties:
                                                        key:
                                                          description: The key of
                                                            the secret to select from.  Must
                                                            be a valid secret key.
                                                          type: string
                                                        name:
                                                          default: ""
                                                          description: |-
                                                            Name of the referent.
                                                            This field is effectively required, but due to backwards compatibility is
                                                            allowed to be empty. Instances of this type with an empty value here are
                                                            almost certainly wrong.
                                                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                          type: string
                                                        optional:
                                                          description: Specify whether
                                                            the Secret or its key
                                                            must be defined
                                                          type: boolean
                                                      required:
                                                      - key
                                                      type: object
                                                      x-kubernetes-map-type: atomic
                                                  type: object
                                              required:
                                              - name
                                              type: object
                                            type: array
                                            x-kubernetes-preserve-unknown-fields: true
                                          image:
                                            type: string
                                        required:
                                        - image
                                        type: object
                                      maxAttempts:
                                        default: 3
                                        type: integer
                                      name:
                                        description: |-
                                          Name uniquely identifies this template within the gate for status tracking
                                          and Job naming. Required when type == "job" (used to generate Job name).
                                        type: string
                                      plugin:
                                        description: PluginGateSpec references an
                                          external gate registered through Plugin.
                                        properties:
                                          name:
                                            description: Name is Plugin.spec.name
                                              for a ready gate plugin.
                                            type: string
                                        required:
                                        - name
                                        type: object
                                      timeout:
                                        type: string
                                      type:
                                        description: Type dispatches to a built-in,
                                          plugin-backed, or in-process registered
                                          gate.
                                        minLength: 1
                                        type: string
                                      webhook:
                                        description: WebhookGateSpec configures the
                                          HTTP webhook gate.
                                        properties:
                                          pollInterval:
                                            type: string
                                          url:
                                            type: string
                                        required:
                                        - url
                                        type: object
                                    required:
                                    - type
                                    type: object
                                  type: array
                                verification:
                                  description: |-
                                    VerificationGateSpec configures verification policy that Kapro delegates to
                                    the configured delivery substrate.
                                  properties:
                                    cosignPolicy:
                                      description: |-
                                        CosignPolicySpec records the cosign policy the delivery substrate should
                                        enforce for the artifact.
                                      properties:
                                        key:
                                          description: KeyVerificationSpec configures
                                            static public key cosign verification.
                                          properties:
                                            secretRef:
                                              description: CosignKeySecretRef identifies
                                                a cosign public key stored in a Kubernetes
                                                Secret.
                                              properties:
                                                key:
                                                  default: cosign.pub
                                                  type: string
                                                name:
                                                  type: string
                                                namespace:
                                                  default: kapro-system
                                                  type: string
                                              required:
                                              - name
                                              type: object
                                          required:
                                          - secretRef
                                          type: object
                                        keyless:
                                          description: KeylessVerificationSpec configures
                                            OIDC keyless cosign verification.
                                          properties:
                                            issuer:
                                              type: string
                                            rekorURL:
                                              type: string
                                            subject:
                                              type: string
                                          type: object
                                      type: object
                                  type: object
                              type: object
                            mode:
                              description: |-
                                Mode controls how this stage gate is evaluated.
                                auto evaluates configured gate checks without human approval.
                                manual waits only when approval.required=true.
                                scheduled is reserved for time-windowed gates.
                              enum:
                              - auto
                              - manual
                              - scheduled
                              type: string
                            notifications:
                              description: |-
                                Notifications configures stage-level notification targets for gate
                                outcomes. Notification delivery is best-effort and does not decide the
                                gate result.
                              items:
                                description: NotificationSpec configures where and
                                  when to send delivery lifecycle events.
                                properties:
                                  email:
                                    description: |-
                                      Email configures SMTP email delivery.
                                      Required when type=email.
                                    properties:
                                      from:
                                        type: string
                                      smtpSecretRef:
                                        description: |-
                                          LocalObjectReference contains enough information to let you locate the
                                          referenced object inside the same namespace.
                                        properties:
                                          name:
                                            default: ""
                                            description: |-
                                              Name of the referent.
                                              This field is effectively required, but due to backwards compatibility is
                                              allowed to be empty. Instances of this type with an empty value here are
                                              almost certainly wrong.
                                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                            type: string
                                        type: object
                                        x-kubernetes-map-type: atomic
                                        x-kubernetes-preserve-unknown-fields: true
                                      to:
                                        items:
                                          type: string
                                        minItems: 1
                                        type: array
                                    required:
                                    - smtpSecretRef
                                    - to
                                    type: object
                                  events:
                                    description: |-
                                      Events filters which lifecycle events trigger this notification.
                                      Uses stable semantic event types. Currently emitted events:
                                        kapro.promotionrun.started, kapro.promotionrun.completed, kapro.promotionrun.failed,
                                        kapro.promotionrun.rollback.started, kapro.promotionrun.stage.completed,
                                        kapro.promotionrun.gate.passed, kapro.promotionrun.gate.failed,
                                        kapro.promotionrun.approval.required,
                                        kapro.promotionrun.target.pending, kapro.promotionrun.target.verification,
                                        kapro.promotionrun.target.health_check, kapro.promotionrun.target.soaking,
                                        kapro.promotionrun.target.metrics_check, kapro.promotionrun.target.applying,
                                        kapro.promotionrun.target.converged, kapro.promotionrun.target.failed,
                                        kapro.promotionrun.target.skipped.
                                      Empty means all events.
                                    items:
                                      type: string
                                    type: array
                                  slack:
                                    description: |-
                                      Slack configures Slack message delivery.
                                      Required when type=slack.
                                    properties:
                                      channel:
                                        description: Channel is the Slack channel
                                          to post to.
                                        type: string
                                    required:
                                    - channel
                                    type: object
                                  type:
                                    description: Type selects the notification substrate.
                                    enum:
                                    - webhook
                                    - slack
                                    - email
                                    type: string
                                  webhook:
                                    description: |-
                                      Webhook configures HTTP POST delivery.
                                      Required when type=webhook.
                                    properties:
                                      format:
                                        default: json
                                        description: |-
                                          Format selects the payload format.
                                            json (default): plain JSON event payload.
                                            cloudevents: CloudEvents v1.0 structured content mode.
                                        enum:
                                        - json
                                        - cloudevents
                                        type: string
                                      url:
                                        description: URL is the HTTP endpoint to POST
                                          events to.
                                        type: string
                                    required:
                                    - url
                                    type: object
                                required:
                                - type
                                type: object
                              type: array
                            onFailure:
                              default: halt
                              description: |-
                                OnFailure controls what Fleet does when a gate fails or times out.
                                  halt (default): stop the rollout for this target and wait for human intervention.
                                    Use for checkout systems where automated rollback is too risky.
                                  rollback: automatically revert to the previous version.
                                    Only effective when a previous successful apply exists (PreviousVersion is set).
                                  continue: mark the gate as skipped and advance to the next phase.
                              enum:
                              - halt
                              - rollback
                              - continue
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: mode is required
                            rule: has(self.mode)
                          - message: expressionRef is reserved until external gate
                              expression resolution is implemented
                            rule: '!has(self.expressionRef)'
                        name:
                          description: Name of the stage.
                          type: string
                        selector:
                          additionalProperties:
                            type: string
                          description: |-
                            Selector is a simple label map that matches clusters by labels. Standalone
                            Plan resources use Kubernetes LabelSelector syntax instead.
                          type: object
                      required:
                      - name
                      - selector
                      type: object
                    type: array
                required:
                - stages
                type: object
              registry:
                description: |-
                  Registry is the OCI registry URL for generated pull-mode artifacts.
                  Native Argo/Flux sources may omit it when no Fleet-packaged artifact is used.
                properties:
                  provider:
                    default: generic
                    description: Provider is the auth provider (generic, gcp, aws,
                      azure).
                    type: string
                  secretRef:
