---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: agentpolicies.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: AgentPolicy
    listKind: AgentPolicyList
    plural: agentpolicies
    shortNames:
    - agp
    singular: agentpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.identity.serviceAccountName
      name: SA
      type: string
    - jsonPath: .spec.priority
      name: Priority
      type: integer
    - jsonPath: .status.activeDecisions
      name: Active
      type: integer
    - jsonPath: .spec.suspended
      name: Suspended
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentPolicy defines the trust boundary, scope, and guardrails for one AI
          agent identity within the Kapro progressive delivery system.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentPolicySpec defines the trust boundary for one AI agent
              identity.
            properties:
              audit:
                description: Audit defines what the agent must provide with each decision.
                properties:
                  minReasoningLength:
                    default: 50
                    description: MinReasoningLength is the minimum character count
                      for reasoning.
                    format: int32
                    minimum: 0
                    type: integer
                  requireConfidenceScore:
                    default: true
                    description: RequireConfidenceScore mandates a numeric confidence
                      score.
                    type: boolean
                  requireMetricReferences:
                    description: RequireMetricReferences mandates the reasoning reference
                      specific metrics.
                    type: boolean
                  requireReasoning:
                    default: true
                    description: RequireReasoning mandates human-readable reasoning.
                    type: boolean
                required:
                - requireConfidenceScore
                - requireReasoning
                type: object
              blastRadius:
                description: BlastRadius caps the maximum fleet impact per PromotionRun.
                properties:
                  maxAbsoluteClusters:
                    description: MaxAbsoluteClusters is the hard cap regardless of
                      percentages.
                    format: int32
                    type: integer
                  maxPercentOfFleet:
                    description: |-
                      MaxPercentOfFleet is the maximum percentage of total clusters
                      the agent may approve in a single PromotionRun.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  maxPercentPerTier:
                    additionalProperties:
                      format: int32
                      type: integer
                    description: MaxPercentPerTier caps per-tier, keyed by kapro.io/tier
                      label.
                    type: object
                type: object
              confidence:
                description: Confidence defines minimum confidence thresholds.
                properties:
                  default:
                    description: Default is the baseline confidence threshold.
                    maximum: 1
                    minimum: 0
                    type: number
                  stageOverrides:
                    additionalProperties:
                      type: number
                    description: StageOverrides sets thresholds keyed by stage name.
                    type: object
                  tierOverrides:
                    additionalProperties:
                      type: number
                    description: TierOverrides sets thresholds keyed by kapro.io/tier
                      label value.
                    type: object
                required:
                - default
                type: object
              escalation:
                description: Escalation controls behavior when confidence is insufficient.
                properties:
                  action:
                    default: hold
                    description: Action is the default escalation behavior.
                    enum:
                    - reject
                    - hold
                    - escalate
                    type: string
                  holdDuration:
                    description: |-
                      HoldDuration is how long to hold before auto-rejecting.
                      Only used when Action is "hold". Empty means hold indefinitely.
                    type: string
                required:
                - action
                type: object
              identity:
                description: Identity binds this policy to a specific agent ServiceAccount.
                properties:
                  serviceAccountName:
                    description: ServiceAccountName is the Kubernetes ServiceAccount
                      the agent authenticates as.
                    type: string
                  serviceAccountNamespace:
                    default: kapro-system
                    description: ServiceAccountNamespace is the namespace of the ServiceAccount.
                    type: string
                required:
                - serviceAccountName
                type: object
              mode:
                default: recommend
                description: Mode controls the agent's authority level.
                enum:
                - auto
                - recommend
                - disabled
                type: string
              priority:
                default: 100
                description: |-
                  Priority determines precedence when multiple policies overlap.
                  Lower number = higher priority.
                format: int32
                maximum: 1000
                minimum: 0
                type: integer
              rateLimits:
                description: RateLimits caps the agent's decision throughput.
                properties:
                  cooldown:
                    description: Cooldown is the minimum duration between consecutive
                      approvals.
                    type: string
                  maxApprovalsPerDay:
                    description: MaxApprovalsPerDay is the maximum approve decisions
                      per day.
                    format: int32
                    type: integer
                  maxApprovalsPerHour:
                    description: MaxApprovalsPerHour is the maximum approve decisions
                      per hour.
                    format: int32
                    type: integer
                  maxConcurrent:
                    description: MaxConcurrent is the maximum in-flight approvals
                      at any time.
                    format: int32
                    type: integer
                type: object
              scope:
                description: Scope restricts which stages and clusters this agent
                  may act on.
                properties:
                  clusterSelector:
                    description: ClusterSelector restricts to targets matching these
                      labels.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  countryProfiles:
                    description: CountryProfiles assigns risk tiers and confidence
                      overrides per geography.
                    items:
                      description: CountryRiskProfile assigns a risk tier to a set
                        of countries.
                      properties:
                        countries:
                          description: Countries is a list of ISO 3166-1 alpha-2 country
                            codes.
                          items:
                            type: string
                          type: array
                        minConfidence:
                          description: |-
                            MinConfidence overrides the base threshold for these countries.
                            Effective threshold is max(base, this).
                          maximum: 1
                          minimum: 0
                          type: number
                        mode:
                          description: Mode overrides the agent mode for these countries.
                          enum:
                          - auto
                          - recommend
                          - disabled
                          type: string
                        requireHumanCosign:
                          description: RequireHumanCosign requires human Approval
                            in addition to agent decision.
                          type: boolean
                        riskTier:
                          description: RiskTier classifies the regulatory/operational
                            risk.
                          enum:
                          - low
                          - medium
                          - high
                          - critical
                          type: string
                      required:
                      - countries
                      - minConfidence
                      - riskTier
                      type: object
                    type: array
                  excludeClusters:
                    description: ExcludeClusters is an explicit denylist of FleetCluster
                      names.
                    items:
                      type: string
                    type: array
                  excludeStages:
                    description: ExcludeStages lists stage names explicitly denied.
                      Takes precedence over Stages.
                    items:
                      type: string
                    type: array
                  stages:
                    description: Stages lists stage names the agent may approve. Empty
                      means all stages.
                    items:
                      type: string
                    type: array
                type: object
              suspended:
                default: false
                description: Suspended pauses this agent policy.
                type: boolean
              timeWindows:
                description: TimeWindows restricts when the agent may issue decisions.
                items:
                  description: AgentTimeWindow restricts when the agent may issue
                    decisions.
                  properties:
                    daysOfWeek:
                      description: DaysOfWeek restricts to specific days. Empty means
                        all days.
                      items:
                        type: string
                      type: array
                    deny:
                      description: 'Deny inverts the window: the agent is BLOCKED
                        during this window.'
                      type: boolean
                    endTime:
                      description: EndTime is the daily end time in HH:MM format (24h).
                      type: string
                    name:
                      description: Name identifies this window for audit purposes.
                      type: string
                    startTime:
                      description: StartTime is the daily start time in HH:MM format
                        (24h).
                      type: string
                    timezone:
                      default: UTC
                      description: Timezone is an IANA timezone string.
                      type: string
                  required:
                  - endTime
                  - name
                  - startTime
                  type: object
                type: array
            required:
            - audit
            - confidence
            - escalation
            - identity
            - mode
            - scope
            type: object
          status:
            description: AgentPolicyStatus is the observed state of the AgentPolicy.
            properties:
              activeDecisions:
                description: ActiveDecisions is the count of in-flight decisions by
                  this agent.
                format: int32
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              decisionsToday:
                description: DecisionsToday is the count of decisions made in the
                  current UTC day.
                format: int32
                type: integer
              lastDecisionAt:
                description: LastDecisionAt is the timestamp of the last decision.
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
