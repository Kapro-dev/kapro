    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PromotionPolicy is a reusable guardrail evaluated before PromotionRun
          creation. CEL and freeze-window policies are enforced by the built-in runtime.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PromotionPolicySpec declares reusable policy checks for a Promotion. The API
              is preview-only until the PromotionPolicy runtime is enabled.
            properties:
              cel:
                description: CEL contains simple expression checks evaluated by Kapro.
                items:
                  description: CELPolicyRule is one CEL policy expression.
                  properties:
                    expression:
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                  required:
                  - expression
                  - name
                  type: object
                type: array
              freezeWindows:
                description: FreezeWindows blocks promotions during named time windows.
                items:
                  description: AgentTimeWindow restricts when the agent may issue
                    decisions.
                  properties:
                    daysOfWeek:
                      description: DaysOfWeek restricts to specific days. Empty means
                        all days.
                      items:
                        type: string
                      type: array
                    deny:
                      description: 'Deny inverts the window: the agent is BLOCKED
                        during this window.'
                      type: boolean
                    endTime:
                      description: EndTime is the daily end time in HH:MM format (24h).
                      type: string
                    name:
                      description: Name identifies this window for audit purposes.
                      type: string
                    startTime:
                      description: StartTime is the daily start time in HH:MM format
                        (24h).
                      type: string
                    timezone:
                      default: UTC
                      description: Timezone is an IANA timezone string.
                      type: string
                  required:
                  - endTime
                  - name
                  - startTime
                  type: object
                type: array
              mode:
                default: enforce
                description: Mode controls whether this policy is required or advisory.
                enum:
                - enforce
                - audit
                type: string
              onFailure:
                default: halt
                description: OnFailure controls behavior when this policy fails.
                enum:
                - halt
                - rollback
                - continue
                type: string
              selector:
                description: Selector limits where this policy applies.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              verification:
                description: Verification configures artifact signature/provenance
