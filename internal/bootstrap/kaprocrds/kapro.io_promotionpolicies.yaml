                                type: string
                              name:
                                type: string
                              namespace:
                                default: kapro-system
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - secretRef
                        type: object
                      keyless:
                        description: KeylessVerificationSpec configures OIDC keyless
                          cosign verification.
                        properties:
                          issuer:
                            type: string
                          rekorURL:
                            type: string
                          subject:
                            type: string
                        type: object
                    type: object
                type: object
