                properties:
                  cosignPolicy:
                    description: CosignPolicySpec specifies how cosign should verify
                      the artifact signature.
                    properties:
                      key:
                        description: KeyVerificationSpec configures static public
                          key cosign verification.
                        properties:
                          secretRef:
