---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleetclusters.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: FleetCluster
    listKind: FleetClusterList
    plural: fleetclusters
    shortNames:
    - mc
    - fc
    - fleetcluster
    singular: fleetcluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Registered")].status
      name: Registered
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .status.health.allWorkloadsReady
      name: Healthy
      type: boolean
    - jsonPath: .status.activePromotionRun
      name: PromotionRun
      type: string
    - jsonPath: .status.capabilities.region
      name: Region
      priority: 1
      type: string
    - jsonPath: .status.capabilities.cloud
      name: Cloud
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FleetCluster represents one physical cluster in the Kapro fleet.
          It merges delivery config, fleet registration state,
          and BootstrapToken (one-time registration credential) into a single resource.

          Labels on FleetCluster drive PromotionPlan stage selection (tier, region, wave, cloud, etc.).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FleetClusterSpec defines the desired state of a cluster in
              the Kapro fleet.
            properties:
              bootstrap:
                description: |-
                  Bootstrap configures one-time cluster self-registration.

                  Protocol (CSR-native, K8s-API transport — works across any cloud /
                  any cluster / any K8s distribution):
                   1. Platform team creates this FleetCluster with spec.bootstrap.tokenHash
                      (SHA-256 of a random pre-image) and a TTL.
                   2. kapro-cluster-controller boots on the spoke with the plaintext token,
                      generates a keypair, and submits a CertificateSigningRequest to the
                      hub's K8s API with signerName=kapro.io/cluster-bootstrap. The CSR
                      username encodes the cluster name and the request annotation carries
                      the SHA-256 of the plaintext token.
                   3. The hub CSR approver verifies the SHA-256 matches this field, that
                      spec.bootstrap.expiresAt is in the future, and that
                      status.bootstrap.used is false. On success it approves the CSR,
                      signs the cert, and creates a per-cluster ClusterRole+Binding with
                      resourceNames=[<this cluster>] for fleetclusters/status and the
                      heartbeat Lease.
                   4. The spoke uses the issued client cert (auto-rotated by client-go)
                      for steady-state K8s API calls. No bearer tokens. No long-lived
                      credentials. No custom HTTP protocol.

                  One bootstrap slot per cluster. To re-bootstrap, the platform team
                  updates tokenHash + expiresAt (or ttl); the hub clears status.bootstrap
                  on the next reconcile.
                properties:
                  expiresAt:
                    description: |-
                      ExpiresAt is the absolute UTC time after which this bootstrap slot is invalid.
                      Set explicitly by the platform team for auditability.
                      If empty and TTL is set, the FleetCluster controller computes it on first reconcile.
                    format: date-time
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are applied to bootstrap resources created during registration
                      (ServiceAccount, kubeconfig Secret). Not used for stage selection — use
                      FleetCluster.metadata.labels for that.
                    type: object
                  tokenHash:
                    description: |-
                      TokenHash is the SHA-256 hex hash of the pre-image bootstrap token (exactly 64 lowercase hex chars).
                      Platform team hashes the raw token and stores only the hash here; the cluster-controller
                      presents the plaintext pre-image. This ensures tokenHash cannot be used directly.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  ttl:
                    description: |-
                      TTL is a convenience duration (e.g. "24h") used when ExpiresAt is not set explicitly.
                      The FleetCluster controller writes spec.bootstrap.expiresAt from
                      metadata.creationTimestamp + TTL at creation time and leaves it immutable.
                    type: string
                type: object
              consecutiveFailureThreshold:
                description: |-
                  ConsecutiveFailureThreshold is the number of consecutive heartbeat
                  misses required before the FleetCluster Ready condition flips to False
                  and the Phase transitions to Unreachable. Defaults to 3 to absorb
                  transient network blips without flapping. Pattern adopted from Sveltos
                  SveltosCluster.spec.consecutiveFailureThreshold.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              delivery:
                description: Delivery configures the backend-neutral delivery adapter
                  for this cluster.
                properties:
                  backendRef:
                    description: |-
                      BackendRef is the BackendProfile name. Built-in profiles commonly use
                      "flux" or "argo"; external profiles may use any platform-defined name.
                    type: string
                  mode:
                    default: pull
                    description: Mode controls who performs delivery.
                    enum:
                    - push
                    - pull
                    type: string
                  parameters:
                    additionalProperties:
                      type: string
                    description: |-
                      Parameters are opaque backend-specific settings, following the
                      StorageClass.parameters pattern. Kapro core does not interpret them.
                    type: object
                required:
                - backendRef
                - mode
                type: object
              desiredAppKey:
                description: |-
                  DesiredAppKey is the key the cluster-controller uses when writing
                  status.currentVersions. Defaults to "default".
                  Deprecated: use DesiredVersions map for multi-artifact promotionruns.
                type: string
              desiredVersion:
                description: |-
                  DesiredVersion is written by the kapro-operator (PromotionRunReconciler).
                  The cluster-controller polls this field and patches the local delivery system.
                  Deprecated: use DesiredVersions map for multi-artifact promotionruns.
                type: string
              desiredVersions:
                additionalProperties:
                  type: string
                description: |-
                  DesiredVersions is a map of appKey → version written by the kapro-operator.
                  The cluster-controller iterates this map and patches local delivery for each changed entry.
                  This replaces the single DesiredVersion/DesiredAppKey pair for multi-artifact promotionruns.
                type: object
              healthCheck:
                description: HealthCheck configures active health polling for this
                  cluster.
                properties:
                  endpoint:
                    type: string
                  interval:
                    type: string
                required:
                - endpoint
                - interval
                type: object
              suspend:
                description: Suspend pauses all reconciliation for this cluster.
                type: boolean
              topology:
                description: Topology holds hardware and scheduling metadata used
                  by PromotionPlan stage selectors.
                properties:
                  accelerator:
                    description: |-
                      Accelerator is the GPU/accelerator type in this cluster.
                      Well-known values: nvidia-h100, nvidia-a100, nvidia-l40s, amd-mi300x, tpu-v5e.
                    type: string
                  gpuCount:
                    description: GPUCount is the total number of GPU devices across
                      all nodes in this cluster.
                    format: int32
                    minimum: 0
                    type: integer
                  gpuMemoryGb:
                    description: GPUMemoryGB is the memory per GPU device in gigabytes
                      (e.g. 80 for H100 SXM).
                    format: int32
                    minimum: 0
                    type: integer
                  nodeCount:
                    description: NodeCount is the number of GPU nodes (not total devices).
                    format: int32
                    minimum: 0
                    type: integer
                  tier:
                    description: |-
                      Tier classifies the cluster's role in the delivery wave.
                      Well-known values: canary, shadow, prod.
                    type: string
                type: object
            required:
            - delivery
            type: object
          status:
            description: FleetClusterStatus is the observed state — written by cluster-controller
              and hub.
            properties:
              activePromotionRun:
                description: ActivePromotionRun is the PromotionRun currently being
                  processed for this cluster.
                type: string
              bootstrap:
                description: Bootstrap tracks the one-time registration state. Written
                  by the hub.
                properties:
                  boundCSRName:
                    description: |-
                      BoundCSRName is the CSR that consumed this bootstrap slot. Enables
                      idempotent retry: if status patching fails after CSR approval, the next
                      reconcile recognises the same CSR via this field and re-converges status
                      rather than rejecting it as a replay.
                    type: string
                  issuedBootstrapKubeconfig:
                    description: |-
                      IssuedBootstrapKubeconfig is the name of an optional kubeconfig Secret in
                      kapro-system. Legacy from the bearer-token bootstrap mode; the CSR flow
                      returns a signed cert directly to the spoke and leaves this empty.
                    type: string
                  issuedClusterRole:
                    description: |-
                      IssuedClusterRole is the name of the per-cluster ClusterRole created by
                      the bootstrap reconciler. Naming is deterministic (kapro-agent-<cluster>),
                      but recording it makes deletion cascade trivial without re-derivation.
                    type: string
                  issuedClusterRoleBinding:
                    description: |-
                      IssuedClusterRoleBinding is the name of the per-cluster ClusterRoleBinding
                      created by the bootstrap reconciler. Same rationale as IssuedClusterRole.
                    type: string
                  issuedCredentialFor:
                    description: |-
                      IssuedCredentialFor is the cluster name the bootstrap credential was issued for.
                      Mirrors metadata.name on a successful registration; serves as a defensive
                      cross-check when the hub controller later loads RBAC by deterministic name.
                    type: string
                  used:
                    description: |-
                      Used is true once the bootstrap token has been consumed by a successful CSR.
                      Used in CAS predicate to enforce one-time use — a second CSR carrying the
                      same token hash is rejected regardless of which spoke submits it.
                    type: boolean
                  usedAt:
                    description: UsedAt is when the bootstrap token was consumed.
                    format: date-time
                    type: string
                type: object
              capabilities:
                description: Capabilities is the self-reported capability profile
                  written at registration time.
                properties:
                  accountID:
                    description: |-
                      AccountID is the cloud account or project identifier.
                      GCP: project ID. AWS: account ID. Azure: subscription UUID.
                      DigitalOcean: team ID. StackIT: project UUID.
                      Used for cost attribution, audit, and cross-account routing.
                    type: string
                  argoCDVersion:
                    description: |-
                      ArgoCDVersion is the ArgoCD version installed on this cluster (e.g. "2.11.0").
                      Empty when ArgoCD is not installed.
                    type: string
                  cloud:
                    description: |-
                      Cloud identifies the cloud provider hosting this cluster.
                      Well-known values: gcp, aws, azure, digitalocean, stackit, on-prem.
                      Written by kapro-cluster-controller based on IMDS detection.
                    type: string
                  clusterID:
                    description: |-
                      ClusterID is the cloud-provider-assigned cluster identifier.
                      GCP: cluster resource name. AWS: cluster ARN. Azure: resource ID.
                      DigitalOcean: cluster UUID. StackIT: cluster UUID.
                    type: string
                  fluxVersion:
                    description: |-
                      FluxVersion is the Flux version installed on this cluster (e.g. "2.3.0").
                      Empty when Flux is not installed.
                    type: string
                  k8sVersion:
                    description: K8sVersion is the Kubernetes server version (e.g.
                      "1.30.2").
                    type: string
                  nodeCount:
                    description: NodeCount is the total number of nodes in the cluster
                      at registration time.
                    type: integer
                  region:
                    description: Region is the cloud region of this cluster (e.g.
                      europe-west1, us-east-1, westeurope).
                    type: string
                  sveltosVersion:
                    description: |-
                      SveltosVersion is the Sveltos version installed on this cluster.
                      Empty when Sveltos is not installed.
                    type: string
                  zone:
                    description: |-
                      Zone is the cloud availability zone of the primary node pool
                      (e.g. europe-west1-b, us-east-1a, 1). Empty for regional clusters.
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controllerVersion:
                description: ControllerVersion is the kapro-cluster-controller version
                  running on this cluster.
                type: string
              currentVersions:
                additionalProperties:
                  type: string
                description: CurrentVersions maps app keys to deployed versions. Written
                  by cluster-controller.
                type: object
              deliverySystem:
                description: DeliverySystem is the delivery system detected by the
                  cluster-controller (e.g. "flux").
                type: string
              health:
                description: Health aggregates workload health. Written by cluster-controller.
                properties:
                  allWorkloadsReady:
                    type: boolean
                  failedWorkloads:
                    type: integer
                  message:
                    type: string
                  readyWorkloads:
                    type: integer
                  totalWorkloads:
                    type: integer
                type: object
              lastHeartbeat:
                description: |-
                  LastHeartbeat is the RFC3339 timestamp of the last cluster-controller heartbeat.
                  Deprecated: the authoritative heartbeat source is now the coordination.k8s.io/v1
                  Lease "kapro-heartbeat-<cluster>" in kapro-system. This field is still written
                  for backward compatibility but should not be relied upon for freshness checks.
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: ClusterPhase represents the convergence state of a workload
                  cluster.
                enum:
                - Pending
                - Applying
                - Converging
                - Converged
                - Failed
                - Unreachable
                type: string
              provider:
                description: Provider identifies how this cluster is managed (e.g.
                  "gcp-fleet", "kubeconfig").
                type: string
              version:
                description: |-
                  Version is the primary deployed version (first entry in CurrentVersions).
                  Shown in kubectl/k9s printcolumns for quick fleet overview.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
