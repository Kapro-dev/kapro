version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - unused
    - gofmt
    - misspell
    - unconvert
    - gosec
    - noctx
    - bodyclose
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes: []

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kapro.io/kapro

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-files:
    - "zz_generated\\."
