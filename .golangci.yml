version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - gosec
    - noctx
    - bodyclose

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kapro.io/kapro

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gosec:
    excludes: []

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
    - path: zz_generated\.
      linters:
        - unused
  max-issues-per-linter: 0
  max-same-issues: 0
