version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: zz_generated\.
        linters:
          - unused
    presets:
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kapro.io/kapro
