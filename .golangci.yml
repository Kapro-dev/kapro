version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - unused
    - misspell
    - unconvert
    - gosec
    - noctx
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
      - path: zz_generated\.
        linters:
          - unused
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes: []

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kapro.io/kapro
