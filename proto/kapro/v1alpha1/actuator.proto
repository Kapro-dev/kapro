syntax = "proto3";

package kapro.v1alpha1;

option go_package = "kapro.io/kapro/proto/gen/actuator/v1alpha1";

import "google/protobuf/timestamp.proto";

// ActuatorService is the contract between the Kapro promotion engine and any
// delivery system. Built-in implementations ship with Kapro:
//   - flux:   patches OCIRepository tag → Flux source-controller pulls → Kustomize applies
//   - argocd: patches Application.spec.source.targetRevision
//   - helm:   runs `helm upgrade --set image.tag=<version>`
//
// External implementations register via PluginRegistration CRD and communicate
// over this gRPC interface.
service ActuatorService {
  // Apply instructs the delivery system to roll out version to environment.
  // Idempotent — calling Apply twice with the same version is safe.
  rpc Apply(ApplyRequest) returns (ApplyResponse);

  // IsConverged returns true when the delivery system confirms the target
  // version is fully rolled out and all workloads are healthy.
  rpc IsConverged(IsConvergedRequest) returns (IsConvergedResponse);

  // Rollback reverts the environment to the given previous version.
  // Called by the rollback engine when PromotionPolicy.onFailure == rollback.
  rpc Rollback(RollbackRequest) returns (RollbackResponse);

  // GetStatus returns the current observed state of an environment.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

message ApplyRequest {
  // environment_ref is the name of the Environment CRD.
  string environment_ref = 1;
  // version is the OCI tag / Helm chart version / git ref to apply.
  string version = 2;
  // previous_version is the currently running version — captured for rollback.
  string previous_version = 3;
  // delivery_system identifies which actuator impl to use: flux | argocd | helm.
  string delivery_system = 4;
  // config carries delivery-system-specific configuration (JSON-encoded).
  bytes config = 5;
}

message ApplyResponse {
  bool accepted = 1;
  string message = 2;
}

message IsConvergedRequest {
  string environment_ref = 1;
  string version = 2;
  string delivery_system = 3;
}

message IsConvergedResponse {
  bool converged = 1;
  string message = 2;
  // observed_version is what the delivery system reports as currently running.
  string observed_version = 3;
  // workload_statuses contains per-workload convergence detail.
  repeated WorkloadStatus workload_statuses = 4;
}

message WorkloadStatus {
  string name = 1;
  string kind = 2;
  bool ready = 3;
  string message = 4;
}

message RollbackRequest {
  string environment_ref = 1;
  string previous_version = 2;
  string delivery_system = 3;
}

message RollbackResponse {
  bool accepted = 1;
  string message = 2;
}

message GetStatusRequest {
  string environment_ref = 1;
  string delivery_system = 2;
}

message GetStatusResponse {
  string current_version = 1;
  string phase = 2; // Pending | Applying | Converged | Failed
  google.protobuf.Timestamp last_updated = 3;
  repeated WorkloadStatus workload_statuses = 4;
}
