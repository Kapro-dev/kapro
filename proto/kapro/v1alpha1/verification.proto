syntax = "proto3";

package kapro.v1alpha1;

option go_package = "kapro.io/kapro/proto/gen/verification/v1alpha1";

import "google/protobuf/timestamp.proto";

// VerificationService validates the supply chain integrity of an OCI artifact
// before it is allowed to be promoted.
//
// Built-in implementations:
//   - cosign:    sigstore image signature verification (keyless + key-based)
//   - in-toto:  supply chain provenance attestation verification
//   - notation: OCI artifact signing via Notary v2 / CNCF Notation
//
// Any gate that answers "is this artifact trustworthy?" belongs here.
service VerificationService {
  // VerifySignature checks that the artifact was signed by a trusted key/identity.
  rpc VerifySignature(VerifySignatureRequest) returns (VerifyResponse);

  // VerifyAttestation verifies a supply chain attestation (SLSA provenance, SBOM, etc.)
  rpc VerifyAttestation(VerifyAttestationRequest) returns (VerifyResponse);

  // VerifyPolicy runs an OPA/Rego policy against the artifact's attestations.
  rpc VerifyPolicy(VerifyPolicyRequest) returns (VerifyResponse);
}

message ArtifactRef {
  string repository = 1;
  string digest = 2;  // SHA256 digest — always use digest, never tag, for verification
  string tag = 3;     // informational only
}

message VerifySignatureRequest {
  ArtifactRef artifact = 1;
  // verifier identifies which implementation to use: cosign | notation
  string verifier = 2;
  // trusted_identities is a list of OIDC identities or public keys to trust.
  // For cosign keyless: ["https://github.com/org/repo/.github/workflows/release.yml@refs/heads/main"]
  repeated string trusted_identities = 3;
  // certificate_oidc_issuer for keyless cosign verification.
  string certificate_oidc_issuer = 4;
}

message VerifyAttestationRequest {
  ArtifactRef artifact = 1;
  string verifier = 2;
  // predicate_type is the in-toto predicate type to verify:
  // https://slsa.dev/provenance/v1, https://spdx.dev/Document, etc.
  string predicate_type = 3;
  repeated string trusted_identities = 4;
  string certificate_oidc_issuer = 5;
}

message VerifyPolicyRequest {
  ArtifactRef artifact = 1;
  // policy_bundle_url points to an OPA bundle containing the policy.
  string policy_bundle_url = 2;
  // policy_query is the Rego query: "data.kapro.verification.allow"
  string policy_query = 3;
}

message VerifyResponse {
  bool verified = 1;
  string message = 2;
  // signer_identity is the verified signing identity (OIDC subject or key ID).
  string signer_identity = 3;
  google.protobuf.Timestamp signed_at = 4;
  // attestations contains decoded attestation payloads for downstream use.
  repeated Attestation attestations = 5;
}

message Attestation {
  string predicate_type = 1;
  bytes payload = 2;  // JSON-encoded predicate
}
