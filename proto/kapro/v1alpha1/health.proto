syntax = "proto3";

package kapro.v1alpha1;

option go_package = "kapro.io/kapro/proto/gen/health/v1alpha1";

// HealthService assesses the health of workloads running on a cluster.
// Used by the promotion engine to determine when a cluster has converged
// and is healthy enough to advance through a gate.
//
// Built-in implementation delegates to argoproj/gitops-engine/pkg/health,
// which understands Deployment, StatefulSet, DaemonSet, Job, PVC, Ingress,
// Service, Pod, and 15+ CRDs including Argo Rollouts and Flux.
service HealthService {
  // AssessHealth returns the aggregate health of a cluster/environment.
  rpc AssessHealth(AssessHealthRequest) returns (AssessHealthResponse);

  // ListWorkloads returns per-workload health for a given namespace or label selector.
  rpc ListWorkloads(ListWorkloadsRequest) returns (ListWorkloadsResponse);

  // WatchHealth streams health updates until context cancels.
  // Used by the HealthCheck phase of the Promotion FSM.
  rpc WatchHealth(WatchHealthRequest) returns (stream HealthUpdate);
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTHY = 1;
  PROGRESSING = 2;
  DEGRADED = 3;
  SUSPENDED = 4;
  MISSING = 5;
  UNKNOWN = 6;
}

message AssessHealthRequest {
  string environment_ref = 1;
  string version = 2;
  // namespace_selector limits assessment to specific namespaces.
  repeated string namespaces = 3;
}

message AssessHealthResponse {
  HealthStatus status = 1;
  string message = 2;
  // unhealthy_count is the number of workloads not in HEALTHY state.
  int32 unhealthy_count = 3;
  int32 total_count = 4;
}

message ListWorkloadsRequest {
  string environment_ref = 1;
  repeated string namespaces = 2;
  // label_selector is a K8s label selector string.
  string label_selector = 3;
}

message ListWorkloadsResponse {
  repeated WorkloadHealth workloads = 1;
}

message WorkloadHealth {
  string name = 1;
  string namespace = 2;
  string kind = 3;
  string api_version = 4;
  HealthStatus status = 5;
  string message = 6;
}

message WatchHealthRequest {
  string environment_ref = 1;
  repeated string namespaces = 2;
  // poll_interval_seconds is how often to re-check. Default 15.
  int32 poll_interval_seconds = 3;
}

message HealthUpdate {
  string environment_ref = 1;
  HealthStatus status = 2;
  string message = 3;
  repeated WorkloadHealth changed_workloads = 4;
}
