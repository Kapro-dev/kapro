syntax = "proto3";

package kapro.v1alpha1;

option go_package = "kapro.io/kapro/proto/gen/telemetry/v1alpha1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// TelemetryService records promotion lifecycle events as structured telemetry.
// Every FSM state transition emits a span. Gate evaluations emit metrics.
// This makes promotion pipelines fully observable in any OTEL-compatible backend:
// Grafana, Honeycomb, Datadog, Jaeger, Tempo, etc.
//
// Built-in implementation uses the OpenTelemetry Go SDK.
// Metrics are also exposed on :8080/metrics (Prometheus format) via OTEL Prometheus exporter.
service TelemetryService {
  // RecordTransition emits a span for a Promotion FSM state transition.
  rpc RecordTransition(TransitionEvent) returns (RecordResponse);

  // RecordGateResult emits a metric for a gate evaluation outcome.
  rpc RecordGateResult(GateResultEvent) returns (RecordResponse);

  // RecordPromotion emits a completion span for an entire promotion (start→end).
  rpc RecordPromotion(PromotionTelemetryEvent) returns (RecordResponse);
}

message TransitionEvent {
  string promotion_ref = 1;
  string environment_ref = 2;
  string release_ref = 3;
  string version = 4;
  string from_phase = 5;
  string to_phase = 6;
  google.protobuf.Timestamp occurred_at = 7;
  // trace_id links this transition to the parent promotion trace.
  string trace_id = 8;
  map<string, string> attributes = 9;
}

message GateResultEvent {
  string promotion_ref = 1;
  string environment_ref = 2;
  string gate_type = 3;
  int32 metric_index = 4;
  bool passed = 5;
  string message = 6;
  google.protobuf.Duration evaluation_duration = 7;
  int32 consecutive_passes = 8;
  google.protobuf.Timestamp occurred_at = 9;
  map<string, string> attributes = 10;
}

message PromotionTelemetryEvent {
  string promotion_ref = 1;
  string environment_ref = 2;
  string release_ref = 3;
  string version = 4;
  string outcome = 5; // Converged | Failed | RolledBack
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp finished_at = 7;
  google.protobuf.Duration total_duration = 8;
  // gate_durations maps gate_type → time spent in that gate.
  map<string, google.protobuf.Duration> gate_durations = 9;
  map<string, string> attributes = 10;
}

message RecordResponse {
  bool accepted = 1;
}
