syntax = "proto3";

package kapro.v1alpha1;

option go_package = "kapro.io/kapro/proto/gen/policy/v1alpha1";

// PolicyService evaluates whether a release is permitted to advance to a
// given target cluster. This is a pre-flight check that runs before the
// rollout FSM starts.
//
// Example policies:
//   - "No promotions to prod on Fridays"
//   - "Prod requires image signed by our CI identity"
//   - "Only versions that passed staging for 2+ hours"
//   - "RBAC: only platform-team members can promote to de-prod"
//
// Built-in implementations:
//   - opa:     evaluates a Rego query against a policy bundle
//   - kyverno: delegates to a Kyverno ClusterPolicy via webhook
//   - rbac:    evaluates K8s RBAC rules for the Release creator
service PolicyService {
  // Evaluate checks whether the promotion is permitted.
  rpc Evaluate(PolicyRequest) returns (PolicyResponse);

  // ListPolicies returns all active policies for a target cluster.
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
}

message PromotionContext {
  string release_ref = 1;
  string target_ref = 2;
  string version = 3;
  string artifact_digest = 4;
  // requester is the K8s identity (ServiceAccount or user) who created the Release.
  string requester = 5;
  // labels from the Release and target cluster for policy evaluation.
  map<string, string> release_labels = 6;
  map<string, string> target_labels = 7;
}

message PolicyRequest {
  PromotionContext context = 1;
  // policy_type identifies which engine to use: opa | kyverno | rbac
  string policy_type = 2;
  // config carries policy-specific configuration (JSON-encoded).
  // For opa: {"bundle_url":"...","query":"data.kapro.policy.allow"}
  // For kyverno: {"cluster_policy":"kapro-promotion-policy"}
  bytes config = 3;
}

message PolicyResponse {
  bool allowed = 1;
  string reason = 2;
  // violations contains specific policy violations if allowed == false.
  repeated PolicyViolation violations = 3;
}

message PolicyViolation {
  string policy_name = 1;
  string rule_name = 2;
  string message = 3;
}

message ListPoliciesRequest {
  string target_ref = 1;
}

message ListPoliciesResponse {
  repeated PolicyInfo policies = 1;
}

message PolicyInfo {
  string name = 1;
  string policy_type = 2;
  string description = 3;
  bool enforcing = 4; // false = audit-only
}
