apiVersion: v1
kind: Service
metadata:
  name: {{ include "kapro-archiver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-archiver.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kapro-archiver.selectorLabels" . | nindent 4 }}
