---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterclassifiers.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: ClusterClassifier
    listKind: ClusterClassifierList
    plural: clusterclassifiers
    shortNames:
    - cclf
    singular: clusterclassifier
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.matchedClusters
      name: Matched
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          ClusterClassifier is a preview policy for deriving cluster classification
          labels and delivery staging hints. It is inert unless a classifier controller
          or external platform automation is explicitly installed.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClusterClassifierSpec defines a conservative, preview classification policy.
              No core controller consumes this by default in v0.2.3; platform automation can
              use it to standardize labels used by Plan stage selectors.
            properties:
              rules:
                description: |-
                  Rules are evaluated by name by future classifier automation. Rules should
                  be ordered from most-specific to least-specific by authors, but v0.2.3 does
                  not define controller precedence.
                items:
                  description: ClusterClassifierRule maps a match expression to classification
                    outputs.
                  properties:
                    delivery:
                      description: |-
                        Delivery carries optional delivery hints a classifier controller may apply
                        to matched clusters. Omitted fields leave existing Cluster delivery config
                        untouched.
                      properties:
                        staging:
                          description: |-
                            Staging declares the intended staging behavior for matched clusters. The
                            only supported v0.2.3 value is TwoPhase/Abort.
                          properties:
                            failurePolicy:
                              default: Abort
                              description: |-
                                FailurePolicy selects how dry-run failures affect commit. Abort is the
                                only supported policy and means no object is committed when any staged
                                object fails validation.
                              enum:
                              - Abort
                              type: string
                            type:
                              default: TwoPhase
                              description: Type selects the staging strategy. TwoPhase
                                is the only supported value.
                              enum:
                              - TwoPhase
                              type: string
                          type: object
                      type: object
                    labels:
                      additionalProperties:
                        type: string
                      description: |-
                        Labels are the Cluster metadata labels a classifier controller may apply.
                        These labels are intended for Plan stage selectors, for example
                        kapro.io/tier=canary or kapro.io/staging=two-phase.
                      type: object
                    match:
                      description: Match selects Clusters for this rule.
                      properties:
                        capabilities:
                          description: |-
                            Capabilities matches selected Cluster.spec/status fields. All non-empty
                            fields are ANDed.
                          properties:
                            backendRef:
                              description: BackendRef matches spec.delivery.backendRef.
                              type: string
                            cloud:
                              description: Cloud matches status.capabilities.cloud.
                              type: string
                            deliveryMode:
                              description: DeliveryMode matches spec.delivery.mode.
                              enum:
                              - push
                              - pull
                              type: string
                            provider:
                              description: Provider matches spec.provider.kind or
                                status.provider.
                              type: string
                            region:
                              description: Region matches status.capabilities.region.
                              type: string
                            topologyTier:
                              description: TopologyTier matches spec.topology.tier.
                              type: string
                            zone:
                              description: Zone matches status.capabilities.zone.
                              type: string
                          type: object
                        labels:
                          description: Labels matches Cluster.metadata.labels.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                      x-kubernetes-validations:
                      - message: at least one of labels or capabilities must be set
                        rule: has(self.labels) || has(self.capabilities)
                    name:
                      description: Name is a stable rule identifier surfaced in status
                        and audit trails.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                  required:
                  - match
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: at least one of labels or delivery must be set
                    rule: has(self.labels) || has(self.delivery)
                maxItems: 64
                minItems: 1
                type: array
              selector:
                description: |-
                  Selector narrows the Cluster set this classifier may evaluate. Empty means
                  all Clusters are eligible.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              suspend:
                description: |-
                  Suspend pauses any controller or automation that reconciles this
                  classifier. It is false by default.
                type: boolean
            required:
            - rules
            type: object
          status:
            description: |-
              ClusterClassifierStatus reports classifier evaluation state when a
              controller or external automation owns this CRD.
            properties:
              conditions:
                description: Conditions summarize readiness and validation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastEvaluationTime:
                description: LastEvaluationTime is when the classifier was last evaluated.
                format: date-time
                type: string
              matchedClusters:
                description: |-
                  MatchedClusters is the last observed number of Clusters matched by at
                  least one rule.
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
