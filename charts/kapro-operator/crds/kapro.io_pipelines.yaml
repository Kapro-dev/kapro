                      type: object
                    name:
                      description: Name uniquely identifies this stage within the
                        pipeline.
                      type: string
                    onFailure:
                      default: halt
                      description: |-
                        OnFailure controls what Kapro does when this stage fails.
                        halt (default): stop the pipeline, mark Release Failed.
                        skip: continue to downstream stages.
                        rollback: stop AND revert all environments promoted by earlier stages.
                      enum:
                      - halt
                      - skip
                      - rollback
                      type: string
                    selector:
                      description: Selector matches the Environments (clusters) that
                        belong to this stage.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
