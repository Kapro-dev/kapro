                                                  properties:
                                                    containerName:
                                                      description: 'Container name:
                                                        required for volumes, optional
                                                        for env vars'
                                                      type: string
                                                    divisor:
                                                      anyOf:
                                                      - type: integer
                                                      - type: string
                                                      description: Specifies the output
                                                        format of the exposed resources,
                                                        defaults to "1"
                                                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                                      x-kubernetes-int-or-string: true
                                                    resource:
                                                      description: 'Required: resource
                                                        to select'
                                                      type: string
                                                  required:
                                                  - resource
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                secretKeyRef:
                                                  description: Selects a key of a
                                                    secret in the pod's namespace
                                                  properties:
                                                    key:
                                                      description: The key of the
                                                        secret to select from.  Must
                                                        be a valid secret key.
                                                      type: string
                                                    name:
                                                      default: ""
                                                      description: |-
                                                        Name of the referent.
                                                        This field is effectively required, but due to backwards compatibility is
                                                        allowed to be empty. Instances of this type with an empty value here are
                                                        almost certainly wrong.
                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                      type: string
                                                    optional:
                                                      description: Specify whether
                                                        the Secret or its key must
                                                        be defined
                                                      type: boolean
                                                  required:
                                                  - key
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                              type: object
                                          required:
                                          - name
                                          type: object
                                        type: array
                                        x-kubernetes-preserve-unknown-fields: true
                                      image:
                                        type: string
                                    required:
                                    - image
                                    type: object
                                  maxAttempts:
                                    default: 3
                                    type: integer
                                  name:
                                    description: |-
                                      Name uniquely identifies this template within the gate for status tracking
                                      and Job naming. Required when type == "job" (used to generate Job name).
                                    type: string
                                  plugin:
                                    description: PluginGateSpec references an external
                                      gate registered through PluginRegistration.
                                    properties:
                                      name:
                                        description: Name is PluginRegistration.spec.name
                                          for a ready gate plugin.
                                        type: string
                                    required:
                                    - name
                                    type: object
                                  timeout:
                                    type: string
                                  type:
                                    enum:
                                    - cel
                                    - job
                                    - webhook
                                    - plugin
