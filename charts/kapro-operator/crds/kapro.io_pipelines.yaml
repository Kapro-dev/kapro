                                                        secret to select from.  Must
                                                        be a valid secret key.
                                                      type: string
                                                    name:
                                                      default: ""
                                                      description: |-
                                                        Name of the referent.
                                                        This field is effectively required, but due to backwards compatibility is
                                                        allowed to be empty. Instances of this type with an empty value here are
                                                        almost certainly wrong.
                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                      type: string
                                                    optional:
                                                      description: Specify whether
                                                        the Secret or its key must
                                                        be defined
                                                      type: boolean
                                                  required:
                                                  - key
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                              type: object
                                          required:
                                          - name
                                          type: object
                                        type: array
                                        x-kubernetes-preserve-unknown-fields: true
                                      image:
                                        type: string
                                    required:
                                    - image
                                    type: object
                                  maxAttempts:
                                    default: 3
                                    type: integer
                                  name:
                                    description: |-
                                      Name uniquely identifies this template within the gate for status tracking
                                      and Job naming. Required when type == "job" (used to generate Job name).
                                    type: string
                                  timeout:
                                    type: string
                                  type:
                                    enum:
                                    - cel
                                    - job
                                    - webhook
                                    type: string
                                  webhook:
                                    description: WebhookGateSpec configures the HTTP
                                      webhook gate.
                                    properties:
                                      pollInterval:
                                        type: string
                                      url:
                                        type: string
                                    required:
                                    - url
                                    type: object
                                required:
                                - type
                                type: object
                              type: array
                            verification:
                              description: VerificationGateSpec configures per-policy
                                artifact signature verification.
                              properties:
                                cosignPolicy:
                                  description: CosignPolicySpec specifies how cosign
                                    should verify the artifact signature.
                                  properties:
                                    key:
                                      description: KeyVerificationSpec configures
                                        static public key cosign verification.
                                      properties:
                                        secretRef:
                                          description: CosignKeySecretRef identifies
                                            a cosign public key stored in a Kubernetes
                                            Secret.
                                          properties:
                                            key:
                                              default: cosign.pub
                                              type: string
                                            name:
                                              type: string
                                            namespace:
                                              default: kapro-system
                                              type: string
                                          required:
                                          - name
                                          type: object
                                      required:
                                      - secretRef
                                      type: object
                                    keyless:
                                      description: KeylessVerificationSpec configures
                                        OIDC keyless cosign verification.
                                      properties:
                                        issuer:
                                          type: string
                                        rekorURL:
                                          type: string
                                        subject:
                                          type: string
                                      type: object
                                  type: object
                              type: object
                          type: object
                        mode:
                          enum:
                          - auto
                          - manual
                          - scheduled
                          type: string
                        notifications:
                          items:
                            properties:
                              channel:
