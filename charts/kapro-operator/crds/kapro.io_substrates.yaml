---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: substrates.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Substrate
    listKind: SubstrateList
    plural: substrates
    shortNames:
    - sub
    singular: substrate
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.classRef.name
      name: Class
      type: string
    - jsonPath: .spec.substrate.kind
      name: Substrate
      type: string
    - jsonPath: .spec.execution.mode
      name: Execution
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Substrate defines a selectable delivery substrate. Built-in substrates such
          as Flux and Argo are first-party adapters behind this same profile contract.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SubstrateSpec registers a delivery substrate profile that can be selected
              by Fleet or Cluster delivery.substrateRef.
            properties:
              classRef:
                description: |-
                  ClassRef selects the SubstrateClass that owns the typed substrate config
                  contract for this substrate profile.
                properties:
                  name:
                    description: Name is the SubstrateClass name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              configRef:
                description: |-
                  ConfigRef points at a typed substrate-owned configuration object, such as
                  ArgoCDSubstrateConfig, KubernetesApplyConfig, or OCIBundleApplyConfig.
                  The referenced kind must be accepted by the selected SubstrateClass.
                properties:
                  apiVersion:
                    description: |-
                      APIVersion is the referenced API version, for example
                      argocd.substrate.kapro.io/v1alpha1.
                    minLength: 1
                    type: string
                  kind:
                    description: |-
                      Kind is the referenced Kubernetes kind, for example
                      ArgoCDSubstrateConfig.
                    minLength: 1
                    type: string
                  name:
                    description: Name is the referenced object name.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the referenced object namespace when the referenced kind is
                      namespaced. It is empty for cluster-scoped substrate config kinds.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              discovery:
                description: |-
                  Discovery configures optional adoption of objects already owned by the
                  substrate, for example Argo CD cluster Secrets and Applications.
                properties:
                  enabled:
                    description: Enabled turns on substrate-native discovery.
                    type: boolean
                  managementPolicy:
                    default: Observe
                    description: |-
                      ManagementPolicy controls whether Fleet only observes discovered objects
                      or may adopt them for promotion writes.
                    enum:
                    - Observe
                    - Adopt
                    type: string
                  maxObjects:
                    default: 1000
                    description: |-
                      MaxObjects bounds each substrate-native list call during discovery. When a
                      list returns more objects than this limit, discovery fails closed and asks
                      the user to narrow the selector. Defaults to 1000.
                    format: int32
                    minimum: 1
                    type: integer
                  selector:
                    description: |-
                      Selector limits which substrate-native objects Fleet discovers. For Argo CD
                      this selects Applications and cluster Secrets. For Flux this selects
                      Kustomizations and HelmReleases.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              execution:
                description: Execution selects the delivery topology for this substrate
                  profile.
                properties:
                  mode:
                    default: hub-push
                    description: Mode identifies where and how delivery is invoked.
                    enum:
                    - hub-push
                    - spoke-pull
                    - external-pull
                    type: string
                required:
                - mode
                type: object
              parameters:
                additionalProperties:
                  type: string
                description: |-
                  Parameters are substrate-specific defaults inherited by selected delivery
                  configs unless overridden there.
                type: object
              pluginRef:
                description: PluginRef references a Plugin when substrate.kind=external.
                type: string
              substrate:
                description: Substrate identifies the open delivery domain and actuator
                  implementation.
                properties:
                  actuator:
                    description: |-
                      Actuator names the concrete Kapro actuator/plugin implementation. When
                      empty on an open-substrate manifest, Kapro falls back to kind.
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]{0,62}$
                    type: string
                  kind:
                    description: Kind is the open delivery domain/category.
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]{0,62}$
                    type: string
                required:
                - kind
                type: object
            type: object
            x-kubernetes-validations:
            - message: set either classRef or substrate, not both
              rule: '!(has(self.classRef) && has(self.substrate))'
            - message: configRef requires classRef
              rule: '!has(self.configRef) || has(self.classRef)'
            - message: one of classRef or substrate is required
              rule: has(self.substrate) || has(self.classRef)
            - message: pluginRef must be set when substrate.kind is external
              rule: '(has(self.substrate) && self.substrate.kind == "external") ?
                (has(self.pluginRef) && self.pluginRef != "") : true'
          status:
            description: SubstrateStatus records substrate discovery and compatibility.
            properties:
              className:
                description: |-
                  ClassName mirrors spec.classRef.name when this Substrate uses the typed
                  SubstrateClass path.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configRef:
                description: ConfigRef mirrors the resolved typed substrate config
                  reference.
                properties:
                  apiVersion:
                    description: |-
                      APIVersion is the referenced API version, for example
                      argocd.substrate.kapro.io/v1alpha1.
                    minLength: 1
                    type: string
                  kind:
                    description: |-
                      Kind is the referenced Kubernetes kind, for example
                      ArgoCDSubstrateConfig.
                    minLength: 1
                    type: string
                  name:
                    description: Name is the referenced object name.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the referenced object namespace when the referenced kind is
                      namespaced. It is empty for cluster-scoped substrate config kinds.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              discoveredApplicationSets:
                description: |-
                  DiscoveredApplicationSets is the number of Argo CD ApplicationSets seen
                  during discovery.
                format: int32
                type: integer
              discoveredApplications:
                description: |-
                  DiscoveredApplications is the number of substrate-native applications seen
                  during discovery.
                format: int32
                type: integer
              discoveredClusters:
                description: |-
                  DiscoveredClusters is the number of substrate-native clusters seen during
                  discovery, for example Argo CD cluster Secrets.
                format: int32
                type: integer
              discoveryErrors:
                description: |-
                  DiscoveryErrors is a bounded sample of non-fatal discovery errors. Fatal
                  errors are also surfaced through the DiscoveryReady condition.
                items:
                  type: string
                type: array
              execution:
                description: SubstrateExecutionSpec selects the topology for this
                  substrate profile.
                properties:
                  mode:
                    default: hub-push
                    description: Mode identifies where and how delivery is invoked.
                    enum:
                    - hub-push
                    - spoke-pull
                    - external-pull
                    type: string
                required:
                - mode
                type: object
              lastDiscoveryTime:
                description: |-
                  LastDiscoveryTime records when substrate-native discovery last completed or
                  failed for this profile.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              ready:
                type: boolean
              selectedObjects:
                description: |-
                  SelectedObjects is a bounded sample of substrate-native objects Fleet can
                  map to promotion units under the current discovery selector.
                items:
                  description: |-
                    DiscoveredSubstrateObject describes one substrate-native object found during
                    Substrate discovery. The controller keeps this as bounded status
                    evidence; counts remain the source of truth for fleet scale.
                  properties:
                    apiVersion:
                      description: APIVersion is the discovered object's API version.
                      type: string
                    kind:
                      description: Kind is the discovered object's Kubernetes kind.
                      type: string
                    name:
                      description: Name is the discovered object's name.
                      type: string
                    namespace:
                      description: Namespace is the discovered object's namespace.
                      type: string
                    pattern:
                      description: |-
                        Pattern identifies the substrate-native topology pattern, for example
                        application, applicationset-child, app-of-apps-root, helmrelease, or
                        kustomization.
                      type: string
                    reason:
                      description: Reason explains why the object was selected, skipped,
                        or unsupported.
                      type: string
                    unit:
                      description: Unit is the inferred Source unit name when available.
                      type: string
                    versionField:
                      description: VersionField is the field Fleet would write in
                        Adopt mode when available.
                      type: string
                  type: object
                type: array
              skippedObjects:
                description: |-
                  SkippedObjects is a bounded sample of substrate-native objects Fleet saw
                  but will not promote directly.
                items:
                  description: |-
                    DiscoveredSubstrateObject describes one substrate-native object found during
                    Substrate discovery. The controller keeps this as bounded status
                    evidence; counts remain the source of truth for fleet scale.
                  properties:
                    apiVersion:
                      description: APIVersion is the discovered object's API version.
                      type: string
                    kind:
                      description: Kind is the discovered object's Kubernetes kind.
                      type: string
                    name:
                      description: Name is the discovered object's name.
                      type: string
                    namespace:
                      description: Namespace is the discovered object's namespace.
                      type: string
                    pattern:
                      description: |-
                        Pattern identifies the substrate-native topology pattern, for example
                        application, applicationset-child, app-of-apps-root, helmrelease, or
                        kustomization.
                      type: string
                    reason:
                      description: Reason explains why the object was selected, skipped,
                        or unsupported.
                      type: string
                    unit:
                      description: Unit is the inferred Source unit name when available.
                      type: string
                    versionField:
                      description: VersionField is the field Fleet would write in
                        Adopt mode when available.
                      type: string
                  type: object
                type: array
              substrate:
                description: |-
                  SubstrateImplementationSpec identifies a delivery domain and the actuator that
                  implements it. Kind is intentionally open: built-ins such as argo, flux, oci,
                  and kubernetes-apply are documented well-known values, while platform teams
                  can register their own kinds such as hello-world or company-paas.
                properties:
                  actuator:
                    description: |-
                      Actuator names the concrete Kapro actuator/plugin implementation. When
                      empty on an open-substrate manifest, Kapro falls back to kind.
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]{0,62}$
                    type: string
                  kind:
                    description: Kind is the open delivery domain/category.
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]{0,62}$
                    type: string
                required:
                - kind
                type: object
              unsupportedPatterns:
                description: |-
                  UnsupportedPatterns is a bounded sample of objects that matched discovery
                  but need a different ownership level or an external substrate plugin.
                items:
                  description: |-
                    DiscoveredSubstrateObject describes one substrate-native object found during
                    Substrate discovery. The controller keeps this as bounded status
                    evidence; counts remain the source of truth for fleet scale.
                  properties:
                    apiVersion:
                      description: APIVersion is the discovered object's API version.
                      type: string
                    kind:
                      description: Kind is the discovered object's Kubernetes kind.
                      type: string
                    name:
                      description: Name is the discovered object's name.
                      type: string
                    namespace:
                      description: Namespace is the discovered object's namespace.
                      type: string
                    pattern:
                      description: |-
                        Pattern identifies the substrate-native topology pattern, for example
                        application, applicationset-child, app-of-apps-root, helmrelease, or
                        kustomization.
                      type: string
                    reason:
                      description: Reason explains why the object was selected, skipped,
                        or unsupported.
                      type: string
                    unit:
                      description: Unit is the inferred Source unit name when available.
                      type: string
                    versionField:
                      description: VersionField is the field Fleet would write in
                        Adopt mode when available.
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
