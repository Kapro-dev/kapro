---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: sources.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Source
    listKind: SourceList
    plural: sources
    shortNames:
    - src
    singular: source
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.registry.repository
      name: Repository
      type: string
    - jsonPath: .status.latestVersion.tag
      name: Latest
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Source watches an OCI registry for new tags and auto-creates Artifact objects.
          It is the discovery layer — the equivalent of Kargo's Warehouse but Flux-native.
          One Source per service (e.g. one Source for auth-service, one for config-service).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SourceSpec defines the desired state of Source.
            properties:
              appKey:
                description: |-
                  AppKey is the key used in Release.spec.artifacts and MemberCluster.status.currentVersions.
                  Defaults to the Source name when not set.
                type: string
              artifactTemplate:
                description: ArtifactTemplate configures the Artifact objects created
                  on discovery.
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to auto-created Artifact objects.
                    type: object
                  metadata:
                    description: Metadata applied to auto-created Artifact objects.
                    properties:
                      changedComponents:
                        description: |-
                          ChangedComponents lists the app components that changed relative to the
                          parent artifact (when DerivedFrom is set).
                        items:
                          type: string
                        type: array
                      derivedFrom:
                        description: |-
                          DerivedFrom is the name of the parent Artifact this was derived from.
                          Set by CI for hotfix bundles that replace only a subset of components.
                        type: string
                      description:
                        type: string
                      releasedBy:
                        type: string
                    type: object
                type: object
              discovery:
                description: |-
                  Discovery controls the bounded set of OCI tags materialized as Artifact CRs.
                  Empty means Latest with limit 1.
                properties:
                  limit:
                    default: 1
                    description: |-
                      Limit caps the number of recent matching tags materialized as Artifact CRs.
                      Defaults to 1. Values above 50 are rejected by the API schema.
                    maximum: 50
                    minimum: 1
                    type: integer
                  strategy:
                    allOf:
                    - enum:
                      - Latest
                      - LastN
                    - enum:
                      - Latest
                      - LastN
                    default: Latest
                    description: |-
                      Strategy selects which matching tags should become Artifact objects.
                      Latest is the default and creates at most one Artifact per Source.
                    type: string
                type: object
              interval:
                default: 5m
                description: Interval is how often to poll the registry for new tags.
                type: string
              registry:
                description: Registry configures the OCI registry to watch.
                properties:
                  provider:
                    default: generic
                    description: 'Provider configures authentication. Well-known values:
                      gcp, aws, azure, generic.'
                    enum:
                    - gcp
                    - aws
                    - azure
                    - generic
                    type: string
                  repository:
                    description: Repository is the OCI repository URL to watch (e.g.
                      europe-west1-docker.pkg.dev/my-project/auth-service).
                    type: string
                  secretRef:
                    description: |-
                      SecretRef is a reference to a Secret containing registry credentials.
                      Not needed when provider is gcp/aws/azure (uses workload identity).
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - repository
                type: object
              semverConstraint:
                description: |-
                  SemverConstraint filters discovered tags by semver (e.g. "^5.27.0", ">=6.0.0").
                  Uses Go semver library constraints. Empty means accept all valid semver tags.
                type: string
              suspended:
                default: false
                description: Suspended pauses all polling when true.
                type: boolean
            required:
            - registry
            type: object
          status:
            description: SourceStatus defines the observed state of Source.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              discoveredVersions:
                description: DiscoveredVersions is the bounded history of discovered
                  tags.
                items:
                  description: DiscoveredVersion records a tag found during registry
                    polling.
                  properties:
                    artifactRef:
                      description: ArtifactRef is the name of the Artifact created
                        for this tag.
                      type: string
                    digest:
                      description: Digest is the OCI digest for this tag.
                      type: string
                    discoveredAt:
                      description: DiscoveredAt is when this tag was first seen.
                      type: string
                    tag:
                      description: Tag is the OCI tag discovered.
                      type: string
                  required:
                  - tag
                  type: object
                maxItems: 50
                type: array
              lastPolledAt:
                description: LastPolledAt is the timestamp of the last registry poll.
                type: string
              latestVersion:
                description: LatestVersion is the most recent semver-matching tag
                  discovered.
                properties:
                  artifactRef:
                    description: ArtifactRef is the name of the Artifact created for
                      this tag.
                    type: string
                  digest:
                    description: Digest is the OCI digest for this tag.
                    type: string
                  discoveredAt:
                    description: DiscoveredAt is when this tag was first seen.
                    type: string
                  tag:
                    description: Tag is the OCI tag discovered.
                    type: string
                required:
                - tag
                type: object
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: SourcePhase represents the reconciliation state of a
                  Source.
                enum:
                - Ready
                - Failed
                - Discovering
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
