---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: releasereports.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: ReleaseReport
    listKind: ReleaseReportList
    plural: releasereports
    shortNames:
    - rr
    singular: releasereport
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.releaseRef
      name: Release
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.syncedEnvironments
      name: Synced
      type: integer
    - jsonPath: .status.totalEnvironments
      name: Total
      type: integer
    - jsonPath: .status.duration
      name: Duration
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ReleaseReport is a live, persistent delivery summary for one
          Release.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReleaseReportSpec names the Release this report tracks.
            properties:
              releaseRef:
                type: string
            required:
            - releaseRef
            type: object
          status:
            description: ReleaseReportStatus is the live delivery summary for one
              Release.
            properties:
              artifact:
                type: string
              completedAt:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              duration:
                type: string
              environments:
                items:
                  description: EnvironmentReport is a per-environment delivery summary
                    within a ReleaseReport.
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      type: string
                    pipelineRef:
                      type: string
                    stage:
                      type: string
                    syncedAt:
                      type: string
                    version:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              failedEnvironments:
                type: integer
              gates:
                items:
                  description: GateReport is a summary of one gate evaluation within
                    a ReleaseReport.
                  properties:
                    environment:
                      type: string
                    message:
                      type: string
                    pipelineRef:
                      type: string
                    result:
                      type: string
                    stage:
                      type: string
                    type:
                      type: string
                  required:
                  - result
                  - type
                  type: object
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the last generation of the ReleaseReport that was
                  reconciled. Used by tooling to detect stale status.
                format: int64
                type: integer
              pendingApprovals:
                items:
                  type: string
                type: array
              pendingEnvironments:
                type: integer
              phase:
                type: string
              resolvedVersion:
                type: string
              rolledBackEnvironments:
                type: integer
              startedAt:
                type: string
              syncedEnvironments:
                type: integer
              totalEnvironments:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
