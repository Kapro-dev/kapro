---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: approvals.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Approval
    listKind: ApprovalList
    plural: approvals
    shortNames:
    - ap
    singular: approval
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.promotionrun
      name: PromotionRun
      type: string
    - jsonPath: .spec.target
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Recorded")].status
      name: Recorded
      type: string
    - jsonPath: .spec.approvedBy
      name: Approved By
      type: string
    - jsonPath: .spec.bypass
      name: Bypass
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Approval is the human gate signal that unblocks a waiting target rollout.
          Object name convention: "<promotionrun>-<ref>" as a cluster-scoped object.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ApprovalSpec is the human signal that unblocks a waiting target.

              Identity is deterministic: one cluster-scoped Approval per (promotionrun, ref)
              pair. The object name is "<promotionrun>-<ref>". For target FSM approvals, ref is
              the stable sync key "<promotionrun>-<promotionplanRef>-<stage>-<target>", so each
              waiting-approval step requires its own approval object.
            properties:
              approvedBy:
                description: |-
                  ApprovedBy identifies the human approver. Populated by the admission
                  webhook from the request UserInfo when empty.
                type: string
              bypass:
                description: |-
                  Bypass skips subsequent gate conditions for the target. Reserved for
                  P0 hotfix escalations; audited via the ApprovalRecorded Event.
                type: boolean
              comment:
                description: Comment is optional free-form justification.
                type: string
              promotionrun:
                description: PromotionRun is the name of the PromotionRun this approval
                  unblocks.
                type: string
              ref:
                description: |-
                  Ref identifies the exact approval scope within the PromotionRun. For target FSM
                  approvals this is the stable sync key "<promotionrun>-<promotionplanRef>-<stage>-<target>".
                  External integrators may use another deterministic ref as long as
                  metadata.name is "<promotionrun>-<ref>".
                type: string
              target:
                description: Target is the FleetCluster name this approval is for.
                type: string
            required:
            - approvedBy
            - promotionrun
            - ref
            - target
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              processedAt:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
