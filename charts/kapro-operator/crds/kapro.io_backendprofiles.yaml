---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: backendprofiles.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: BackendProfile
    listKind: BackendProfileList
    plural: backendprofiles
    shortNames:
    - bp
    - backend
    singular: backendprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.driver
      name: Driver
      type: string
    - jsonPath: .spec.runtime
      name: Runtime
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackendProfile defines a selectable delivery backend. Built-in backends such
          as Flux and Argo are first-party adapters behind this same profile contract.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BackendProfileSpec registers a delivery backend profile that can be selected
              by Kapro or MemberCluster delivery.backendRef.
            properties:
              discovery:
                description: |-
                  Discovery configures optional adoption of objects already owned by the
                  backend, for example Argo CD cluster Secrets and Applications.
                properties:
                  enabled:
                    description: Enabled turns on backend-native discovery.
                    type: boolean
                  managementPolicy:
                    default: Observe
                    description: |-
                      ManagementPolicy controls whether Kapro only observes discovered objects
                      or may adopt them for promotion writes.
                    enum:
                    - Observe
                    - Adopt
                    type: string
                  selector:
                    description: |-
                      Selector limits which backend-native objects Kapro discovers. For Argo CD
                      this selects Applications and cluster Secrets. For Flux this selects
                      Kustomizations and HelmReleases.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              driver:
                description: Driver identifies the backend implementation family.
                enum:
                - flux
                - argo
                - external
                type: string
              parameters:
                additionalProperties:
                  type: string
                description: |-
                  Parameters are backend-specific defaults inherited by selected delivery
                  configs unless overridden there.
                type: object
              pluginRef:
                description: PluginRef references a PluginRegistration when driver=external.
                type: string
              runtime:
                default: Both
                description: Runtime identifies where this backend can run.
                enum:
                - Hub
                - Spoke
                - Both
                type: string
            required:
            - driver
            type: object
            x-kubernetes-validations:
            - message: pluginRef must be set when driver is external, and must be
                omitted otherwise
              rule: 'self.driver == "external" ? (has(self.pluginRef) && self.pluginRef
                != "") : (!has(self.pluginRef) || self.pluginRef == "")'
          status:
            description: BackendProfileStatus records backend discovery and compatibility.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              discoveredApplications:
                description: |-
                  DiscoveredApplications is the number of backend-native applications seen
                  during discovery.
                format: int32
                type: integer
              discoveredClusters:
                description: |-
                  DiscoveredClusters is the number of backend-native clusters seen during
                  discovery, for example Argo CD cluster Secrets.
                format: int32
                type: integer
              driver:
                description: BackendDriver identifies the backend implementation family.
                enum:
                - flux
                - argo
                - external
                type: string
              observedGeneration:
                format: int64
                type: integer
              ready:
                type: boolean
              runtime:
                description: BackendRuntime identifies where a backend adapter is
                  allowed to run.
                enum:
                - Hub
                - Spoke
                - Both
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
