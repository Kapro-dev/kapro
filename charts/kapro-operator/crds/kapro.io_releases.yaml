---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: releases.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Release
    listKind: ReleaseList
    plural: releases
    shortNames:
    - rel
    singular: release
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.report.totalArtifacts
      name: Artifacts
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.report.syncedTargets
      name: Synced
      type: integer
    - jsonPath: .status.report.pendingTargets
      name: Pending
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Release is the trigger for a progressive delivery rollout across the cluster fleet.
          It references an Artifact and a DAG of Pipelines that define the delivery path.
          The Release controller drives the pipeline DAG, advancing each target cluster
          through the delivery FSM (MetricsCheck → WaitingApproval → Applying → Applied).
          Per-target execution state lives in child ReleaseTarget objects; Release.status
          stores only rollout summary, pipeline progress, and audit metadata.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Uniqueness and dependency-reference validation is enforced by the admission webhook,
              which can perform DAG checks without the quadratic CEL cost budget constraints.
            properties:
              appKey:
                description: |-
                  AppKey is the key used in MemberCluster.status.currentVersions.
                  Defaults to the Artifact name when not set.
                  Deprecated: use ReleaseArtifactRef.AppKey per artifact instead.
                type: string
              artifact:
                description: |-
                  Artifact is the OCI artifact name to deliver across the fleet.
                  Deprecated: use Artifacts[] for multi-artifact releases. When both are set,
                  Artifacts takes precedence. Kept for backward compatibility with single-artifact releases.
                type: string
              artifacts:
                description: |-
                  Artifacts is the composable list of artifacts to deliver across the fleet.
                  Each artifact has an AppKey used for delta-aware delivery (only changed versions are deployed).
                  When derivedFrom is set, this list is merged with the parent Release's artifacts
                  (Kustomize-style: child overrides parent by AppKey).
                items:
                  description: |-
                    ReleaseArtifactRef is one artifact in a Release's composable artifact list.
                    AppKey is the key used in MemberCluster.status.currentVersions to track this artifact.
                  properties:
                    appKey:
                      description: |-
                        AppKey identifies this artifact in the release (e.g. "auth-service", "config-service").
                        Used as the key in MemberCluster.status.currentVersions for delta-aware delivery.
                      type: string
                    artifact:
                      description: Artifact is the name of the Artifact CRD object.
                      type: string
                  required:
                  - appKey
                  - artifact
                  type: object
                maxItems: 256
                type: array
              derivedFrom:
                description: |-
                  DerivedFrom is the name of the parent Release this hotfix was derived from.
                  When set, the parent's artifacts are inherited and this Release's artifacts
                  are overlaid on top (merge by AppKey). Only changed artifacts are delivered
                  to target clusters (delta-aware delivery).
                  Immutable after creation — changing it has no effect on a running rollout.
                type: string
              pipelines:
                description: |-
                  Pipelines is the DAG of pipeline nodes that this Release executes.
                  Each node references a Pipeline CRD and may depend on other nodes.
                items:
                  description: |-
                    ReleasePipelineRef is one node in the Release's pipeline DAG.
                    Multiple pipelines can run in parallel; DependsOn declares ordering between them.
                  properties:
                    dependsOn:
                      description: DependsOn lists pipeline node names that must reach
                        Complete before this one starts.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                    name:
                      description: Name uniquely identifies this pipeline node within
                        the Release.
                      type: string
                    pipeline:
                      description: Pipeline is the name of the Pipeline CRD to execute.
                      type: string
                  required:
                  - name
                  - pipeline
                  type: object
                maxItems: 64
                minItems: 1
                type: array
              scope:
                description: |-
                  Scope restricts this Release to a subset of clusters.
                  When set, rollout entries are only created for the named target clusters.
                  Nil or empty = full-fleet rollout (normal behaviour).
                  Immutable after creation — set scope before the Release is created.
                properties:
                  targets:
                    description: |-
                      Targets is the allowlist of target cluster names.
                      Must be non-empty when Scope is set — an empty list is ignored.
                    items:
                      type: string
                    type: array
                type: object
              suspended:
                default: false
                description: Suspended pauses all advancement when true.
                type: boolean
            required:
            - pipelines
            type: object
          status:
            description: ReleaseStatus defines the observed state of Release.
            properties:
              auditTrail:
                description: AuditTrail records immutable delivery provenance. Capped
                  at 50 entries.
                items:
                  description: |-
                    AuditEntry records the immutable delivery provenance of a completed Release.
                    Stored in Release.status.auditTrail.
                  properties:
                    artifact:
                      description: Artifact is the OCI artifact that was delivered.
                      type: string
                    changedComponents:
                      description: ChangedComponents lists the components that changed
                        relative to the parent artifact.
                      items:
                        type: string
                      type: array
                    completedAt:
                      description: CompletedAt is when the Release completed.
                      type: string
                    derivedFrom:
                      description: DerivedFrom is the parent Artifact name.
                      type: string
                    release:
                      description: Release is the Release name.
                      type: string
                    releaseDerivedFrom:
                      description: ReleaseDerivedFrom is the parent Release name.
                      type: string
                    scope:
                      description: Scope lists the target cluster names that were
                        targeted. Nil = full-fleet rollout.
                      items:
                        type: string
                      type: array
                  required:
                  - artifact
                  - release
                  type: object
                type: array
              completedAt:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              pipelineProgress:
                description: PipelineProgress tracks execution state of each pipeline
                  node in the DAG.
                items:
                  description: PipelineProgress tracks the execution state of one
                    pipeline node in a Release.
                  properties:
                    name:
                      description: Name matches ReleasePipelineRef.name.
                      type: string
                    phase:
                      description: Phase is the current execution state of this pipeline
                        node.
                      enum:
                      - Pending
                      - Progressing
                      - Complete
                      - Failed
                      type: string
                    pipeline:
                      description: Pipeline is the Pipeline CRD name.
                      type: string
                    stageProgress:
                      description: StageProgress summarises the state of each stage
                        in this pipeline.
                      items:
                        description: StageProgress tracks the execution state of one
                          Stage within a pipeline.
                        properties:
                          failed:
                            description: Failed is the number of targets that have
                              reached Failed.
                            type: integer
                          name:
                            description: Name is the stage name from Pipeline.spec.stages[].name.
                            type: string
                          phase:
                            description: Phase is the current state of this stage.
                            enum:
                            - Pending
                            - Progressing
                            - Complete
                            - Failed
                            type: string
                          synced:
                            description: Synced is the number of targets that have
                              reached Converged.
                            type: integer
                          total:
                            description: Total is the number of targets selected by
                              this stage.
                            type: integer
                        required:
                        - name
                        type: object
                      type: array
                  required:
                  - name
                  - pipeline
                  type: object
                type: array
              report:
                description: Report is the inline delivery summary.
                properties:
                  artifact:
                    type: string
                  completedAt:
                    type: string
                  deltaArtifacts:
                    description: |-
                      DeltaArtifacts is the number of artifacts explicitly changed by this Release.
                      For derivedFrom releases, inherited artifacts are excluded.
                    type: integer
                  duration:
                    type: string
                  failedTargets:
                    type: integer
                  pendingApprovals:
                    description: |-
                      PendingApprovals lists "<release>-<ref>" Approval names that are
                      awaiting human signal. Derived from ReleaseTarget objects.
                    items:
                      type: string
                    type: array
                  pendingTargets:
                    type: integer
                  phase:
                    type: string
                  resolvedVersion:
                    type: string
                  rolledBackTargets:
                    type: integer
                  startedAt:
                    type: string
                  syncedTargets:
                    type: integer
                  totalArtifacts:
                    description: TotalArtifacts is the number of artifacts in the
                      resolved (merged) artifact list.
                    type: integer
                  totalTargets:
                    type: integer
                type: object
              resolvedArtifacts:
                description: |-
                  ResolvedArtifacts is the merged artifact list after derivedFrom resolution.
                  For hotfix Releases, this contains the parent's artifacts with overrides applied.
                  Set once in Pending and never changed.
                items:
                  description: ResolvedArtifact is one resolved artifact in a Release's
                    merged artifact list.
                  properties:
                    appKey:
                      description: AppKey identifies this artifact (e.g. "auth-service").
                      type: string
                    artifact:
                      description: Artifact is the Artifact CRD name.
                      type: string
                    inherited:
                      description: |-
                        Inherited is true when this artifact came from the parent Release (derivedFrom).
                        False when explicitly listed in this Release's spec.artifacts.
                      type: boolean
                    version:
                      description: Version is the resolved OCI digest (repository@sha256:...).
                      type: string
                  required:
                  - appKey
                  - artifact
                  type: object
                type: array
              resolvedVersion:
                description: |-
                  ResolvedVersion is the OCI digest resolved from the Artifact CR.
                  Format: <repository>@sha256:<digest>. Set once in Pending and never changed.
                  Deprecated: use ResolvedArtifacts for multi-artifact releases.
                type: string
              startedAt:
                type: string
              targets:
                description: |-
                  Targets is deprecated compatibility state. The authoritative per-target
                  rollout state lives in child ReleaseTarget objects.
                items:
                  description: |-
                    TargetStatus records the rollout state of one target cluster rollout. It is
                    used as the status payload of ReleaseTarget and retained here as the
                    controller's in-memory execution shape.
                  properties:
                    appKey:
                      description: AppKey is the key used to look up the current version
                        in MemberCluster.status.currentVersions.
                      type: string
                    applyIssued:
                      description: |-
                        ApplyIssued is set once Actuator.Apply() has been called for this delivery
                        cycle. Guards against duplicate Apply() calls on subsequent reconciles while
                        the cluster is converging. Reset automatically on each transition into Applying.
                      type: boolean
                    approvalSentAt:
                      description: ApprovalSentAt records when the approval notification
                        was last dispatched.
                      type: string
                    desiredVersions:
                      additionalProperties:
                        type: string
                      description: |-
                        DesiredVersions is the full appKey -> version map for this target rollout.
                        When set, the actuator must converge all of these versions before the target completes.
                      type: object
                    finishedAt:
                      type: string
                    gate:
                      description: Gate is the inline gate policy snapshot applied
                        to this target cluster.
                      properties:
                        approval:
                          properties:
                            approvers:
                              items:
                                type: string
                              type: array
                            required:
                              type: boolean
                          required:
                          - required
                          type: object
                        gate:
                          properties:
                            gateTimeout:
                              description: |-
                                GateTimeout is the maximum duration the metrics gate may remain un-passed
                                before the target is failed. Only applies to MetricsCheck; infrastructure
                                errors (e.g. Prometheus unreachable) do not consume this budget.
                                Uses Go duration format, e.g. "30m", "1h". Empty means retry indefinitely.
                              type: string
                            healthCheck:
                              type: boolean
                            metrics:
                              items:
                                properties:
                                  config:
                                    format: byte
                                    type: string
                                    x-kubernetes-preserve-unknown-fields: true
                                  endpoint:
                                    type: string
                                  interval:
                                    default: 30s
                                    description: |-
                                      Interval controls how often the metric is re-evaluated while the gate is blocking.
                                      Equivalent to Grafana's "Evaluate every" setting.
                                      Defaults to "30s". Minimum "10s".
                                    type: string
                                  provider:
                                    type: string
                                  query:
                                    description: |-
                                      Query is a PromQL expression. The gate passes when the query returns a non-zero value.
                                      Use range functions directly in the query for window-based checks, e.g.:
                                        min_over_time(error_rate[30m]) < 0.01
                                      Or reference the Window field as a template: {{.Window}} is substituted at evaluation time.
                                    type: string
                                  threshold:
                                    type: number
                                  window:
                                    default: 5m
                                    description: |-
                                      Window is the lookback duration injected into the query template as {{.Window}}.
                                      When Query already contains a hardcoded range (e.g. [5m]), this field is ignored.
                                      Defaults to "5m".
                                    type: string
                                required:
                                - provider
                                - query
                                type: object
                              type: array
                            soakTime:
                              type: string
                            templates:
                              items:
                                description: |-
                                  GateTemplateSpec defines an inline, parameterised gate evaluation config.
                                  Embedded directly in GateSpec.Templates — no separate CRD needed.
                                properties:
                                  args:
                                    items:
                                      description: GateArg declares a named parameter
                                        with an optional default value.
                                      properties:
                                        name:
                                          type: string
                                        value:
                                          type: string
                                      required:
                                      - name
                                      type: object
                                    type: array
                                  cel:
                                    description: CELGateSpec configures the built-in
                                      CEL expression gate.
                                    properties:
                                      expression:
                                        type: string
                                    required:
                                    - expression
                                    type: object
                                  failurePolicy:
                                    default: halt
                                    enum:
                                    - halt
                                    - retry
                                    - skip
                                    type: string
                                  inconclusivePolicy:
                                    default: retry
                                    enum:
                                    - retry
                                    - skip
                                    - halt
                                    type: string
                                  job:
                                    description: JobGateSpec configures the Kubernetes
                                      Job gate.
                                    properties:
                                      args:
                                        items:
                                          type: string
                                        type: array
                                      command:
                                        items:
                                          type: string
                                        type: array
                                      env:
                                        items:
                                          description: EnvVar represents an environment
                                            variable present in a Container.
                                          properties:
                                            name:
                                              description: |-
                                                Name of the environment variable.
                                                May consist of any printable ASCII characters except '='.
                                              type: string
                                            value:
                                              description: |-
                                                Variable references $(VAR_NAME) are expanded
                                                using the previously defined environment variables in the container and
                                                any service environment variables. If a variable cannot be resolved,
                                                the reference in the input string will be unchanged. Double $$ are reduced
                                                to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                                "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                                Escaped references will never be expanded, regardless of whether the variable
                                                exists or not.
                                                Defaults to "".
                                              type: string
                                            valueFrom:
                                              description: Source for the environment
                                                variable's value. Cannot be used if
                                                value is not empty.
                                              properties:
                                                configMapKeyRef:
                                                  description: Selects a key of a
                                                    ConfigMap.
                                                  properties:
                                                    key:
                                                      description: The key to select.
                                                      type: string
                                                    name:
                                                      default: ""
                                                      description: |-
                                                        Name of the referent.
                                                        This field is effectively required, but due to backwards compatibility is
                                                        allowed to be empty. Instances of this type with an empty value here are
                                                        almost certainly wrong.
                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                      type: string
                                                    optional:
                                                      description: Specify whether
                                                        the ConfigMap or its key must
                                                        be defined
                                                      type: boolean
                                                  required:
                                                  - key
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                fieldRef:
                                                  description: |-
                                                    Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                                    spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                                  properties:
                                                    apiVersion:
                                                      description: Version of the
                                                        schema the FieldPath is written
                                                        in terms of, defaults to "v1".
                                                      type: string
                                                    fieldPath:
                                                      description: Path of the field
                                                        to select in the specified
                                                        API version.
                                                      type: string
                                                  required:
                                                  - fieldPath
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                fileKeyRef:
                                                  description: |-
                                                    FileKeyRef selects a key of the env file.
                                                    Requires the EnvFiles feature gate to be enabled.
                                                  properties:
                                                    key:
                                                      description: |-
                                                        The key within the env file. An invalid key will prevent the pod from starting.
                                                        The keys defined within a source may consist of any printable ASCII characters except '='.
                                                        During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                                      type: string
                                                    optional:
                                                      default: false
                                                      description: |-
                                                        Specify whether the file or its key must be defined. If the file or key
                                                        does not exist, then the env var is not published.
                                                        If optional is set to true and the specified key does not exist,
                                                        the environment variable will not be set in the Pod's containers.

                                                        If optional is set to false and the specified key does not exist,
                                                        an error will be returned during Pod creation.
                                                      type: boolean
                                                    path:
                                                      description: |-
                                                        The path within the volume from which to select the file.
                                                        Must be relative and may not contain the '..' path or start with '..'.
                                                      type: string
                                                    volumeName:
                                                      description: The name of the
                                                        volume mount containing the
                                                        env file.
                                                      type: string
                                                  required:
                                                  - key
                                                  - path
                                                  - volumeName
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                resourceFieldRef:
                                                  description: |-
                                                    Selects a resource of the container: only resources limits and requests
                                                    (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                                  properties:
                                                    containerName:
                                                      description: 'Container name:
                                                        required for volumes, optional
                                                        for env vars'
                                                      type: string
                                                    divisor:
                                                      anyOf:
                                                      - type: integer
                                                      - type: string
                                                      description: Specifies the output
                                                        format of the exposed resources,
                                                        defaults to "1"
                                                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                                      x-kubernetes-int-or-string: true
                                                    resource:
                                                      description: 'Required: resource
                                                        to select'
                                                      type: string
                                                  required:
                                                  - resource
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                secretKeyRef:
                                                  description: Selects a key of a
                                                    secret in the pod's namespace
                                                  properties:
                                                    key:
                                                      description: The key of the
                                                        secret to select from.  Must
                                                        be a valid secret key.
                                                      type: string
                                                    name:
                                                      default: ""
                                                      description: |-
                                                        Name of the referent.
                                                        This field is effectively required, but due to backwards compatibility is
                                                        allowed to be empty. Instances of this type with an empty value here are
                                                        almost certainly wrong.
                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                      type: string
                                                    optional:
                                                      description: Specify whether
                                                        the Secret or its key must
                                                        be defined
                                                      type: boolean
                                                  required:
                                                  - key
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                              type: object
                                          required:
                                          - name
                                          type: object
                                        type: array
                                        x-kubernetes-preserve-unknown-fields: true
                                      image:
                                        type: string
                                    required:
                                    - image
                                    type: object
                                  maxAttempts:
                                    default: 3
                                    type: integer
                                  name:
                                    description: |-
                                      Name uniquely identifies this template within the gate for status tracking
                                      and Job naming. Required when type == "job" (used to generate Job name).
                                    type: string
                                  timeout:
                                    type: string
                                  type:
                                    enum:
                                    - cel
                                    - job
                                    - webhook
                                    type: string
                                  webhook:
                                    description: WebhookGateSpec configures the HTTP
                                      webhook gate.
                                    properties:
                                      pollInterval:
                                        type: string
                                      url:
                                        type: string
                                    required:
                                    - url
                                    type: object
                                required:
                                - type
                                type: object
                              type: array
                            verification:
                              description: VerificationGateSpec configures per-policy
                                artifact signature verification.
                              properties:
                                cosignPolicy:
                                  description: CosignPolicySpec specifies how cosign
                                    should verify the artifact signature.
                                  properties:
                                    key:
                                      description: KeyVerificationSpec configures
                                        static public key cosign verification.
                                      properties:
                                        secretRef:
                                          description: CosignKeySecretRef identifies
                                            a cosign public key stored in a Kubernetes
                                            Secret.
                                          properties:
                                            key:
                                              default: cosign.pub
                                              type: string
                                            name:
                                              type: string
                                            namespace:
                                              default: kapro-system
                                              type: string
                                          required:
                                          - name
                                          type: object
                                      required:
                                      - secretRef
                                      type: object
                                    keyless:
                                      description: KeylessVerificationSpec configures
                                        OIDC keyless cosign verification.
                                      properties:
                                        issuer:
                                          type: string
                                        rekorURL:
                                          type: string
                                        subject:
                                          type: string
                                      type: object
                                  type: object
                              type: object
                          type: object
                        mode:
                          enum:
                          - auto
                          - manual
                          - scheduled
                          type: string
                        notifications:
                          items:
                            properties:
                              channel:
                                type: string
                              email:
                                description: EmailNotifierSpec configures SMTP email
                                  delivery for gate notifications.
                                properties:
                                  from:
                                    type: string
                                  smtpSecretRef:
                                    description: |-
                                      LocalObjectReference contains enough information to let you locate the
                                      referenced object inside the same namespace.
                                    properties:
                                      name:
                                        default: ""
                                        description: |-
                                          Name of the referent.
                                          This field is effectively required, but due to backwards compatibility is
                                          allowed to be empty. Instances of this type with an empty value here are
                                          almost certainly wrong.
                                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                        type: string
