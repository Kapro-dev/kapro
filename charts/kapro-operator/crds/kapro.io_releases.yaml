---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: releases.kapro.io
spec:
  group: kapro.io
  names:
    kind: Release
    listKind: ReleaseList
    plural: releases
    singular: release
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.artifact
      name: Artifact
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Release is the trigger for a progressive delivery rollout across the cluster fleet.
          It references an Artifact and a DAG of Pipelines that define the delivery path.
          The Release controller drives the pipeline DAG, creating Sync objects per environment.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              appKey:
                description: |-
                  AppKey is the key used in ManagedCluster.status.currentVersions.
                  Defaults to the Artifact name when not set.
                type: string
              artifact:
                description: Artifact is the OCI artifact name to deliver across the
                  fleet.
                type: string
              pipelines:
                description: |-
                  Pipelines is the DAG of pipeline nodes that this Release executes.
                  Each node references a Pipeline CRD and may depend on other nodes.
                items:
                  description: |-
                    ReleasePipelineRef is one node in the Release's pipeline DAG.
                    Multiple pipelines can run in parallel; DependsOn declares ordering between them.
                  properties:
                    dependsOn:
                      description: DependsOn lists pipeline node names that must reach
                        Complete before this one starts.
                      items:
                        type: string
                      type: array
                    name:
                      description: Name uniquely identifies this pipeline node within
                        the Release.
                      type: string
                    pipeline:
                      description: Pipeline is the name of the Pipeline CRD to execute.
                      type: string
                  required:
                  - name
                  - pipeline
                  type: object
                minItems: 1
                type: array
              suspended:
                default: false
                description: Suspended pauses all advancement when true.
                type: boolean
            required:
            - artifact
            - pipelines
            type: object
          status:
            description: ReleaseStatus defines the observed state of Release.
            properties:
              completedAt:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              pipelineProgress:
                description: PipelineProgress tracks execution state of each pipeline
                  node in the DAG.
                items:
                  description: PipelineProgress tracks the execution state of one
                    pipeline node in a Release.
                  properties:
                    name:
                      description: Name matches ReleasePipelineRef.name.
                      type: string
                    phase:
                      description: Phase is the current execution state of this pipeline
                        node.
                      enum:
                      - Pending
                      - Progressing
                      - Complete
                      - Failed
                      type: string
                    pipeline:
                      description: Pipeline is the Pipeline CRD name.
                      type: string
                    stageProgress:
                      description: StageProgress summarises the state of each stage
                        in this pipeline.
                      items:
                        description: StageProgress tracks the execution state of one
                          Stage within a pipeline.
                        properties:
                          failed:
                            description: Failed is the number of environments that
                              have reached Failed.
                            type: integer
                          name:
                            description: Name is the stage name from Pipeline.spec.stages[].name.
                            type: string
                          phase:
                            description: Phase is the current state of this stage.
                            enum:
                            - Pending
                            - Progressing
                            - Complete
                            - Failed
                            type: string
                          synced:
                            description: Synced is the number of environments that
                              have reached Converged.
                            type: integer
                          total:
                            description: Total is the number of environments selected
                              by this stage.
                            type: integer
                        required:
                        - name
                        type: object
                      type: array
                  required:
                  - name
                  - pipeline
                  type: object
                type: array
              resolvedVersion:
                description: |-
                  ResolvedVersion is the OCI digest resolved from the Artifact CR.
                  Format: <repository>@sha256:<digest>. Set once in Pending and never changed.
                type: string
              startedAt:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
