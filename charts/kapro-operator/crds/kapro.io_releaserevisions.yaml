---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: releaserevisions.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: ReleaseRevision
    listKind: ReleaseRevisionList
    plural: releaserevisions
    shortNames:
    - rrev
    singular: releaserevision
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.release
      name: Release
      type: string
    - jsonPath: .spec.artifact
      name: Artifact
      type: string
    - jsonPath: .spec.releaseDerivedFrom
      name: Derived From
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ReleaseRevision is an immutable audit record written by Kapro when a Release
          reaches Complete. It captures artifact lineage, scope, and changed components
          for every completed delivery. Never modify or delete — it is the audit trail.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReleaseRevisionSpec records the immutable delivery provenance
              of a completed Release.
            properties:
              artifact:
                description: Artifact is the OCI artifact that was delivered.
                type: string
              changedComponents:
                description: ChangedComponents lists the components that changed relative
                  to the parent artifact.
                items:
                  type: string
                type: array
              derivedFrom:
                description: DerivedFrom is the parent Artifact name (populated from
                  artifact.spec.metadata.derivedFrom).
                type: string
              release:
                description: Release is the Release name that created this revision.
                type: string
              releaseDerivedFrom:
                description: ReleaseDerivedFrom is the parent Release name (populated
                  from release.spec.derivedFrom).
                type: string
              scope:
                description: |-
                  Scope lists the environment names that were targeted.
                  Nil or empty = full-fleet rollout.
                items:
                  type: string
                type: array
            required:
            - artifact
            - release
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
