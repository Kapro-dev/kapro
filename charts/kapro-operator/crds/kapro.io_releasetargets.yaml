                description: AppKey is the key used to look up the current version
                  in MemberCluster.status.currentVersions.
                type: string
              applyIssued:
                description: |-
                  ApplyIssued is set once Actuator.Apply() has been called for this delivery
                  cycle. Guards against duplicate Apply() calls on subsequent reconciles while
                  the cluster is converging. Reset automatically on each transition into Applying.
                type: boolean
              approvalSentAt:
                description: ApprovalSentAt records when the approval notification
                  was last dispatched.
                type: string
              conditions:
                description: |-
                  Conditions provide the Kubernetes-native readiness/reconciling/stalled contract
                  for this execution object.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              decisionTrace:
                description: |-
                  DecisionTrace stores the audit trail of AI agent and human decisions
                  for this target's approval gates. Written by the Decision API (webhook
                  server), never by the ReleaseTargetReconciler.
                properties:
                  current:
                    description: Current is the active decision for this target's
                      gate.
                    properties:
                      conditions:
                        description: |-
                          Conditions are post-decision checks that must hold for the approval
                          to remain valid (e.g. "error rate stays below 1% for 30m").
                        items:
                          description: DecisionCondition is a post-decision check
