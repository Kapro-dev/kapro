                              type: string
                            failAction:
                              description: FailAction is what happens if the condition
                                is violated.
                              enum:
                              - Rollback
                              - Reject
                              - Hold
                              type: string
                            metric:
                              description: Metric is the metric to watch.
                              type: string
                            operator:
                              description: Operator is the comparison operator (lt,
                                gt, eq).
                              type: string
                            threshold:
                              description: Threshold is the metric threshold.
                              type: number
                            type:
                              description: Type identifies the condition (e.g. "MetricHold").
                              type: string
                          required:
                          - type
                          type: object
                        type: array
                      confidence:
