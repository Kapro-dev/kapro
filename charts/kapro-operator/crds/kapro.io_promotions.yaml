---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: promotions.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Promotion
    listKind: PromotionList
    plural: promotions
    shortNames:
    - promo
    singular: promotion
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.kaproRef
      name: Kapro
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.activeAttemptRef.name
      name: Run
      type: string
    - jsonPath: .status.attempts.length()
      name: Attempts
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Promotion is the durable user-facing intent to roll a version through a
          Kapro fleet. The controller materializes intent into one or more
          PromotionRun attempts; PromotionRun and PromotionTarget are observe-only
          runtime objects.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PromotionSpec is the durable intent to deliver a version through a Kapro
              fleet. It refers to a parent Kapro (which owns source, plan, clusters,
              delivery) and adds the rollout target (version, scope, optional plan
              override).
            properties:
              kaproRef:
                description: KaproRef is the name of the Kapro fleet this intent targets.
                minLength: 1
                type: string
              lifecycle:
                description: |-
                  Lifecycle declares user-defined handlers fired on Promotion phase
                  transitions (Docker-style: Pending, Progressing, Paused, Restarting,
                  Succeeded, Failed, Terminating). Handlers are fire-and-forget: a
                  handler failure does not change the Promotion phase. Outcomes are
                  recorded in `status.lifecycleHandlerResults[]` with bounded history
                  and Prometheus metrics, and surfaced as Kubernetes Events.
                properties:
                  handlers:
                    description: |-
                      Handlers is the list of declared handlers. Each handler nominates the
                      phases it cares about via `on:` and supplies either a Webhook or an
                      Event payload.
                    items:
                      description: PromotionLifecycleHandler is one declared handler.
                      properties:
                        event:
                          description: |-
                            Event records an additional Kubernetes Event on the Promotion. Useful
                            for surfacing user-defined reasons (e.g. "Promoted to prod") in
                            addition to the controller's built-in phase events.
                          properties:
                            message:
                              description: |-
                                Message is the Event message body. Promotion field references are
                                substituted: {{.Phase}}, {{.PreviousPhase}}, {{.Version}}, {{.Name}},
                                {{.AttemptName}}.
                              type: string
                            reason:
                              description: |-
                                Reason is the Event reason (e.g. "PromotedToProd"). Must satisfy the
                                Kubernetes Event reason regex.
                              minLength: 1
                              type: string
                            type:
                              default: Normal
                              description: Type is "Normal" (default) or "Warning".
                              enum:
                              - Normal
                              - Warning
                              type: string
                          required:
                          - reason
                          type: object
                        maxRetries:
                          description: |-
                            MaxRetries bounds the number of retry attempts after a transient
                            failure (network error, 5xx response). 4xx responses are not retried.
                            Default 3, max 10.
                          format: int32
                          maximum: 10
                          minimum: 0
                          type: integer
                        name:
                          description: |-
                            Name is a stable identifier for this handler. Used as part of the
                            idempotency key so a controller restart does not re-fire a handler
                            that already completed for the same (phase, attempt).
                          maxLength: 63
                          minLength: 1
                          type: string
                        "on":
                          description: On is the list of phases that trigger this
                            handler. Must be non-empty.
                          items:
                            description: "PromotionPhase is the coarse lifecycle state
                              of a Promotion intent,\nmodeled after the Docker container
                              lifecycle. All values are listed\nhere; `RollingBack`
                              is reserved for a future `spec.rollbackTo` field\nand
                              is not yet reachable from any controller transition.\n\n\tPending
                              \     -> created, not yet stamped       (Docker: created)\n\tProgressing
                              \ -> active PromotionRun running    (Docker: running)\n\tPaused
                              \      -> spec.suspended=true            (Docker: paused)\n\tRestarting
                              \  -> new attempt after terminal     (Docker: restarting)\n\tSucceeded
                              \   -> latest attempt completed       (Docker: exited
                              0)\n\tFailed       -> latest attempt failed          (Docker:
                              exited >0)\n\tRollingBack  -> rollback to a prior version
                              \   (reserved; lights up\n\t                when spec.rollbackTo
                              is wired)\n\tTerminating  -> deletionTimestamp set,
                              GC      (Docker: removing)"
                            enum:
                            - Pending
                            - Progressing
                            - Paused
                            - Restarting
                            - Succeeded
                            - Failed
                            - RollingBack
                            - Terminating
                            type: string
                          maxItems: 8
                          minItems: 1
                          type: array
                        timeout:
                          description: |-
                            Timeout caps the total time spent invoking this handler (including
                            retries). Default 30s, max 5m.
                          type: string
                        webhook:
                          description: |-
                            Webhook configures an HTTPS POST with a CloudEvents v1.0 payload.
                            Exactly one of Webhook or Event must be set.
                          properties:
                            authHeader:
                              description: |-
                                AuthHeader optionally injects a single header (e.g. Authorization)
                                whose value is read from a referenced Secret. The Secret must live
                                in the operator's namespace.
                              properties:
                                name:
                                  description: Name is the HTTP header name to set
                                    (e.g. "Authorization").
                                  minLength: 1
                                  type: string
                                secretKey:
                                  description: SecretKey is the key inside the Secret
                                    holding the header value.
                                  minLength: 1
                                  type: string
                                secretName:
                                  description: |-
                                    SecretName is the name of the Secret containing the header value.
                                    The Secret must live in the operator's namespace.
                                  minLength: 1
                                  type: string
                              required:
                              - name
                              - secretKey
                              - secretName
                              type: object
                            url:
                              description: |-
                                URL is the HTTPS endpoint to POST a CloudEvents v1.0 payload to.
                                HTTP (cleartext) is rejected by the dispatcher unless the operator
                                opts in via the KAPRO_LIFECYCLE_INSECURE_WEBHOOKS env var.
                              minLength: 1
                              type: string
                          required:
                          - url
                          type: object
                      required:
                      - name
                      - "on"
                      type: object
                    maxItems: 32
                    type: array
                type: object
              promotionPlans:
                description: |-
                  PromotionPlans optionally overrides the inline Kapro.spec.promotionplan
                  for this intent. When unset, the controller derives a single plan ref
                  from the parent Kapro's inline plan.
                items:
                  description: |-
                    PromotionPlanRef is one node in the PromotionRun's promotionplan DAG.
                    Multiple promotionplans can run in parallel; DependsOn declares ordering between them.
                  properties:
                    dependsOn:
                      description: DependsOn lists promotionplan node names that must
                        reach Complete before this one starts.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                    name:
                      description: Name uniquely identifies this promotionplan node
                        within the PromotionRun.
                      type: string
                    promotionPlan:
                      description: PromotionPlan is the name of the PromotionPlan
                        CRD to execute.
                      type: string
                  required:
                  - name
                  - promotionPlan
                  type: object
                maxItems: 64
                type: array
              scope:
                description: Scope restricts this Promotion to a subset of the parent
                  fleet.
                properties:
                  targets:
                    description: |-
                      Targets is the allowlist of target cluster names.
                      Must be non-empty when Scope is set — an empty list is ignored.
                    items:
                      type: string
                    type: array
                type: object
              suspended:
                default: false
                description: |-
                  Suspended pauses creation of new PromotionRun attempts when true.
                  In-flight attempts are also suspended via PromotionRun.spec.suspended.
                type: boolean
              timeout:
                description: Timeout is the maximum duration for each PromotionRun
                  attempt.
                type: string
              version:
                description: Version is the default revision to deliver across all
                  units.
                type: string
              versions:
                additionalProperties:
                  type: string
                description: |-
                  Versions maps PromotionUnit name to a per-unit revision.
                  Either Version or at least one Versions entry must be set.
                type: object
            required:
            - kaproRef
            type: object
          status:
            description: PromotionStatus is the observed state of a Promotion intent.
            properties:
              activeAttemptRef:
                description: |-
                  ActiveAttemptRef points at the current (non-terminal) PromotionRun.
                  nil when no attempt is in flight (all attempts terminal).
                properties:
                  completedAt:
                    description: |-
                      CompletedAt is when the attempt reached a terminal phase
                      (Complete, Failed, or Superseded).
                    format: date-time
                    type: string
                  name:
                    description: Name is the PromotionRun name for this attempt.
                    type: string
                  phase:
                    description: Phase is the last-observed PromotionRun.status.phase
                      for this attempt.
                    type: string
                  specHash:
                    description: |-
                      SpecHash is the deterministic hash of the Promotion spec that produced
                      this attempt. Used to detect spec drift and trigger a new attempt.
                    type: string
                  startedAt:
                    description: StartedAt is when the attempt was created.
                    format: date-time
                    type: string
                  supersededReason:
                    description: |-
                      SupersededReason is set when this attempt was marked Superseded
                      instead of finishing naturally.
                    type: string
                  version:
                    description: |-
                      Version is the resolved version applied for this attempt (the value
                      echoed into PromotionRun.spec.version at stamp time).
                    type: string
                required:
                - name
                - specHash
                type: object
              attempts:
                description: |-
                  Attempts records up to the last 20 attempts (newest first). Older
                  attempts remain discoverable via PromotionRun objects with the
                  kapro.io/promotion label.
                items:
                  description: PromotionAttemptRef is one historical or active attempt
                    under a Promotion.
                  properties:
                    completedAt:
                      description: |-
                        CompletedAt is when the attempt reached a terminal phase
                        (Complete, Failed, or Superseded).
                      format: date-time
                      type: string
                    name:
                      description: Name is the PromotionRun name for this attempt.
                      type: string
                    phase:
                      description: Phase is the last-observed PromotionRun.status.phase
                        for this attempt.
                      type: string
                    specHash:
                      description: |-
                        SpecHash is the deterministic hash of the Promotion spec that produced
                        this attempt. Used to detect spec drift and trigger a new attempt.
                      type: string
                    startedAt:
                      description: StartedAt is when the attempt was created.
                      format: date-time
                      type: string
                    supersededReason:
                      description: |-
                        SupersededReason is set when this attempt was marked Superseded
                        instead of finishing naturally.
                      type: string
                    version:
                      description: |-
                        Version is the resolved version applied for this attempt (the value
                        echoed into PromotionRun.spec.version at stamp time).
                      type: string
                  required:
                  - name
                  - specHash
                  type: object
                maxItems: 20
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lifecycleHandlerResults:
                description: |-
                  LifecycleHandlerResults records up to the last 50 handler invocations
                  (newest first). One entry per terminal (Succeeded/Failed) outcome of
                  a (handler, phase, attempt) tuple. In-flight invocations are NOT
                  recorded here — see Kubernetes Events for live dispatch traces.
                items:
                  description: |-
                    PromotionLifecycleHandlerResult records the outcome of one handler
                    invocation for one (phase, attempt) tuple. The status field is bounded
                    to MaxLifecycleHandlerResults entries, newest first.
                  properties:
                    attemptName:
                      description: |-
                        AttemptName is the PromotionRun name observed at fire time, when one
                        existed. Empty for create/terminate transitions with no active run.
                      type: string
                    attempts:
                      description: Attempts is the total number of invocations (1
                        + retries).
                      format: int32
                      type: integer
                    durationMs:
                      description: DurationMs is the wall-clock time spent dispatching
                        this handler.
                      format: int64
                      type: integer
                    firedAt:
                      description: FiredAt is when dispatch started.
                      format: date-time
                      type: string
                    httpStatus:
                      description: HTTPStatus is the last HTTP response code for webhook
                        handlers.
                      format: int32
                      type: integer
                    kind:
                      description: Kind is "Webhook" or "Event".
                      type: string
                    message:
                      description: Message is a one-line human summary (last error,
                        or "ok").
                      type: string
                    name:
                      description: Name matches PromotionLifecycleHandler.name.
                      type: string
                    phase:
                      description: Phase is the phase transition that fired this handler.
                      enum:
                      - Pending
                      - Progressing
                      - Paused
                      - Restarting
                      - Succeeded
                      - Failed
                      - RollingBack
                      - Terminating
                      type: string
                    result:
                      description: |-
                        Result is "Succeeded" (final success), "Failed" (final failure after
                        retries), or "InProgress" (handler still running — never persisted to
                        status; the dispatcher waits for terminal outcome before writing).
                      type: string
                  required:
                  - firedAt
                  - kind
                  - name
                  - phase
                  - result
                  type: object
                maxItems: 50
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase aggregates the active attempt's PromotionRun phase into a coarse
                  Promotion phase.
                enum:
                - Pending
                - Progressing
                - Paused
                - Restarting
                - Succeeded
                - Failed
                - RollingBack
                - Terminating
                type: string
              resolvedVersion:
                description: |-
                  ResolvedVersion echoes the most recent attempt's version for quick
                  at-a-glance status.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
