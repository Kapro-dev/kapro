# Default values for kapro-operator.

replicaCount: 1

image:
  repository: ghcr.io/kapro-dev/kapro-operator
  pullPolicy: IfNotPresent
  # Empty defaults to Chart.appVersion, which matches the published release image tag.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Resource requests/limits — tune for your control plane cluster
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod security — follows Kubernetes restricted PSS
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# NetworkPolicy is opt-in so existing clusters are not surprised during
# upgrade. When enabled, ingress to the operator pod is limited to the known
# health, metrics, webhook, approval, and hub-gateway ports. Set
# networkPolicy.ingress.from to narrow allowed sources further.
networkPolicy:
  enabled: false
  ingress:
    from: []
  egress:
    enabled: false
    rules: []

# Leader election — required when replicaCount > 1
leaderElection:
  enabled: true
  namespace: ""  # defaults to PromotionRun namespace
  id: ""         # defaults to a shard-specific ID when shard is set

# Core ADR-0010 controllers that work in a normal hub install with no extra
# spoke bootstrap URL, fleet auto-import provider configuration, or preview
# extension runtime.
controllers:
  - fleet
  - plan
  - promotion
  - promotionrun
  - cluster

shard: ""
shardDefault: false

# Metrics
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s

# Health probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# Admission webhooks — validating + mutating
webhook:
  enabled: true
  port: 9443
  # failurePolicy: Fail blocks invalid CRDs from being created.
  # Use Ignore during initial rollout, switch to Fail once stable.
  failurePolicy: Fail
  certManager:
    # When true, cert-manager injects the caBundle via the
    # cert-manager.io/inject-ca-from annotation on the webhook config.
    # Requires cert-manager >= 1.5 to be installed in the cluster.
    #
    # When false (the default), the chart generates a self-signed CA +
    # serving cert at install time and stores them in a Secret in the
    # release namespace. The cert is reused across `helm upgrade` so
    # the running webhook is not disrupted. Use this path on any
    # cluster that does not have cert-manager (kind, k3d, EKS without
    # the cert-manager add-on, …).
    enabled: false
    # When issuerRef.name is empty, this chart creates a self-signed Issuer
    # in the release namespace. Set issuerRef to use an existing Issuer or
    # ClusterIssuer instead.
    issuerRef:
      name: ""
      kind: Issuer
      group: cert-manager.io
  # caBundle is used only when certManager.enabled=false.
  # Set to the base64-encoded CA certificate that signed the webhook TLS cert.
  caBundle: ""
  # tlsSecretName is used only when certManager.enabled=false.
  # The Secret must contain tls.crt and tls.key for the webhook server.
  tlsSecretName: ""


# Public URL for the approval/Decision API. Set this when exposing the
# approvalServer service through an ingress, load balancer, or port-forward.
externalURL: ""

approvalServer:
  enabled: true
  port: 8091
  service:
    enabled: true
    type: ClusterIP
    port: 8091

decisionAPI:
  # Opt-in. When enabled, /api/v1 Decision API routes require Kubernetes
  # bearer-token authentication plus SubjectAccessReview authorization.
  enabled: false

pluginGateway:
  # Opt-in preview. When true, the operator loads ready Plugin
  # objects once at startup. This chart does not install demo plugins.
  enabled: false

hubGateway:
  # Lightweight UI/CLI facade over Kapro CRDs. It is enabled by default for
  # in-cluster or port-forwarded use. Production exposure should place
  # Kubernetes authn/authz or an identity-aware proxy in front of it.
  enabled: true
  port: 8092
  service:
    enabled: false
    type: ClusterIP
    port: 8092

# The public URL of this hub's Kubernetes API server as reachable from spoke clusters.
# Example: https://hub.example.com:6443
# Required for CSR bootstrap — the hub operator passes this URL into the bootstrap kubeconfig
# it issues to new clusters so they know how to reach the hub.
hubAPIURL: ""

# Approval webhook HMAC secret.
# approvalSecret.value is stored as plain text in a K8s Secret. Leave it empty
# to let the operator auto-generate and maintain kapro-approval-hmac.
# The operator reads it from a volume mount (never from a plain env var).
approvalSecret:
  # value: plain-text secret value. Prefer --set-file or an externally managed Secret.
  value: ""
  # secretName: override the Secret name if you manage the Secret externally.
  secretName: ""

# Comma-separated list of extra usernames allowed to write PromotionRun
# objects (in addition to the operator's own service account, which is
# always allowed). Used for break-glass: e.g. a CI service account that
# needs to bypass the Promotion→PromotionRun controller path.
#
# Example:
#   promotionRunWriters: "system:serviceaccount:ci:tekton,system:serviceaccount:ci:argo"
promotionRunWriters: ""
