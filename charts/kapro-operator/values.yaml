# Default values for kapro-operator.

replicaCount: 1

image:
  repository: ghcr.io/vinnxcapital-gif/kapro-operator
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Resource requests/limits — tune for your control plane cluster
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod security — follows Kubernetes restricted PSS
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# Leader election — required when replicaCount > 1
leaderElection:
  enabled: true
  namespace: ""  # defaults to Release namespace

# Metrics
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s

# Health probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# Admission webhooks — validating + mutating
webhook:
  enabled: true
  port: 9443
  # failurePolicy: Fail blocks invalid CRDs from being created.
  # Use Ignore during initial rollout, switch to Fail once stable.
  failurePolicy: Fail
  certManager:
    # When true, cert-manager injects the caBundle via the
    # cert-manager.io/inject-ca-from annotation on the webhook config.
    # Requires cert-manager >= 1.5 to be installed in the cluster.
    enabled: true
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
  # caBundle is used only when certManager.enabled=false.
  # Set to the base64-encoded CA certificate that signed the webhook TLS cert.
  caBundle: ""


# The public URL of this hub's Kubernetes API server as reachable from spoke clusters.
# Example: https://hub.example.com:6443
# Required for CSR bootstrap — the hub operator passes this URL into the bootstrap kubeconfig
# it issues to new clusters so they know how to reach the hub.
hubAPIURL: ""

# Approval webhook HMAC secret.
# approvalSecret.value is base64-encoded and stored in a K8s Secret.
# The operator reads it from a volume mount (never from a plain env var).
approvalSecret:
  # value: base64-encoded secret value. Set via --set or in a sealed secret.
  # Example: printf 'my-secret' | base64
  value: ""
  # secretName: override the Secret name if you manage the Secret externally.
  secretName: ""
