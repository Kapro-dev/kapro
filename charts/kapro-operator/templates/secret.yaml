{{- if .Values.approvalSecret.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.approvalSecret.secretName | default "kapro-approval-secret" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # approval-secret is the HMAC key used to sign/verify approval webhook tokens.
  approval-secret: {{ .Values.approvalSecret.value | quote }}
{{- end }}
