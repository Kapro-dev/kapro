{{- /*
Webhook stack for the kapro-operator.

Co-locating the Service, ValidatingWebhookConfiguration,
MutatingWebhookConfiguration AND (when self-signed) the TLS Secret in
this single template file is deliberate: Helm template variables are
file-scoped, so the CA bundle computed once at the top of this file
is the same value injected into every `caBundle:` below AND written
to the Secret mounted into the operator Deployment.

Three configurations are supported:

  webhook.enabled=true, webhook.certManager.enabled=true
    Production with cert-manager. The chart emits the cert-manager
    Issuer + Certificate (see templates/webhook-cert.yaml) and the
    cert-manager.io/inject-ca-from annotation here. Skip the
    self-signed Secret in this file.

  webhook.enabled=true, webhook.certManager.enabled=false  (default)
    Self-signed path. This template generates a CA + serving cert,
    stores them in a Secret, and inlines the CA into every caBundle.
    Idempotent across `helm upgrade` via `lookup` — first install
    generates, subsequent upgrades reuse.

  webhook.enabled=false
    Webhook disabled entirely. Skip this template.
*/ -}}
{{- if .Values.webhook.enabled }}

# Self-signed cert path: compute once, reuse everywhere
{{- $caBundle := "" -}}
{{- $tlsCrt := "" -}}
{{- $tlsKey := "" -}}
{{- if .Values.webhook.caBundle -}}
  {{- /* Operator brought their own pre-rendered CA — honour it. */ -}}
  {{- $caBundle = .Values.webhook.caBundle -}}
{{- else if not .Values.webhook.certManager.enabled -}}
  {{- $svcName := printf "%s-webhook" (include "kapro-operator.fullname" .) -}}
  {{- $secretName := printf "%s-webhook-tls" (include "kapro-operator.fullname" .) -}}
  {{- $altNames := list (printf "%s.%s.svc" $svcName .Release.Namespace) (printf "%s.%s.svc.cluster.local" $svcName .Release.Namespace) -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
  {{- if and $existing (index $existing.data "ca.crt") (index $existing.data "tls.crt") (index $existing.data "tls.key") -}}
    {{- /* helm upgrade: reuse the existing cert so we do not rotate
          on every release and briefly break the running webhook. */ -}}
    {{- $caBundle = index $existing.data "ca.crt" -}}
    {{- $tlsCrt = index $existing.data "tls.crt" -}}
    {{- $tlsKey = index $existing.data "tls.key" -}}
  {{- else -}}
    {{- /* First install: generate. */ -}}
    {{- $genCA := genCA (printf "%s-ca" (include "kapro-operator.fullname" .)) 3650 -}}
    {{- $genCert := genSignedCert $svcName nil $altNames 3650 $genCA -}}
    {{- $caBundle = $genCA.Cert | b64enc -}}
    {{- $tlsCrt = $genCert.Cert | b64enc -}}
    {{- $tlsKey = $genCert.Key | b64enc -}}
  {{- end -}}
{{- end -}}

# Service for the webhook server
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kapro-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kapro-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: {{ .Values.webhook.port }}

# Self-signed serving Secret (only when self-signed mode)
{{- if and (not .Values.webhook.certManager.enabled) (not .Values.webhook.tlsSecretName) (not .Values.webhook.caBundle) }}
---
# TLS serving cert for the webhook. Generated by the chart on first
# install and reused on subsequent upgrades via the `lookup` pattern
# above. Mounted by the operator Deployment at
# /tmp/k8s-webhook-server/serving-certs.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kapro-operator.fullname" . }}-webhook-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $caBundle }}
  tls.crt: {{ $tlsCrt }}
  tls.key: {{ $tlsKey }}
{{- end }}

# ValidatingWebhookConfiguration
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kapro-operator.fullname" . }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kapro-operator.fullname" . }}-webhook-cert
  {{- end }}
webhooks:
  - name: validate.cluster.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["clusters"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-cluster
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

  - name: validate.promotionrun.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["promotionruns"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-promotionrun
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

  - name: validate.plan.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["plans"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-plan
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

  - name: validate.approval.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["approvals"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-approval
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}

  - name: validate.gateexpression.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["gateexpressions"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-gateexpression
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

  - name: validate.trigger.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["triggers"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /validate-kapro-io-v1alpha2-trigger
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

# MutatingWebhookConfiguration
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kapro-operator.fullname" . }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kapro-operator.fullname" . }}-webhook-cert
  {{- end }}
webhooks:
  - name: mutate.cluster.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["clusters"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /mutate-kapro-io-v1alpha2-cluster
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system]

  - name: mutate.approval.kapro.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kapro.io"]
        apiVersions: ["v1alpha2"]
        resources: ["approvals"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "kapro-operator.fullname" . }}-webhook
        path: /mutate-kapro-io-v1alpha2-approval
        port: 443
      {{- if not .Values.webhook.certManager.enabled }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
{{- end }}
