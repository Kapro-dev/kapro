apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kapro-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kapro-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kapro-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kapro-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kapro-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:8081
            - --webhook-port={{ .Values.webhook.port }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.approvalServer.enabled }}
            - name: approval
              containerPort: {{ .Values.approvalServer.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: KAPRO_EXTERNAL_URL
              value: {{ .Values.externalURL | default "" | quote }}
            - name: KAPRO_HUB_API_URL
              value: {{ .Values.hubAPIURL | default "" | quote }}
            - name: KAPRO_ENABLE_PLUGIN_GATEWAY
              value: {{ .Values.pluginGateway.enabled | quote }}
            - name: KAPRO_CONTROLLERS
              value: {{ join "," .Values.controllers | quote }}
            - name: KAPRO_APPROVAL_ADDR
              value: ":{{ .Values.approvalServer.port }}"
            {{- if .Values.leaderElection.namespace }}
            - name: KAPRO_LEADER_ELECTION_NAMESPACE
              value: {{ .Values.leaderElection.namespace | quote }}
            {{- end }}
            {{- if .Values.shard }}
            - name: KAPRO_SHARD
              value: {{ .Values.shard | quote }}
            {{- end }}
            {{- if not .Values.webhook.enabled }}
            - name: KAPRO_DISABLE_WEBHOOKS
              value: "true"
            {{- end }}
          {{- if or (and .Values.webhook.enabled .Values.webhook.certManager.enabled) (or .Values.approvalSecret.value .Values.approvalSecret.secretName) }}
          volumeMounts:
            {{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
            - name: webhook-tls
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- if or .Values.approvalSecret.value .Values.approvalSecret.secretName }}
            - name: approval-secret
              mountPath: /etc/kapro/secrets
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or (and .Values.webhook.enabled .Values.webhook.certManager.enabled) (or .Values.approvalSecret.value .Values.approvalSecret.secretName) }}
      volumes:
        {{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
        - name: webhook-tls
          secret:
            secretName: {{ include "kapro-operator.fullname" . }}-webhook-tls
        {{- end }}
        {{- if or .Values.approvalSecret.value .Values.approvalSecret.secretName }}
        - name: approval-secret
          secret:
            secretName: {{ .Values.approvalSecret.secretName | default "kapro-approval-secret" }}
            items:
              - key: approval-secret
                path: approval-secret
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
