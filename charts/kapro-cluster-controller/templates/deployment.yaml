{{- $clusterName := required "cluster.name is required (set --set cluster.name=<name> or use `kapro spoke bootstrap` to generate values)" .Values.cluster.name -}}
{{- $hubURL := required "hub.url is required (the hub kube-apiserver URL reachable from this cluster)" .Values.hub.url -}}
{{- $bootstrapSecret := required "bootstrap.kubeconfigSecret.name is required (generated by `kapro spoke bootstrap`)" .Values.bootstrap.kubeconfigSecret.name -}}
{{- $bootstrapKey := default "kubeconfig" .Values.bootstrap.kubeconfigSecret.key -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kapro-cluster-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapro-cluster-controller.labels" . | nindent 4 }}
spec:
  # Single replica by design: there is no leader election for the spoke and
  # each cluster expects exactly one heartbeat writer.
  replicas: 1
  selector:
    matchLabels:
      {{- include "kapro-cluster-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kapro-cluster-controller.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kapro-cluster-controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kapro-cluster-controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          env:
            - name: KAPRO_CLUSTER_NAME
              value: {{ $clusterName | quote }}
            - name: KAPRO_HUB_URL
              value: {{ $hubURL | quote }}
            {{- if .Values.hub.caBundle }}
            - name: KAPRO_HUB_CA_BUNDLE
              value: {{ .Values.hub.caBundle | quote }}
            {{- end }}
            - name: KAPRO_BOOTSTRAP_KUBECONFIG_PATH
              value: "{{ .Values.bootstrap.mountPath }}/{{ $bootstrapKey }}"
            - name: KAPRO_CREDENTIAL_SECRET_NAME
              value: {{ .Values.credentials.secretName | quote }}
            - name: KAPRO_CREDENTIAL_SECRET_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KAPRO_HEARTBEAT_NAMESPACE
              value: {{ .Values.heartbeat.namespace | quote }}
            - name: KAPRO_HEARTBEAT_INTERVAL
              value: "{{ .Values.heartbeat.intervalSeconds }}s"
            - name: KAPRO_STATUS_REPORT_INTERVAL
              value: "{{ .Values.status.reportIntervalSeconds }}s"
            - name: KAPRO_DELIVERY_INTERVAL
              value: "{{ .Values.delivery.intervalSeconds }}s"
            - name: KAPRO_METRICS_ADDR
              value: {{ ternary (printf ":%v" .Values.metrics.port) "off" .Values.metrics.enabled | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: bootstrap-kubeconfig
              mountPath: {{ .Values.bootstrap.mountPath }}
              readOnly: true
      volumes:
        - name: bootstrap-kubeconfig
          secret:
            secretName: {{ $bootstrapSecret }}
            items:
              - key: {{ $bootstrapKey }}
                path: {{ $bootstrapKey }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
