# Default values for kapro-cluster-controller.

# REQUIRED — must be set at install time
# The name of the MemberCluster CRD on the control plane that this cluster maps to.
environmentRef: ""

# REQUIRED — URL of the hub cluster's Kubernetes API server (used for CSR bootstrap + heartbeat)
# Example: https://hub.example.com:6443
controlPlane:
  url: ""
  # Optional base64-encoded (or PEM) CA bundle for the hub API server TLS certificate.
  # Leave blank to use the system trust store (only works when CA is publicly trusted).
  caBundle: ""

# REQUIRED — name of the Secret containing the bootstrap kubeconfig issued by the hub operator.
# Create the MemberCluster CR on the hub first, then copy the Secret it creates
# (status.bootstrap.issuedBootstrapKubeconfig) to this spoke cluster.
# The cluster-controller reads it once during first boot to submit its CSR.
# After bootstrap, credentials are stored in 'kapro-hub-credentials' and this Secret is no
# longer needed (but safe to leave mounted).
bootstrapKubeconfigSecret: ""

fluxNamespace: flux-system

image:
  repository: ghcr.io/vinnxcapital-gif/kapro-cluster-controller
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
    # GKE Workload Identity example:
    # iam.gke.io/gcp-service-account: kapro-cc@<project>.iam.gserviceaccount.com

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# Heartbeat interval in seconds
heartbeatIntervalSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
