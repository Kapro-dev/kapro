# Default values for kapro-cluster-controller.
#
# This chart deploys the spoke-side agent that registers a workload cluster
# with a Kapro hub. The bootstrap kubeconfig Secret referenced by
# bootstrap.kubeconfigSecret.name must already exist in the install namespace —
# generate it with `kapro spoke bootstrap <cluster-name>` on the hub.

image:
  repository: ghcr.io/kapro-dev/kapro-cluster-controller
  pullPolicy: IfNotPresent
  # Empty defaults to Chart.appVersion, which matches the published release image tag.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # Creates a ClusterRole + ClusterRoleBinding granting the spoke read on nodes
  # (for status reporting) and a Role on the install namespace for the
  # credential Secret. Disable to bring your own RBAC.
  create: true

# REQUIRED: name of this Cluster on the hub.
cluster:
  name: ""

hub:
  # REQUIRED: externally-reachable hub kube-apiserver URL (e.g. https://hub.example.com:6443).
  url: ""
  # PEM CA bundle for the hub apiserver. Inline as base64 OR raw PEM; both
  # are accepted by the spoke. Leave empty when the hub uses a publicly
  # trusted cert. The `kapro spoke bootstrap` CLI fills this in automatically.
  caBundle: ""

bootstrap:
  kubeconfigSecret:
    # REQUIRED: name of the Secret containing the hub bootstrap kubeconfig.
    # Generated by `kapro spoke bootstrap <cluster-name>` on the hub.
    name: ""
    key: "kubeconfig"
  mountPath: "/etc/kapro/bootstrap"

credentials:
  # Name of the local Secret where the spoke persists its issued client cert.
  # Survives pod restarts. Created on first boot if missing.
  secretName: "kapro-hub-credentials"

heartbeat:
  # Hub namespace where the spoke writes its Lease (must match the hub
  # bootstrap reconciler's namespace; the per-cluster RBAC is scoped to it).
  namespace: "kapro-system"
  intervalSeconds: 30  # minimum 5

status:
  reportIntervalSeconds: 60  # minimum 10

delivery:
  intervalSeconds: 30  # minimum 10

metrics:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    enabled: false
    labels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
