project_name: kapro

before:
  hooks:
    - go mod tidy

builds:
  - id: kapro-operator
    main: ./cmd/operator
    binary: kapro-operator
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X kapro.io/kapro/internal/version.Version={{.Version}}
      - -X kapro.io/kapro/internal/version.Commit={{.Commit}}
      - -X kapro.io/kapro/internal/version.Date={{.Date}}

  - id: kapro-cluster-controller
    main: ./cmd/cluster-controller
    binary: kapro-cluster-controller
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X kapro.io/kapro/internal/version.Version={{.Version}}
      - -X kapro.io/kapro/internal/version.Commit={{.Commit}}
      - -X kapro.io/kapro/internal/version.Date={{.Date}}

archives:
  - id: kapro
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: vinnxcapital-gif
    name: kapro
  header: |
    ## 🦘 Kapro {{ .Tag }}

    The Canonical Promotion Layer for Kubernetes.
