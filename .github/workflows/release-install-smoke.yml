name: Release Install Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published release tag to install (e.g. v0.6.2).
        required: true
      previous_version:
        description: Optional previous published release tag for a supported upgrade and rollback smoke.
        required: false
        default: ""
      kind_image:
        description: Kind node image for the smoke cluster.
        required: true
        default: kindest/node:v1.30.0
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  release-install-smoke:
    name: Release Install Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout public source
        env:
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ] && [ -n "${WORKFLOW_RUN_HEAD_BRANCH}" ]; then
            ref="refs/tags/${WORKFLOW_RUN_HEAD_BRANCH}"
          else
            ref="${GITHUB_REF}"
          fi
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "+${ref}:refs/remotes/origin/checkout"
          git checkout --force --detach refs/remotes/origin/checkout
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up Helm, kubectl, and kind
        env:
          CI_SETUP_KIND: "true"
        run: scripts/ci-setup-tools.sh

      - name: Create fresh Kind cluster
        env:
          KAPRO_RELEASE_INSTALL_KIND_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.kind_image || 'kindest/node:v1.30.0' }}
        run: |
          kind create cluster \
            --name kapro-release-install \
            --image "${KAPRO_RELEASE_INSTALL_KIND_IMAGE}"

      - name: Install published release artifacts
        env:
          KAPRO_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.workflow_run.head_branch }}
          KAPRO_VERIFY_CLEANUP: "true"
        run: scripts/verify-install.sh release-cluster

      - name: Reset Kind cluster for upgrade smoke
        if: github.event_name == 'workflow_dispatch' && inputs.previous_version != ''
        env:
          KAPRO_RELEASE_INSTALL_KIND_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.kind_image || 'kindest/node:v1.30.0' }}
        run: |
          kind delete cluster --name kapro-release-install
          kind create cluster \
            --name kapro-release-install \
            --image "${KAPRO_RELEASE_INSTALL_KIND_IMAGE}"

      - name: Upgrade from previous published release
        if: github.event_name == 'workflow_dispatch' && inputs.previous_version != ''
        env:
          KAPRO_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.workflow_run.head_branch }}
          KAPRO_PREVIOUS_RELEASE_VERSION: ${{ inputs.previous_version }}
          KAPRO_VERIFY_CLEANUP: "true"
        run: scripts/verify-install.sh release-upgrade-cluster

      - name: Reset Kind cluster for rollback smoke
        if: github.event_name == 'workflow_dispatch' && inputs.previous_version != ''
        env:
          KAPRO_RELEASE_INSTALL_KIND_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.kind_image || 'kindest/node:v1.30.0' }}
        run: |
          kind delete cluster --name kapro-release-install
          kind create cluster \
            --name kapro-release-install \
            --image "${KAPRO_RELEASE_INSTALL_KIND_IMAGE}"

      - name: Roll back from current published release
        if: github.event_name == 'workflow_dispatch' && inputs.previous_version != ''
        env:
          KAPRO_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.workflow_run.head_branch }}
          KAPRO_PREVIOUS_RELEASE_VERSION: ${{ inputs.previous_version }}
          KAPRO_VERIFY_CLEANUP: "true"
        run: scripts/verify-install.sh release-rollback-cluster

      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p release-install-diagnostics
          kind export logs --name kapro-release-install release-install-diagnostics/kind || true
          kubectl --context kind-kapro-release-install get events -A --sort-by=.lastTimestamp > release-install-diagnostics/events.txt || true
          kubectl --context kind-kapro-release-install get all -A -o wide > release-install-diagnostics/all.txt || true
          kubectl --context kind-kapro-release-install get crd -o wide > release-install-diagnostics/crds.txt || true
          kubectl --context kind-kapro-release-install get substrates.kapro.io,fleets.kapro.io,clusters.kapro.io,plans.kapro.io,promotions.kapro.io,promotionruns.runtime.kapro.io,targets.runtime.kapro.io -A -o yaml > release-install-diagnostics/kapro-resources.yaml || true
          kubectl --context kind-kapro-release-install -n kapro-system logs deploy/kapro-kapro-operator --tail=-1 > release-install-diagnostics/operator.log || true
