name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # for OIDC signing with cosign

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build and push operator image
        uses: docker/build-push-action@v5
        id: build-operator
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kapro-dev/kapro-operator:${{ github.ref_name }}
            ghcr.io/kapro-dev/kapro-operator:latest
          labels: |
            org.opencontainers.image.title=kapro-operator
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/Kapro-dev/kapro
            org.opencontainers.image.documentation=https://kapro.dev
            org.opencontainers.image.licenses=Apache-2.0

      - name: Sign operator image with cosign
        run: |
          cosign sign --yes ghcr.io/kapro-dev/kapro-operator@${{ steps.build-operator.outputs.digest }}

      - name: Build and push cluster-controller image
        uses: docker/build-push-action@v5
        id: build-cluster-controller
        with:
          context: .
          file: Dockerfile.cluster-controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kapro-dev/kapro-cluster-controller:${{ github.ref_name }}
            ghcr.io/kapro-dev/kapro-cluster-controller:latest
          labels: |
            org.opencontainers.image.title=kapro-cluster-controller
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/Kapro-dev/kapro
            org.opencontainers.image.documentation=https://kapro.dev
            org.opencontainers.image.licenses=Apache-2.0

      - name: Sign cluster-controller image with cosign
        run: |
          cosign sign --yes ghcr.io/kapro-dev/kapro-cluster-controller@${{ steps.build-cluster-controller.outputs.digest }}

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package charts/kapro-operator --destination dist
          helm package charts/kapro-cluster-controller --destination dist
          shasum -a 256 dist/* > dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*
