name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write       # OIDC for cosign keyless + SLSA build provenance
  attestations: write   # actions/attest-build-provenance writes attestations
  security-events: write # github/codeql-action/upload-sarif publishes Trivy SARIF

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-go@v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        # docker/login-action@v4
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Install cosign
        # sigstore/cosign-installer@v3
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Set up Helm
        # azure/setup-helm@v5
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2

      - name: Verify release metadata matches tag
        run: VERSION="${{ github.ref_name }}" scripts/ci-release-smoke.sh

      # ---- operator image -----------------------------------------------------

      - name: Build and push operator image
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        id: build-operator
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kapro-dev/kapro-operator:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=kapro-operator
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/Kapro-dev/kapro
            org.opencontainers.image.documentation=https://kapro.dev
            org.opencontainers.image.licenses=Apache-2.0

      - name: Sign operator image with cosign
        run: |
          cosign sign --yes ghcr.io/kapro-dev/kapro-operator@${{ steps.build-operator.outputs.digest }}

      - name: Scan operator image for HIGH/CRITICAL CVEs (Trivy)
        # aquasecurity/trivy-action@v0.24.0
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: ghcr.io/kapro-dev/kapro-operator@${{ steps.build-operator.outputs.digest }}
          format: sarif
          output: trivy-operator.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: 'os,library'

      - name: Upload operator Trivy SARIF to GitHub code scanning
        if: ${{ always() && hashFiles('trivy-operator.sarif') != '' }}
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: trivy-operator.sarif
          category: trivy-operator

      - name: Generate SBOM for operator image (Syft / SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/kapro-dev/kapro-operator@${{ steps.build-operator.outputs.digest }}
          format: spdx-json
          output-file: kapro-operator.spdx.json
          upload-artifact: false

      - name: Attest operator SBOM with cosign
        run: |
          cosign attest --yes \
            --predicate kapro-operator.spdx.json \
            --type spdxjson \
            ghcr.io/kapro-dev/kapro-operator@${{ steps.build-operator.outputs.digest }}

      - name: Attach SLSA build provenance to operator image
        # actions/attest-build-provenance@v4
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ghcr.io/kapro-dev/kapro-operator
          subject-digest: ${{ steps.build-operator.outputs.digest }}
          push-to-registry: true

      # ---- cluster-controller image -------------------------------------------

      - name: Build and push cluster-controller image
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        id: build-cluster-controller
        with:
          context: .
          file: Dockerfile.cluster-controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kapro-dev/kapro-cluster-controller:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=kapro-cluster-controller
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/Kapro-dev/kapro
            org.opencontainers.image.documentation=https://kapro.dev
            org.opencontainers.image.licenses=Apache-2.0

      - name: Sign cluster-controller image with cosign
        run: |
          cosign sign --yes ghcr.io/kapro-dev/kapro-cluster-controller@${{ steps.build-cluster-controller.outputs.digest }}

      - name: Scan cluster-controller image for HIGH/CRITICAL CVEs (Trivy)
        # aquasecurity/trivy-action@v0.24.0
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: ghcr.io/kapro-dev/kapro-cluster-controller@${{ steps.build-cluster-controller.outputs.digest }}
          format: sarif
          output: trivy-cluster-controller.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: 'os,library'

      - name: Upload cluster-controller Trivy SARIF to GitHub code scanning
        if: ${{ always() && hashFiles('trivy-cluster-controller.sarif') != '' }}
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: trivy-cluster-controller.sarif
          category: trivy-cluster-controller

      - name: Generate SBOM for cluster-controller image (Syft / SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/kapro-dev/kapro-cluster-controller@${{ steps.build-cluster-controller.outputs.digest }}
          format: spdx-json
          output-file: kapro-cluster-controller.spdx.json
          upload-artifact: false

      - name: Attest cluster-controller SBOM with cosign
        run: |
          cosign attest --yes \
            --predicate kapro-cluster-controller.spdx.json \
            --type spdxjson \
            ghcr.io/kapro-dev/kapro-cluster-controller@${{ steps.build-cluster-controller.outputs.digest }}

      - name: Attach SLSA build provenance to cluster-controller image
        # actions/attest-build-provenance@v4
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ghcr.io/kapro-dev/kapro-cluster-controller
          subject-digest: ${{ steps.build-cluster-controller.outputs.digest }}
          push-to-registry: true

      # ---- Helm charts --------------------------------------------------------

      - name: Package Helm charts
        run: |
          mkdir -p dist
          helm package charts/kapro-operator --destination dist
          helm package charts/kapro-cluster-controller --destination dist

      - name: Sign Helm chart artifacts with cosign (sign-blob)
        run: |
          for tgz in dist/*.tgz; do
            cosign sign-blob --yes \
              --output-signature "${tgz}.sig" \
              --output-certificate "${tgz}.pem" \
              "${tgz}"
          done

      - name: Attach SLSA build provenance to Helm chart artifacts
        # actions/attest-build-provenance@v4
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: 'dist/*.tgz'

      - name: Generate checksums for release assets
        run: |
          # Include charts, sigs, certs, and SBOMs so subscribers can verify
          # any single download against the published checksum file.
          shasum -a 256 dist/* kapro-operator.spdx.json kapro-cluster-controller.spdx.json \
            > dist/checksums.txt

      # ---- GitHub Release -----------------------------------------------------

      - name: Create GitHub Release
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          # Body is auto-generated using .github/release.yml category config,
          # which groups merged PRs since the previous tag.
          generate_release_notes: true
          files: |
            dist/*
            kapro-operator.spdx.json
            kapro-cluster-controller.spdx.json
