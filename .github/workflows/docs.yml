name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public source
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            ref="refs/pull/${PR_NUMBER}/merge"
          else
            ref="${GITHUB_REF}"
          fi
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "+${ref}:refs/remotes/origin/checkout"
          git checkout --force --detach refs/remotes/origin/checkout
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
      - name: Install MkDocs
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r docs/requirements.txt
      - name: Build
        run: mkdocs build -f docs/mkdocs.yml --strict

  deploy:
    name: Deploy docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout public source
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            ref="refs/pull/${PR_NUMBER}/merge"
          else
            ref="${GITHUB_REF}"
          fi
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "+${ref}:refs/remotes/origin/checkout"
          git checkout --force --detach refs/remotes/origin/checkout
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
      - name: Install MkDocs
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r docs/requirements.txt
      - name: Build
        run: mkdocs build -f docs/mkdocs.yml --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
