# Configuration for GitHub's `generate_release_notes: true` body generator
# (consumed by softprops/action-gh-release and `gh release create`).
#
# Categorization is driven by PR labels. PRs without any of the labels below
# fall into the trailing "Other Changes" bucket. PRs labelled `ignore-for-release`
# are excluded entirely.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change
    - title: Security
      labels:
        - security
    - title: New Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Supply Chain & Release Engineering
      labels:
        - release
        - supply-chain
        - ci
    - title: Internal / Refactor
      labels:
        - internal
        - refactor
        - dependencies
    - title: Other Changes
      labels:
        - "*"
