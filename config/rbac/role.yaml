  - get
  - patch
  - update
- apiGroups:
  - kapro.io
  resources:
  - artifacts
  - pipelines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kapro.io
  resources:
  - memberclusters
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kapro.io
  resources:
  - memberclusters/finalizers
  - releases/finalizers
  verbs:
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
