---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - delete
  - get
  - list
  - watch
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests/approval
  verbs:
  - update
- apiGroups:
  - certificates.k8s.io
  resourceNames:
  - kubernetes.io/kube-apiserver-client
  resources:
  - signers
  verbs:
  - approve
- apiGroups:
  - kapro.io
  resources:
  - approvals
  - releasereports
  - releases
  - syncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kapro.io
  resources:
  - artifacts
  - pipelines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kapro.io
  resources:
  - memberclusters
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kapro.io
  resources:
  - memberclusters/finalizers
  - releases/finalizers
  - syncs/finalizers
  verbs:
  - update
- apiGroups:
  - kapro.io
  resources:
  - memberclusters/status
  - pipelines/status
  - releasereports/status
  - releases/status
  - syncs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kapro.io
  resources:
  - releaserevisions
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
