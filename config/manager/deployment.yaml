apiVersion: v1
kind: Namespace
metadata:
  name: kapro-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kapro-operator
  namespace: kapro-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kapro-operator
  template:
    metadata:
      labels:
        app: kapro-operator
    spec:
      serviceAccountName: kapro-operator
      containers:
      - name: manager
        image: ghcr.io/kapro-dev/kapro-operator:latest
        imagePullPolicy: IfNotPresent
        command: ["/kapro-operator"]
        args:
        - --leader-elect=true
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: KAPRO_DISABLE_WEBHOOKS
          value: "true"
        # KAPRO_HUB_API_URL must be set to the hub kube-apiserver URL reachable
        # from within the spoke cluster network (not localhost).
        # For kind-on-docker: use the hub control-plane container IP, e.g.
        #   https://$(kubectl get node kapro-hub-control-plane -o jsonpath='{.status.addresses[0].address}'):6443
        # For production: use the external LB / ingress URL of the hub apiserver.
        - name: KAPRO_HUB_API_URL
          value: ""
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kapro-operator
  namespace: kapro-system
