---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: kagents.kapro.io
spec:
  group: kapro.io
  names:
    kind: KAgent
    listKind: KAgentList
    plural: kagents
    singular: kagent
  scope: Namespaced
  versions:
  - name: v1alpha1
    additionalPrinterColumns:
    - jsonPath: .spec.source.type
      name: Source
      type: string
    - jsonPath: .status.active
      name: Active
      type: boolean
    - jsonPath: .status.lastTriggerAt
      name: Last Trigger
      type: string
    schema:
      openAPIV3Schema:
        description: |-
          KAgent is an autonomous release trigger. It watches an external source
          (MLflow model registry, OCI tag, Prometheus metric) and creates a Kapro
          Release CR when the trigger condition is met.
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation
              of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this
              object represents.
            type: string
          metadata:
            type: object
          spec:
            properties:
              pollInterval:
                default: 60s
                description: PollInterval is how often the agent polls the source.
                type: string
              releaseTemplate:
                description: ReleaseTemplate is the template used to create a Release
                  CR when triggered.
                properties:
                  artifactPrefix:
                    description: ArtifactPrefix is prepended to the detected version
                      to form the Artifact name.
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels to apply to the created Release.
                    type: object
                  pipelineRef:
                    description: PipelineRef is the Pipeline template to clone for
                      this Release.
                    type: string
                  scope:
                    description: Scope is the Environment label selector for the Release.
                    properties:
                      selector:
                        description: Selector is a label selector matching Environments.
                        properties:
                          matchExpressions:
                            items:
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  items:
                                    type: string
                                  type: array
                              required:
                              - key
                              - operator
                              type: object
                            type: array
                          matchLabels:
                            additionalProperties:
                              type: string
                            type: object
                        type: object
                    type: object
                required:
                - artifactPrefix
                - scope
                type: object
              source:
                description: Source defines the trigger source.
                properties:
                  mlflow:
                    description: MLflow configures the MLflow Model Registry source.
                    properties:
                      modelName:
                        description: ModelName is the registered model name in MLflow.
                        type: string
                      stage:
                        default: Production
                        description: Stage filters which model stage triggers a release.
                        enum:
                        - Production
                        - Staging
                        - Archived
                        type: string
                      tokenSecretRef:
                        description: TokenSecretRef is the name of a Secret with key
                          "token" for authenticated MLflow.
                        type: string
                      trackingServerURL:
                        description: TrackingServerURL is the MLflow tracking server
                          base URL.
                        type: string
                    required:
                    - modelName
                    - trackingServerURL
                    type: object
                  oci:
                    description: OCI configures an OCI registry tag watcher.
                    properties:
                      repository:
                        description: Repository is the OCI repository URL.
                        type: string
                      secretRef:
                        description: SecretRef is a Secret name containing ".dockerconfigjson"
                          for private registries.
                        type: string
                      tagPattern:
                        default: ^v[0-9]+\.[0-9]+\.[0-9]+$
                        description: TagPattern is a Go regexp matched against image
                          tags.
                        type: string
                    required:
                    - repository
                    type: object
                  prometheus:
                    description: Prometheus configures a Prometheus metric threshold
                      trigger.
                    properties:
                      address:
                        description: Address is the Prometheus endpoint.
                        type: string
                      operator:
                        description: Operator compares the query result to Threshold.
                        enum:
                        - '>'
                        - '>='
                        - '<'
                        - <=
                        - ==
                        type: string
                      query:
                        description: Query is the PromQL expression.
                        type: string
                      threshold:
                        description: Threshold is the numeric threshold value.
                        type: number
                    required:
                    - address
                    - operator
                    - query
                    - threshold
                    type: object
                  type:
                    description: Type selects the source backend.
                    enum:
                    - mlflow
                    - oci
                    - prometheus
                    type: string
                required:
                - type
                type: object
              suspend:
                description: Suspend pauses the agent when true.
                type: boolean
            required:
            - releaseTemplate
            - source
            type: object
          status:
            properties:
              active:
                description: Active is true when the agent is running and not suspended.
                type: boolean
              lastTriggerAt:
                description: LastTriggerAt is the RFC3339 timestamp of the most recent
                  trigger.
                type: string
              lastVersion:
                description: LastVersion is the last version that triggered a Release.
                type: string
              message:
                description: Message is a human-readable status message.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
