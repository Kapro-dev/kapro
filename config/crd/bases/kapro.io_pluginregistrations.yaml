---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: pluginregistrations.kapro.io
spec:
  group: kapro.io
  names:
    kind: PluginRegistration
    listKind: PluginRegistrationList
    plural: pluginregistrations
    singular: pluginregistration
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.connected
      name: Connected
      type: boolean
    - jsonPath: .status.lastPing
      name: Last Ping
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PluginRegistration registers an external gRPC plugin with the Kapro operator.
          The plugin implements one of: ActuatorService, ProviderService, GateService.
          See: proto/actuator.proto, proto/provider.proto, proto/gate.proto
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PluginRegistrationSpec defines how to locate and connect to a Kapro plugin.
              Plugins implement one of: ActuatorService, ProviderService, GateService (gRPC).
            properties:
              endpoint:
                description: |-
                  Endpoint is the gRPC endpoint for remote plugins (e.g. grpc://host:port).
                  Used for plugins that run as a separate service (not a sidecar).
                  Mutually exclusive with SocketPath.
                type: string
              healthCheck:
                description: HealthCheck configures how the operator probes plugin
                  liveness.
                properties:
                  intervalSeconds:
                    description: IntervalSeconds is how often to probe the plugin's
                      gRPC health service.
                    type: integer
                  timeoutSeconds:
                    description: TimeoutSeconds is the probe timeout.
                    type: integer
                type: object
              metadata:
                description: Metadata is informational metadata about the plugin.
                properties:
                  description:
                    type: string
                  homepage:
                    type: string
                  vendor:
                    type: string
                  version:
                    type: string
                type: object
              socketPath:
                description: |-
                  SocketPath is the path to the Unix domain socket for local (sidecar) plugins.
                  Convention: /var/run/kapro-plugins/<plugin-name>.sock
                  Mutually exclusive with Endpoint.
                type: string
              tls:
                description: TLS configures mTLS for remote endpoint plugins.
                properties:
                  secretRef:
                    description: 'SecretRef names a K8s Secret with keys: tls.crt,
                      tls.key, ca.crt'
                    type: string
                required:
                - secretRef
                type: object
              type:
                description: Type declares which PCL interface this plugin implements.
                enum:
                - Actuator
                - Provider
                - Gate
                type: string
            required:
            - type
            type: object
          status:
            description: PluginRegistrationStatus is written by the operator after
              it connects to the plugin.
            properties:
              capabilities:
                description: Capabilities lists the capabilities reported by the plugin
                  via GetCapabilities RPC.
                items:
                  type: string
                type: array
              connected:
                description: Connected is true when the operator has established a
                  gRPC connection.
                type: boolean
              lastPing:
                description: LastPing is the RFC3339 timestamp of the last successful
                  health check.
                type: string
              message:
                description: Message is a human-readable status or error message.
                type: string
            required:
            - connected
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
