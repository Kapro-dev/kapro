---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: clusterregistrations.kapro.io
spec:
  group: kapro.io
  names:
    kind: ClusterRegistration
    listKind: ClusterRegistrationList
    plural: clusterregistrations
    singular: clusterregistration
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.environmentRef
      name: Environment
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.deliverySystem
      name: Delivery
      type: string
    - jsonPath: .status.health.allWorkloadsReady
      name: Healthy
      type: boolean
    - jsonPath: .status.activeRelease
      name: Active Release
      type: string
    - jsonPath: .status.lastHeartbeat
      name: Heartbeat
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterRegistration is the fleet registry entry for a workload cluster.
          One object per cluster, cluster-scoped on the Kapro control plane.
          The control plane writes spec.desiredVersion; cluster-controller writes status.
          Together they form the canonical read model for "what is running where."
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClusterRegistrationSpec defines the desired state for a registered workload cluster.
              spec.desiredVersion is written by the kapro-operator; all other spec fields are
              written once by the cluster-controller at bootstrap time and never changed.
            properties:
              capabilities:
                description: |-
                  Capabilities is written by cluster-controller at registration time.
                  Declares which delivery systems are available on this cluster.
                properties:
                  argoCDVersion:
                    description: ArgoCDVersion is the installed ArgoCD version, or
                      empty if ArgoCD is not present.
                    type: string
                  fluxVersion:
                    description: FluxVersion is the installed Flux version, or empty
                      if Flux is not present.
                    type: string
                  k8sVersion:
                    description: K8sVersion is the Kubernetes server version (e.g.
                      "v1.30.2").
                    type: string
                  nodeCount:
                    description: NodeCount is the number of nodes in the cluster at
                      registration time.
                    type: integer
                  region:
                    description: Region is the cloud region or datacenter label for
                      this cluster.
                    type: string
                  sveltosVersion:
                    description: SveltosVersion is the installed Sveltos version,
                      or empty if Sveltos is not present.
                    type: string
                type: object
              controllerVersion:
                description: ControllerVersion is the version of kapro-cluster-controller
                  running on this cluster.
                type: string
              desiredVersion:
                description: |-
                  DesiredVersion is written by the kapro-operator (via ActuatorPlugin.Apply).
                  cluster-controller polls this field; on change, patches the local delivery system
                  (OCIRepository tag for Flux, Application revision for ArgoCD, etc.)
                type: string
              environmentRef:
                description: EnvironmentRef names the Environment CRD this cluster
                  belongs to.
                type: string
            required:
            - environmentRef
            type: object
          status:
            description: |-
              ClusterRegistrationStatus is the fleet registry entry — written by kapro-cluster-controller.
              This is the single authoritative source of truth for "what is running where."
              Think of it as a Kubernetes Node object but for clusters, not nodes.
            properties:
              activeRelease:
                description: |-
                  ActiveRelease is the name of the Release currently being applied to this cluster.
                  Set by kapro-operator when a Promotion transitions to Applying.
                type: string
              conditions:
                description: 'Conditions follow KEP-1623: Ready, Synced, Degraded,
                  Unreachable.'
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentVersions:
                additionalProperties:
                  type: string
                description: |-
                  CurrentVersions is a map of component → deployed version.
                  e.g. {"ocs": "v1.2.4", "keycloak": "24.0.1"}
                  Populated by cluster-controller from the local delivery system's status.
                type: object
              deliverySystem:
                description: |-
                  DeliverySystem reports which actuator is managing this cluster.
                  Written by cluster-controller based on what delivery system it detects locally.
                enum:
                - flux
                - argocd
                - sveltos
                - ocm
                - helm
                type: string
              health:
                description: Health is the aggregated workload health from the local
                  delivery system.
                properties:
                  allWorkloadsReady:
                    description: AllWorkloadsReady is true when every tracked workload
                      is in a ready state.
                    type: boolean
                  failedWorkloads:
                    description: FailedWorkloads is the count of workloads in a failed/degraded
                      state.
                    type: integer
                  message:
                    description: Message is a human-readable summary from the delivery
                      system.
                    type: string
                  readyWorkloads:
                    description: ReadyWorkloads is the count of workloads in Ready
                      state.
                    type: integer
                  totalWorkloads:
                    description: TotalWorkloads is the total count of tracked workloads.
                    type: integer
                required:
                - allWorkloadsReady
                - failedWorkloads
                - readyWorkloads
                - totalWorkloads
                type: object
              lastHeartbeat:
                description: |-
                  LastHeartbeat is the RFC3339 timestamp of the last cluster-controller write.
                  Used by CRDProvider.IsReachable() to determine if the cluster is still live.
                type: string
              phase:
                description: Phase is the current convergence state of this cluster.
                enum:
                - Pending
                - Applying
                - Converging
                - Converged
                - Failed
                - Unreachable
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
