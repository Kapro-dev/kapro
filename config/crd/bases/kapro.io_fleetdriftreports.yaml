---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleetdriftreports.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: FleetDriftReport
    listKind: FleetDriftReportList
    plural: fleetdriftreports
    shortNames:
    - fdr
    singular: fleetdriftreport
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.fleetRef
      name: Fleet
      priority: 1
      type: string
    - jsonPath: .spec.promotionRunRef
      name: PromotionRun
      priority: 1
      type: string
    - jsonPath: .status.summary.driftedTargets
      name: Drifted
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          FleetDriftReport is an operator-owned observation report. It never drives
          delivery and never writes Cluster, PromotionRun, or Target status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FleetDriftReportSpec selects the slice of fleet state to
              observe.
            properties:
              fleetRef:
                description: FleetRef limits the report to PromotionRuns stamped for
                  this Fleet.
                type: string
              maxTargets:
                description: MaxTargets caps status.targets evidence. Defaults to
                  128.
                format: int32
                maximum: 512
                minimum: 1
                type: integer
              promotionRunRef:
                description: PromotionRunRef limits the report to one PromotionRun's
                  child Targets.
                type: string
              syncInterval:
                description: SyncInterval controls periodic refresh. Defaults to 5m.
                type: string
              targetSelector:
                description: TargetSelector limits the report to matching Target labels.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            type: object
          status:
            description: FleetDriftReportStatus is the controller-owned observation
              result.
            properties:
              conditions:
                description: Conditions follow the standard Ready/Reconciling/Stalled
                  status contract.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedAt:
                description: ObservedAt is the time this report was last computed.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: FleetDriftReportPhase summarizes current drift observation.
                enum:
                - Pending
                - Current
                - Drifted
                - Unknown
                - Failed
                type: string
              summary:
                description: Summary aggregates target and backend-object drift.
                properties:
                  currentTargets:
                    format: int32
                    type: integer
                  driftedBackendObjects:
                    format: int32
                    type: integer
                  driftedTargets:
                    format: int32
                    type: integer
                  failedTargets:
                    format: int32
                    type: integer
                  pendingTargets:
                    format: int32
                    type: integer
                  totalBackendObjects:
                    format: int32
                    type: integer
                  totalTargets:
                    format: int32
                    type: integer
                  unknownTargets:
                    format: int32
                    type: integer
                type: object
              targets:
                description: Targets contains bounded evidence for targets that are
                  not current.
                items:
                  description: FleetDriftTarget records one non-current rollout target.
                  properties:
                    appVersions:
                      description: AppVersions contains desired/current comparisons.
                        Capped for status size.
                      items:
                        description: FleetDriftVersion compares desired and observed
                          versions for one app key.
                        properties:
                          appKey:
                            type: string
                          currentVersion:
                            type: string
                          deliveryPhase:
                            description: |-
                              DeliveryPhase classifies the spoke-side delivery loop's progress for one app.
                              Pending → Pulling → Staging → Applying → Converged is the happy path; Failed
                              is a sticky terminal state cleared on the next observed-digest change.
                            enum:
                            - Pending
                            - Pulling
                            - Staging
                            - Applying
                            - Converged
                            - Failed
                            - Skipped
                            type: string
                          desiredVersion:
                            type: string
                        type: object
                      maxItems: 64
                      type: array
                    cluster:
                      type: string
                    message:
                      type: string
                    objects:
                      description: Objects contains backend-native drift evidence.
                        Capped for status size.
                      items:
                        description: FleetDriftObject carries backend-native object
                          drift evidence.
                        properties:
                          apiVersion:
                            type: string
                          currentVersion:
                            type: string
                          desiredVersion:
                            type: string
                          healthStatus:
                            type: string
                          kind:
                            type: string
                          message:
                            type: string
                          name:
                            type: string
                          namespace:
                            type: string
                          phase:
                            type: string
                          syncStatus:
                            type: string
                          unit:
                            type: string
                        type: object
                      maxItems: 16
                      type: array
                    phase:
                      description: TargetPhase is the execution state of one target
                        cluster rollout within a PromotionRun.
                      enum:
                      - Pending
                      - Verification
                      - HealthCheck
                      - Soaking
                      - MetricsCheck
                      - WaitingApproval
                      - Applying
                      - Converged
                      - Failed
                      - Skipped
                      type: string
                    plan:
                      type: string
                    planRef:
                      type: string
                    promotionRun:
                      type: string
                    reason:
                      type: string
                    stage:
                      type: string
                  type: object
                maxItems: 512
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
