---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: plugingateways.kapro.io
spec:
  group: kapro.io
  names:
    kind: PluginGateway
    listKind: PluginGatewayList
    plural: plugingateways
    shortNames:
    - pgw
    singular: plugingateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PluginGateway is a namespace-scoped, ambient-style gate integration.
          Unlike PluginRegistration (cluster-scoped, requires a persistent gRPC server),
          a PluginGateway needs no deployed plugin process. Three modes are supported -
          builtin (routes to a named built-in gate), job (spawns an ephemeral Kubernetes
          Job per evaluation), remote (calls an existing HTTP or gRPC endpoint).
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: PluginGatewaySpec defines the gateway configuration.
            properties:
              mode:
                description: 'Mode selects the execution model: builtin | job | remote.'
                enum:
                - builtin
                - job
                - remote
                type: string
              builtin:
                description: Builtin routes evaluation to a named built-in gate.
                  Required when mode == "builtin".
                properties:
                  name:
                    description: Name of the built-in gate to route to.
                    enum:
                    - soak
                    - metrics
                    - cel
                    - argo-analysis
                    - webhook
                    type: string
                  config:
                    additionalProperties:
                      type: string
                    description: Config passes key/value configuration to the built-in
                      gate evaluator.
                    type: object
                required:
                - name
                type: object
              job:
                description: Job configures ephemeral Kubernetes Job execution. Required
                  when mode == "job".
                properties:
                  image:
                    description: Image is the container image to run.
                    type: string
                  command:
                    items:
                      type: string
                    type: array
                  args:
                    items:
                      type: string
                    type: array
                  serviceAccountName:
                    description: ServiceAccountName is the SA used by the Job. Defaults
                      to "default".
                    type: string
                  timeout:
                    description: Timeout is the maximum Job run time. Defaults to
                      10m.
                    type: string
                  backoffLimit:
                    default: 0
                    description: BackoffLimit is the Job retry count. Defaults to
                      0 (no retries).
                    format: int32
                    type: integer
                  ttlSecondsAfterFinished:
                    default: 300
                    description: TTLSecondsAfterFinished cleans up completed Jobs.
                      Defaults to 300.
                    format: int32
                    type: integer
                required:
                - image
                type: object
              remote:
                description: Remote configures outbound calls to an existing endpoint.
                  Required when mode == "remote".
                properties:
                  protocol:
                    default: http
                    description: Protocol selects the wire format.
                    enum:
                    - http
                    - grpc
                    type: string
                  url:
                    description: URL is the endpoint to call.
                    type: string
                  tlsSecretRef:
                    description: TLSSecretRef names a Secret with keys tls.crt, tls.key,
                      ca.crt.
                    type: string
                  timeout:
                    description: Timeout per call. Defaults to 30s.
                    type: string
                  headers:
                    additionalProperties:
                      type: string
                    description: Headers are additional HTTP headers to send (HTTP
                      mode only).
                    type: object
                required:
                - url
                type: object
            required:
            - mode
            type: object
          status:
            description: PluginGatewayStatus is written by the PluginGateway controller.
            properties:
              ready:
                description: Ready is true when the gateway has been validated and
                  is usable.
                type: boolean
              message:
                description: Message is a human-readable status summary.
                type: string
              lastChecked:
                description: LastChecked is the time the controller last verified
                  the gateway.
                type: string
              conditions:
                description: Conditions provides standard Kubernetes condition fields.
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            required:
            - ready
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
