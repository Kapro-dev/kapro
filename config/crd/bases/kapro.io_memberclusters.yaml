---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: memberclusters.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: MemberCluster
    listKind: MemberClusterList
    plural: memberclusters
    shortNames:
    - mc
    singular: membercluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="BootstrapReady")].status
      name: BootstrapReady
      type: string
    - jsonPath: .status.deliverySystem
      name: Delivery
      type: string
    - jsonPath: .status.health.allWorkloadsReady
      name: Healthy
      type: boolean
    - jsonPath: .status.activeRelease
      name: Active Release
      type: string
    - jsonPath: .status.lastHeartbeat
      name: Heartbeat
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MemberCluster represents one physical cluster in the Kapro fleet.
          It merges delivery config, fleet registration state,
          and BootstrapToken (one-time registration credential) into a single resource.

          Labels on MemberCluster drive Pipeline stage selection (tier, region, wave, cloud, etc.).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MemberClusterSpec defines the desired state of a cluster
              in the Kapro fleet.
            properties:
              actuator:
                description: Actuator configures the delivery backend for this cluster.
                properties:
                  flux:
                    properties:
                      kustomizationPath:
                        type: string
                      namespace:
                        type: string
                      ociRepository:
                        type: string
                    required:
                    - kustomizationPath
                    - namespace
                    - ociRepository
                    type: object
                  type:
                    enum:
                    - flux
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: actuator.flux must be set when type is flux
                  rule: self.type != 'flux' || has(self.flux)
              bootstrap:
                description: |-
                  Bootstrap configures one-time cluster self-registration.
                  Platform engineers set tokenHash + expiresAt (or ttl); the cluster-controller
                  presents the pre-image token in a CSR to prove identity.
                  One bootstrap slot per cluster. To re-bootstrap, update tokenHash + expiresAt
                  and the hub resets the slot automatically.
                properties:
                  expiresAt:
                    description: |-
                      ExpiresAt is the absolute UTC time after which this bootstrap slot is invalid.
                      Set explicitly by the platform team for auditability.
                      If empty and TTL is set, the MemberCluster controller computes it on first reconcile.
                    format: date-time
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are applied to bootstrap resources created during registration
                      (ServiceAccount, kubeconfig Secret). Not used for stage selection — use
                      MemberCluster.metadata.labels for that.
                    type: object
                  tokenHash:
                    description: |-
                      TokenHash is the SHA-256 hex hash of the pre-image bootstrap token (exactly 64 lowercase hex chars).
                      Platform team hashes the raw token and stores only the hash here; the cluster-controller
                      presents the plaintext pre-image. This ensures tokenHash cannot be used directly.
                    pattern: ^[0-9a-f]{64}$
                    type: string
                  ttl:
                    description: |-
                      TTL is a convenience duration (e.g. "24h") used when ExpiresAt is not set explicitly.
                      The MemberCluster controller writes spec.bootstrap.expiresAt from
                      metadata.creationTimestamp + TTL at creation time and leaves it immutable.
                    type: string
                type: object
              desiredAppKey:
                description: |-
                  DesiredAppKey is the key the cluster-controller uses when writing
                  status.currentVersions. Defaults to "default".
                type: string
              desiredVersion:
                description: |-
                  DesiredVersion is written by the kapro-operator (release/sync controller).
                  The cluster-controller polls this field and patches the local delivery system.
                type: string
              healthCheck:
                description: HealthCheck configures active health polling for this
                  cluster.
                properties:
                  endpoint:
                    type: string
                  interval:
                    type: string
                required:
                - endpoint
                - interval
                type: object
              provider:
                description: Provider configures how Kapro discovers and connects
                  to the workload cluster.
                properties:
                  aks:
                    description: 'AKS configures AKS Managed Identity direct-connect
                      (type: aks, v0.4).'
                    properties:
                      clientID:
                        description: ClientID is the Managed Identity client ID. Uses
                          system-assigned identity when empty.
                        type: string
                      clusterName:
                        description: ClusterName is the AKS cluster name.
                        type: string
                      resourceGroup:
                        description: ResourceGroup is the Azure resource group containing
                          the AKS cluster.
                        type: string
                      subscriptionID:
                        description: SubscriptionID is the Azure subscription UUID.
                        type: string
                      tenantID:
                        description: TenantID is the Azure AD tenant ID.
                        type: string
                    required:
                    - clusterName
                    - resourceGroup
                    - subscriptionID
                    type: object
                  digitalOcean:
                    description: 'DigitalOcean configures DOKS direct-connect (type:
                      digitalocean, v0.4).'
                    properties:
                      clusterID:
                        description: |-
                          ClusterID is the DigitalOcean Kubernetes cluster UUID.
                          Find it at cloud.digitalocean.com/kubernetes or `doctl kubernetes cluster list`.
                        type: string
                      region:
                        description: |-
                          Region is the DigitalOcean region slug (e.g. nyc1, fra1, ams3).
                          Used for topology metadata only.
                        type: string
                      tokenSecretRef:
                        description: |-
                          TokenSecretRef names a Secret in kapro-system containing the DigitalOcean
                          API token under key "token".
                        type: string
                    required:
                    - clusterID
                    - tokenSecretRef
                    type: object
                  gke:
                    description: 'GKE configures GKE Workload Identity direct-connect
                      (type: gke, v0.3).'
                    properties:
                      clusterName:
                        description: ClusterName is the GKE cluster name as shown
                          in the GCP console.
                        type: string
                      location:
                        description: Location is the cluster region (e.g. europe-west1)
                          or zone (e.g. europe-west1-b).
                        type: string
                      project:
                        description: Project is the GCP project ID (not project number).
                        type: string
                      serviceAccountRef:
                        description: |-
                          ServiceAccountRef names the hub K8s SA annotated with
                          iam.gke.io/gcp-service-account. Defaults to the kapro-operator SA.
                        type: string
                      workloadIdentityPool:
                        description: |-
                          WorkloadIdentityPool is the GCP Workload Identity pool for this hub.
                          Format: PROJECT_ID.svc.id.goog
                        type: string
                    required:
                    - clusterName
                    - location
                    - project
                    type: object
                  stackit:
                    description: 'StackIT configures SKE direct-connect (type: stackit,
                      v0.4).'
                    properties:
                      clusterName:
                        description: ClusterName is the SKE cluster name.
                        type: string
                      projectID:
                        description: ProjectID is the STACKIT project UUID.
                        type: string
                      region:
                        description: Region is the STACKIT region slug (e.g. eu01).
                        type: string
                      serviceAccountKeySecretRef:
                        description: |-
                          ServiceAccountKeySecretRef names a Secret in kapro-system containing a
                          STACKIT Service Account key JSON under key "key.json".
                        type: string
                    required:
                    - clusterName
                    - projectID
                    - region
                    - serviceAccountKeySecretRef
                    type: object
                  type:
                    description: |-
                      Type selects the connectivity backend.

                      ""  or "crd"    → CRD outbound path (default, all clouds, air-gap)
                      "gke"           → GKE Workload Identity + Connect Gateway (v0.3)
                      "aks"           → AKS Managed Identity + AAD OIDC federation (v0.4)
                      "digitalocean"  → DigitalOcean API token in Secret (v0.4)
                      "stackit"       → StackIT Service Account key in Secret (v0.4)
                    enum:
                    - ""
                    - crd
                    - gke
                    - aks
                    - digitalocean
                    - stackit
                    type: string
                type: object
                x-kubernetes-validations:
                - message: provider.gke must be set when type is gke
                  rule: self.type != 'gke' || has(self.gke)
              suspend:
                description: Suspend pauses all reconciliation for this cluster.
                type: boolean
              topology:
                description: Topology holds hardware and scheduling metadata used
                  by Pipeline stage selectors.
                properties:
                  accelerator:
                    description: |-
                      Accelerator is the GPU/accelerator type in this cluster.
                      Well-known values: nvidia-h100, nvidia-a100, nvidia-l40s, amd-mi300x, tpu-v5e.
                    type: string
                  gpuCount:
                    description: GPUCount is the total number of GPU devices across
                      all nodes in this cluster.
                    format: int32
                    minimum: 0
                    type: integer
                  gpuMemoryGb:
                    description: GPUMemoryGB is the memory per GPU device in gigabytes
                      (e.g. 80 for H100 SXM).
                    format: int32
                    minimum: 0
                    type: integer
                  nodeCount:
                    description: NodeCount is the number of GPU nodes (not total devices).
                    format: int32
                    minimum: 0
                    type: integer
                  tier:
                    description: |-
                      Tier classifies the cluster's role in the delivery wave.
                      Well-known values: canary, shadow, prod.
                    type: string
                type: object
            required:
            - actuator
            type: object
          status:
            description: MemberClusterStatus is the observed state — written by cluster-controller
              and hub.
            properties:
              activeRelease:
                description: ActiveRelease is the Release currently being processed
                  for this cluster.
                type: string
              bootstrap:
                description: Bootstrap tracks the one-time registration state. Written
                  by the hub.
                properties:
                  boundCSRName:
                    description: |-
                      BoundCSRName is the CSR that consumed this bootstrap slot.
                      Enables idempotent retry: if CSR approval fails transiently, the next reconcile
                      recognises the same CSR and re-approves rather than denying as replay.
                    type: string
                  issuedBootstrapKubeconfig:
                    description: |-
                      IssuedBootstrapKubeconfig is the name of the Secret in kapro-system that
                      contains the bootstrap kubeconfig. Operators copy this to the spoke cluster.
                    type: string
                  issuedCredentialFor:
                    description: IssuedCredentialFor is the cluster name the bootstrap
                      credential was issued for.
                    type: string
                  used:
                    description: Used is true once the bootstrap token has been consumed
                      by a successful CSR.
                    type: boolean
                  usedAt:
                    description: UsedAt is when the bootstrap token was consumed.
                    format: date-time
                    type: string
                type: object
              capabilities:
                description: Capabilities is the self-reported capability profile
                  written at registration time.
                properties:
                  accountID:
                    description: |-
                      AccountID is the cloud account or project identifier.
                      GCP: project ID. AWS: account ID. Azure: subscription UUID.
                      DigitalOcean: team ID. StackIT: project UUID.
                      Used for cost attribution, audit, and cross-account routing.
                    type: string
                  argoCDVersion:
                    description: |-
                      ArgoCDVersion is the ArgoCD version installed on this cluster (e.g. "2.11.0").
                      Empty when ArgoCD is not installed.
                    type: string
                  cloud:
                    description: |-
                      Cloud identifies the cloud provider hosting this cluster.
                      Well-known values: gcp, aws, azure, digitalocean, stackit, on-prem.
                      Written by kapro-cluster-controller based on IMDS detection.
                    type: string
                  clusterID:
                    description: |-
                      ClusterID is the cloud-provider-assigned cluster identifier.
                      GCP: cluster resource name. AWS: cluster ARN. Azure: resource ID.
                      DigitalOcean: cluster UUID. StackIT: cluster UUID.
                    type: string
                  fluxVersion:
                    description: |-
                      FluxVersion is the Flux version installed on this cluster (e.g. "2.3.0").
                      Empty when Flux is not installed.
                    type: string
                  k8sVersion:
                    description: K8sVersion is the Kubernetes server version (e.g.
                      "1.30.2").
                    type: string
                  nodeCount:
                    description: NodeCount is the total number of nodes in the cluster
                      at registration time.
                    type: integer
                  region:
                    description: Region is the cloud region of this cluster (e.g.
                      europe-west1, us-east-1, westeurope).
                    type: string
                  sveltosVersion:
                    description: |-
                      SveltosVersion is the Sveltos version installed on this cluster.
                      Empty when Sveltos is not installed.
                    type: string
                  zone:
                    description: |-
                      Zone is the cloud availability zone of the primary node pool
                      (e.g. europe-west1-b, us-east-1a, 1). Empty for regional clusters.
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controllerVersion:
                description: ControllerVersion is the kapro-cluster-controller version
                  running on this cluster.
                type: string
              currentVersions:
                additionalProperties:
                  type: string
                description: CurrentVersions maps app keys to deployed versions. Written
                  by cluster-controller.
                type: object
              deliverySystem:
                description: DeliverySystem is the delivery system detected by the
                  cluster-controller (e.g. "flux").
                type: string
              health:
                description: Health aggregates workload health. Written by cluster-controller.
                properties:
                  allWorkloadsReady:
                    type: boolean
                  failedWorkloads:
                    type: integer
                  message:
                    type: string
                  readyWorkloads:
                    type: integer
                  totalWorkloads:
                    type: integer
                type: object
              lastHeartbeat:
                description: LastHeartbeat is the RFC3339 timestamp of the last cluster-controller
                  heartbeat.
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: ClusterPhase represents the convergence state of a workload
                  cluster.
                enum:
                - Pending
                - Applying
                - Converging
                - Converged
                - Failed
                - Unreachable
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
