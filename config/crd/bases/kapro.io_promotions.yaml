---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: promotions.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Promotion
    listKind: PromotionList
    plural: promotions
    shortNames:
    - promo
    singular: promotion
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.activeRun
      name: Run
      type: string
    - jsonPath: .spec.suspended
      name: Suspended
      priority: 1
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Promotion is the user-facing intent to move a version through the fleet.
          PromotionRun objects record execution attempts.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PromotionSpec is the desired intent to promote one artifact or set of unit
              versions through one or more PromotionPlans.
            properties:
              artifact:
                description: Artifact describes the primary artifact being promoted.
                properties:
                  digest:
                    description: Digest is the immutable artifact digest when known.
                    type: string
                  image:
                    description: Image is the image or logical component name, for
                      example checkout-api.
                    type: string
                  repository:
                    description: Repository is the optional OCI or Git repository
                      containing the artifact.
                    type: string
                  tag:
                    description: Tag is the human version or source tag, for example
                      v1.2.3.
                    type: string
                  version:
                    description: |-
                      Version is the exact value Kapro should write when a promotion uses one
                      version for all selected PromotionUnits.
                    type: string
                type: object
              policies:
                description: |-
                  Policies references PromotionPolicy objects evaluated before creating a
                  PromotionRun.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              promotionPlans:
                description: PromotionPlans is the DAG of PromotionPlan nodes this
                  intent should run.
                items:
                  description: |-
                    PromotionPlanRef is one node in the PromotionRun's promotionplan DAG.
                    Multiple promotionplans can run in parallel; DependsOn declares ordering between them.
                  properties:
                    dependsOn:
                      description: DependsOn lists promotionplan node names that must
                        reach Complete before this one starts.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                    name:
                      description: Name uniquely identifies this promotionplan node
                        within the PromotionRun.
                      type: string
                    promotionplan:
                      description: PromotionPlan is the name of the PromotionPlan
                        CRD to execute.
                      type: string
                  required:
                  - name
                  - promotionplan
                  type: object
                maxItems: 64
                minItems: 1
                type: array
              scope:
                description: Scope restricts this Promotion to a subset of FleetClusters.
                properties:
                  targets:
                    description: |-
                      Targets is the allowlist of target cluster names.
                      Must be non-empty when Scope is set — an empty list is ignored.
                    items:
                      type: string
                    type: array
                type: object
              sourceRef:
                description: |-
                  SourceRef references the PromotionSource whose PromotionUnits define the
                  allowed write targets.
                type: string
              suspended:
                default: false
                description: Suspended pauses all advancement when true.
                type: boolean
              timeout:
                description: |-
                  Timeout is the maximum duration for the PromotionRun created from this
                  intent.
                type: string
              version:
                description: Version is the default revision to deliver across selected
                  units.
                type: string
              versions:
                additionalProperties:
                  type: string
                description: Versions maps PromotionUnit name to the backend-native
                  revision to deliver.
                type: object
            required:
            - promotionPlans
            type: object
          status:
            description: PromotionStatus defines the observed state of a Promotion
              intent.
            properties:
              activeRun:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastRun:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: PromotionPhase is the coarse state of a Promotion intent.
                enum:
                - Pending
                - Running
                - Promoted
                - Failed
                - RolledBack
                type: string
              resolvedVersion:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
