---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: syncs.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Sync
    listKind: SyncList
    plural: syncs
    shortNames:
    - syn
    singular: sync
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.environmentRef
      name: Environment
      type: string
    - jsonPath: .spec.pipeline
      name: Pipeline
      type: string
    - jsonPath: .spec.stage
      name: Stage
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Sync drives one Environment through the apply → converge cycle for a Release stage.
          Created internally by the Release controller — users inspect but never create Sync objects.
          One Sync exists per (Release, Pipeline, Stage, Environment) tuple.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SyncSpec defines the desired state of a Sync.
            properties:
              appKey:
                description: AppKey is the key used to look up the current version
                  in ManagedCluster.status.currentVersions.
                type: string
              environmentRef:
                description: EnvironmentRef is the target Environment (cluster) name.
                type: string
              gate:
                description: |-
                  Gate is the inline gate policy applied to this Sync. Copied from the
                  Pipeline stage at Sync creation time (snapshot semantics).
                properties:
                  approval:
                    properties:
                      approvers:
                        items:
                          type: string
                        type: array
                      required:
                        type: boolean
                    required:
                    - required
                    type: object
                  gate:
                    properties:
                      gateTimeout:
                        description: |-
                          GateTimeout is the maximum duration the metrics gate may remain un-passed
                          before the Sync is failed. Only applies to MetricsCheck; infrastructure
                          errors (e.g. Prometheus unreachable) do not consume this budget.
                          Uses Go duration format, e.g. "30m", "1h". Empty means retry indefinitely.
                        type: string
                      healthCheck:
                        type: boolean
                      metrics:
                        items:
                          properties:
                            config:
                              format: byte
                              type: string
                              x-kubernetes-preserve-unknown-fields: true
                            endpoint:
                              type: string
                            interval:
                              default: 30s
                              description: |-
                                Interval controls how often the metric is re-evaluated while the gate is blocking.
                                Equivalent to Grafana's "Evaluate every" setting.
                                Defaults to "30s". Minimum "10s".
                              type: string
                            provider:
                              type: string
                            query:
                              description: |-
                                Query is a PromQL expression. The gate passes when the query returns a non-zero value.
                                Use range functions directly in the query for window-based checks, e.g.:
                                  min_over_time(error_rate[30m]) < 0.01
                                Or reference the Window field as a template: {{.Window}} is substituted at evaluation time.
                              type: string
                            threshold:
                              type: number
                            window:
                              default: 5m
                              description: |-
                                Window is the lookback duration injected into the query template as {{.Window}}.
                                When Query already contains a hardcoded range (e.g. [5m]), this field is ignored.
                                Defaults to "5m".
                              type: string
                          required:
                          - provider
                          - query
                          type: object
                        type: array
                      soakTime:
                        type: string
                      templates:
                        items:
                          description: |-
                            GateTemplateSpec defines an inline, parameterised gate evaluation config.
                            Embedded directly in GateSpec.Templates — no separate CRD needed.
                          properties:
                            args:
                              items:
                                description: GateArg declares a named parameter with
                                  an optional default value.
                                properties:
                                  name:
                                    type: string
                                  value:
                                    type: string
                                required:
                                - name
                                type: object
                              type: array
                            cel:
                              description: CELGateSpec configures the built-in CEL
                                expression gate.
                              properties:
                                expression:
                                  type: string
                              required:
                              - expression
                              type: object
                            failurePolicy:
                              default: halt
                              enum:
                              - halt
                              - retry
                              - skip
                              type: string
                            inconclusivePolicy:
                              default: retry
                              enum:
                              - retry
                              - skip
                              - halt
                              type: string
                            job:
                              description: JobGateSpec configures the Kubernetes Job
                                gate.
                              properties:
                                args:
                                  items:
                                    type: string
                                  type: array
                                command:
                                  items:
                                    type: string
                                  type: array
                                env:
                                  items:
                                    description: EnvVar represents an environment
                                      variable present in a Container.
                                    properties:
                                      name:
                                        description: |-
                                          Name of the environment variable.
                                          May consist of any printable ASCII characters except '='.
                                        type: string
                                      value:
                                        description: |-
                                          Variable references $(VAR_NAME) are expanded
                                          using the previously defined environment variables in the container and
                                          any service environment variables. If a variable cannot be resolved,
                                          the reference in the input string will be unchanged. Double $$ are reduced
                                          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                          "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                          Escaped references will never be expanded, regardless of whether the variable
                                          exists or not.
                                          Defaults to "".
                                        type: string
                                      valueFrom:
                                        description: Source for the environment variable's
                                          value. Cannot be used if value is not empty.
                                        properties:
                                          configMapKeyRef:
                                            description: Selects a key of a ConfigMap.
                                            properties:
                                              key:
                                                description: The key to select.
                                                type: string
                                              name:
                                                default: ""
                                                description: |-
                                                  Name of the referent.
                                                  This field is effectively required, but due to backwards compatibility is
                                                  allowed to be empty. Instances of this type with an empty value here are
                                                  almost certainly wrong.
                                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                type: string
                                              optional:
                                                description: Specify whether the ConfigMap
                                                  or its key must be defined
                                                type: boolean
                                            required:
                                            - key
                                            type: object
                                            x-kubernetes-map-type: atomic
                                          fieldRef:
                                            description: |-
                                              Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                              spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                            properties:
                                              apiVersion:
                                                description: Version of the schema
                                                  the FieldPath is written in terms
                                                  of, defaults to "v1".
                                                type: string
                                              fieldPath:
                                                description: Path of the field to
                                                  select in the specified API version.
                                                type: string
                                            required:
                                            - fieldPath
                                            type: object
                                            x-kubernetes-map-type: atomic
                                          fileKeyRef:
                                            description: |-
                                              FileKeyRef selects a key of the env file.
                                              Requires the EnvFiles feature gate to be enabled.
                                            properties:
                                              key:
                                                description: |-
                                                  The key within the env file. An invalid key will prevent the pod from starting.
                                                  The keys defined within a source may consist of any printable ASCII characters except '='.
                                                  During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                                type: string
                                              optional:
                                                default: false
                                                description: |-
                                                  Specify whether the file or its key must be defined. If the file or key
                                                  does not exist, then the env var is not published.
                                                  If optional is set to true and the specified key does not exist,
                                                  the environment variable will not be set in the Pod's containers.

                                                  If optional is set to false and the specified key does not exist,
                                                  an error will be returned during Pod creation.
                                                type: boolean
                                              path:
                                                description: |-
                                                  The path within the volume from which to select the file.
                                                  Must be relative and may not contain the '..' path or start with '..'.
                                                type: string
                                              volumeName:
                                                description: The name of the volume
                                                  mount containing the env file.
                                                type: string
                                            required:
                                            - key
                                            - path
                                            - volumeName
                                            type: object
                                            x-kubernetes-map-type: atomic
                                          resourceFieldRef:
                                            description: |-
                                              Selects a resource of the container: only resources limits and requests
                                              (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                            properties:
                                              containerName:
                                                description: 'Container name: required
                                                  for volumes, optional for env vars'
                                                type: string
                                              divisor:
                                                anyOf:
                                                - type: integer
                                                - type: string
                                                description: Specifies the output
                                                  format of the exposed resources,
                                                  defaults to "1"
                                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                                x-kubernetes-int-or-string: true
                                              resource:
                                                description: 'Required: resource to
                                                  select'
                                                type: string
                                            required:
                                            - resource
                                            type: object
                                            x-kubernetes-map-type: atomic
                                          secretKeyRef:
                                            description: Selects a key of a secret
                                              in the pod's namespace
                                            properties:
                                              key:
                                                description: The key of the secret
                                                  to select from.  Must be a valid
                                                  secret key.
                                                type: string
                                              name:
                                                default: ""
                                                description: |-
                                                  Name of the referent.
                                                  This field is effectively required, but due to backwards compatibility is
                                                  allowed to be empty. Instances of this type with an empty value here are
                                                  almost certainly wrong.
                                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                type: string
                                              optional:
                                                description: Specify whether the Secret
                                                  or its key must be defined
                                                type: boolean
                                            required:
                                            - key
                                            type: object
                                            x-kubernetes-map-type: atomic
                                        type: object
                                    required:
                                    - name
                                    type: object
                                  type: array
                                  x-kubernetes-preserve-unknown-fields: true
                                image:
                                  type: string
                              required:
                              - image
                              type: object
                            maxAttempts:
                              default: 3
                              type: integer
                            name:
                              description: |-
                                Name uniquely identifies this template within the gate for status tracking
                                and Job naming. Required when type == "job" (used to generate Job name).
                              type: string
                            timeout:
                              type: string
                            type:
                              enum:
                              - cel
                              - job
                              - webhook
                              type: string
                            webhook:
                              description: WebhookGateSpec configures the HTTP webhook
                                gate.
                              properties:
                                pollInterval:
                                  type: string
                                url:
                                  type: string
                              required:
                              - url
                              type: object
                          required:
                          - type
                          type: object
                        type: array
                      verification:
                        description: VerificationGateSpec configures per-policy artifact
                          signature verification.
                        properties:
                          cosignPolicy:
                            description: CosignPolicySpec specifies how cosign should
                              verify the artifact signature.
                            properties:
                              key:
                                description: KeyVerificationSpec configures static
                                  public key cosign verification.
                                properties:
                                  secretRef:
                                    description: CosignKeySecretRef identifies a cosign
                                      public key stored in a Kubernetes Secret.
                                    properties:
                                      key:
                                        default: cosign.pub
                                        type: string
                                      name:
                                        type: string
                                      namespace:
                                        default: kapro-system
                                        type: string
                                    required:
                                    - name
                                    type: object
                                required:
                                - secretRef
                                type: object
                              keyless:
                                description: KeylessVerificationSpec configures OIDC
                                  keyless cosign verification.
                                properties:
                                  issuer:
                                    type: string
                                  rekorURL:
                                    type: string
                                  subject:
                                    type: string
                                type: object
                            type: object
                        type: object
                    type: object
                  mode:
                    enum:
                    - auto
                    - manual
                    - scheduled
                    type: string
                  notifications:
                    items:
                      properties:
                        channel:
                          type: string
                        email:
                          description: EmailNotifierSpec configures SMTP email delivery
                            for gate notifications.
                          properties:
                            from:
                              type: string
                            smtpSecretRef:
                              description: |-
                                LocalObjectReference contains enough information to let you locate the
                                referenced object inside the same namespace.
                              properties:
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                              x-kubernetes-preserve-unknown-fields: true
                            to:
                              items:
                                type: string
                              minItems: 1
                              type: array
                          required:
                          - smtpSecretRef
                          - to
                          type: object
                        type:
                          type: string
                        url:
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                  onFailure:
                    default: halt
                    description: |-
                      OnFailure controls what Kapro does when a gate fails or times out.
                        halt (default): stop the Sync and wait for human intervention.
                          Use for checkout systems where automated rollback is too risky.
                        rollback: automatically revert to the previous version.
                          Only effective when a previous successful apply exists (PreviousVersion is set).
                        continue: mark the gate as skipped and advance to the next phase.
                    enum:
                    - halt
                    - rollback
                    - continue
                    type: string
                required:
                - mode
                type: object
              pipeline:
                description: Pipeline is the Pipeline CRD name this Sync belongs to.
                type: string
              releaseRef:
                description: ReleaseRef is the owning Release name.
                type: string
              stage:
                description: Stage is the stage name within the Pipeline.
                type: string
              version:
                description: Version is the OCI digest being delivered.
                type: string
            required:
            - environmentRef
            - pipeline
            - releaseRef
            - stage
            - version
            type: object
          status:
            description: SyncStatus defines the observed state of a Sync.
            properties:
              approvalSentAt:
                description: ApprovalSentAt records when the approval notification
                  was last dispatched.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              finishedAt:
                type: string
              gates:
                description: Gates is Kapro's authoritative snapshot of GateTemplate
                  evaluation state.
                items:
                  description: GateRunStatus is Kapro's authoritative snapshot of
                    one gate evaluation.
                  properties:
                    attempts:
                      type: integer
                    finishedAt:
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      description: GatePhase is the normalized execution state of
                        a gate evaluation.
                      type: string
                    results:
                      items:
                        description: GateConditionResult is the per-metric/condition
                          result within a GateRunStatus.
                        properties:
                          message:
                            type: string
                          name:
                            type: string
                          phase:
                            description: GatePhase is the normalized execution state
                              of a gate evaluation.
                            type: string
                          value:
                            type: string
                        required:
                        - name
                        - phase
                        type: object
                      type: array
                    startedAt:
                      type: string
                    vendorRef:
                      description: ObjectReference contains enough information to
                        let you inspect or modify the referred object.
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        fieldPath:
                          description: |-
                            If referring to a piece of an object instead of an entire object, this string
                            should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                            For example, if the object reference is to a container within a pod, this would take on a value like:
                            "spec.containers{name}" (where "name" refers to the name of the container that triggered
                            the event) or if no container name is specified "spec.containers[2]" (container with
                            index 2 in this pod). This syntax is chosen only to have some well-defined way of
                            referencing a part of an object.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                          type: string
                        resourceVersion:
                          description: |-
                            Specific resourceVersion to which this reference is made, if any.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                          type: string
                        uid:
                          description: |-
                            UID of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - phase
                  type: object
                type: array
              message:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: SyncPhase is the execution state of a Sync object.
                enum:
                - Pending
                - Verification
                - HealthCheck
                - Soaking
                - MetricsCheck
                - WaitingApproval
                - Applying
                - Converged
                - Failed
                type: string
              phaseEnteredAt:
                description: |-
                  PhaseEnteredAt records when the current phase was entered.
                  Used by gate timeout logic to determine how long a gate has been un-passed.
                type: string
              previousVersion:
                description: PreviousVersion holds the version before this sync, used
                  for rollback.
                type: string
              startedAt:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
