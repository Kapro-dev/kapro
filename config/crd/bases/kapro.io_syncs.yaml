                    attempts:
                      type: integer
                    finishedAt:
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      description: GatePhase is the normalized execution state of
                        a gate evaluation.
                      type: string
                    results:
                      items:
                        description: GateConditionResult is the per-metric/condition
                          result within a GateRunStatus.
                        properties:
                          message:
                            type: string
                          name:
                            type: string
                          phase:
