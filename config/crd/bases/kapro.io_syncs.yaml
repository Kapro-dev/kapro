                  - phase
                  type: object
                type: array
              message:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: SyncPhase is the execution state of a Sync object.
                enum:
                - Pending
                - Verification
                - HealthCheck
                - Soaking
                - MetricsCheck
                - WaitingApproval
                - Applying
                - Converged
                - Failed
