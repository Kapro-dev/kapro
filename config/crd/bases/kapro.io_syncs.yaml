---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: syncs.kapro.io
spec:
  group: kapro.io
  names:
    kind: Sync
    listKind: SyncList
    plural: syncs
    singular: sync
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.environmentRef
      name: Environment
      type: string
    - jsonPath: .spec.pipeline
      name: Pipeline
      type: string
    - jsonPath: .spec.stage
      name: Stage
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Sync drives one Environment through the apply → converge cycle for a Release stage.
          Created internally by the Release controller — users inspect but never create Sync objects.
          One Sync exists per (Release, Pipeline, Stage, Environment) tuple.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SyncSpec defines the desired state of a Sync.
            properties:
              appKey:
                description: AppKey is the key used to look up the current version
                  in ManagedCluster.status.currentVersions.
                type: string
              environmentRef:
                description: EnvironmentRef is the target Environment (cluster) name.
                type: string
              pipeline:
                description: Pipeline is the Pipeline CRD name this Sync belongs to.
                type: string
              policyRef:
                description: PolicyRef is the GatePolicy name applied to this Sync.
                type: string
              releaseRef:
                description: ReleaseRef is the owning Release name.
                type: string
              stage:
                description: Stage is the stage name within the Pipeline.
                type: string
              version:
                description: Version is the OCI digest being delivered.
                type: string
            required:
            - environmentRef
            - pipeline
            - releaseRef
            - stage
            - version
            type: object
          status:
            description: SyncStatus defines the observed state of a Sync.
            properties:
              approvalSentAt:
                description: ApprovalSentAt records when the approval notification
                  was last dispatched.
                type: string
              conditions:
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              finishedAt:
                type: string
              gates:
                description: Gates is Kapro's authoritative snapshot of GateTemplate
                  evaluation state.
                items:
                  description: GateRunStatus is Kapro's authoritative snapshot of
                    one gate evaluation.
                  properties:
                    attempts:
                      type: integer
                    finishedAt:
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      description: GatePhase is the normalized execution state of
                        a gate evaluation.
                      type: string
                    results:
                      items:
                        description: GateConditionResult is the per-metric/condition
                          result within a GateRunStatus.
                        properties:
                          message:
                            type: string
                          name:
                            type: string
                          phase:
                            description: GatePhase is the normalized execution state
                              of a gate evaluation.
                            type: string
                          value:
                            type: string
                        required:
                        - name
                        - phase
                        type: object
                      type: array
                    startedAt:
                      type: string
                    vendorRef:
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - phase
                  type: object
                type: array
              message:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: SyncPhase is the execution state of a Sync object.
                enum:
                - Pending
                - Verification
                - HealthCheck
                - Soaking
                - MetricsCheck
                - WaitingApproval
                - Applying
                - Converged
                - Failed
                type: string
              previousVersion:
                description: PreviousVersion holds the version before this sync, used
                  for rollback.
                type: string
              startedAt:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
