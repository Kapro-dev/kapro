---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: plugins.kapro.io
spec:
  group: kapro.io
  names:
    categories:
    - kapro-all
    kind: Plugin
    listKind: PluginList
    plural: plugins
    shortNames:
    - pluginreg
    singular: plugin
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .spec.protocol
      name: Protocol
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.version
      name: Version
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          Plugin declares an external actuator, gate, or planner plugin endpoint.
          It is an API preview. Runtime registration is opt-in and hot-loaded after
          readiness probes succeed.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PluginSpec registers an external actuator, gate, or planner plugin endpoint.
              Runtime dispatch is an opt-in preview enabled with KAPRO_ENABLE_PLUGIN_GATEWAY=true.
            properties:
              endpoint:
                description: |-
                  Endpoint is the plugin endpoint URI, for example
                  dns:///argocd-actuator.kapro-system.svc:9090.
                minLength: 1
                type: string
              name:
                description: |-
                  Name is the registry key exposed by this plugin, for example "argo/pull"
                  or "slo".
                minLength: 1
                type: string
              parameters:
                additionalProperties:
                  type: string
                description: |-
                  Parameters are plugin-specific key-value pairs.
                  Fleet core does not interpret unknown parameters.
                type: object
              protocol:
                default: grpc
                description: Protocol selects the wire protocol.
                enum:
                - grpc
                type: string
              timeout:
                default: 10s
                description: Timeout bounds one plugin call.
                type: string
              tlsSecretRef:
                description: |-
                  TLSSecretRef references a Secret containing client TLS material or CA data.
                  Cluster-scoped registrations must include the Secret namespace.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              type:
                description: Type selects which extension contract the plugin implements.
                enum:
                - actuator
                - gate
                - planner
                type: string
            required:
            - endpoint
            - name
            - type
            type: object
          status:
            description: PluginStatus records plugin discovery and readiness.
            properties:
              capabilities:
                description: Capabilities are plugin-reported feature names.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions summarize plugin registration readiness.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              contractVersion:
                description: ContractVersion is the plugin-reported KAI, KGI, or KPI
                  contract version.
                type: string
              lastSeen:
                description: LastSeen is the RFC3339 time of the last successful health
                  or capability check.
                type: string
              observedGeneration:
                format: int64
                type: integer
              ready:
                description: Ready indicates whether the plugin endpoint is currently
                  usable.
                type: boolean
              schemaHash:
                description: |-
                  SchemaHash is a sha256 of (contractVersion + sorted capabilities). The
                  reconciler uses it to detect schema drift between hot-reloads of the same
                  Plugin: when the plugin reports a different set of
                  capabilities or contract version than the previously-stored hash, a
                  SchemaChanged condition is surfaced and an event emitted so operators
                  can notice silent breaking changes from plugin upgrades.
                type: string
              version:
                description: Version is the plugin-reported implementation version.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
