---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: managedclusters.kapro.io
spec:
  group: kapro.io
  names:
    kind: ManagedCluster
    listKind: ManagedClusterList
    plural: managedclusters
    singular: managedcluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.environmentRef
      name: Environment
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.deliverySystem
      name: Delivery
      type: string
    - jsonPath: .status.health.allWorkloadsReady
      name: Healthy
      type: boolean
    - jsonPath: .status.activeRelease
      name: Active Release
      type: string
    - jsonPath: .status.lastHeartbeat
      name: Heartbeat
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ManagedCluster is the fleet registry entry for a workload cluster.
          One object per cluster. The control plane writes spec.desiredVersion;
          cluster-controller writes status. Together they form the canonical read model
          for "what is running where."
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ManagedClusterSpec defines the desired state for a registered workload cluster.
              spec.desiredVersion is written by the kapro-operator; all other spec fields are
              written once by the cluster-controller at bootstrap time and never changed.
            properties:
              capabilities:
                description: Capabilities is written by cluster-controller at registration
                  time.
                properties:
                  accountID:
                    description: |-
                      AccountID is the cloud account or project identifier.
                      GCP: project ID. AWS: account ID. Azure: subscription UUID.
                      DigitalOcean: team ID. StackIT: project UUID.
                      Used for cost attribution, audit, and cross-account routing.
                    type: string
                  argoCDVersion:
                    description: |-
                      ArgoCDVersion is the ArgoCD version installed on this cluster (e.g. "2.11.0").
                      Empty when ArgoCD is not installed.
                    type: string
                  cloud:
                    description: |-
                      Cloud identifies the cloud provider hosting this cluster.
                      Well-known values: gcp, aws, azure, digitalocean, stackit, on-prem.
                      Written by kapro-cluster-controller based on IMDS detection.
                    type: string
                  clusterID:
                    description: |-
                      ClusterID is the cloud-provider-assigned cluster identifier.
                      GCP: cluster resource name. AWS: cluster ARN. Azure: resource ID.
                      DigitalOcean: cluster UUID. StackIT: cluster UUID.
                    type: string
                  fluxVersion:
                    description: |-
                      FluxVersion is the Flux version installed on this cluster (e.g. "2.3.0").
                      Empty when Flux is not installed.
                    type: string
                  k8sVersion:
                    description: K8sVersion is the Kubernetes server version (e.g.
                      "1.30.2").
                    type: string
                  nodeCount:
                    description: NodeCount is the total number of nodes in the cluster
                      at registration time.
                    type: integer
                  region:
                    description: Region is the cloud region of this cluster (e.g.
                      europe-west1, us-east-1, westeurope).
                    type: string
                  sveltosVersion:
                    description: |-
                      SveltosVersion is the Sveltos version installed on this cluster.
                      Empty when Sveltos is not installed.
                    type: string
                  zone:
                    description: |-
                      Zone is the cloud availability zone of the primary node pool
                      (e.g. europe-west1-b, us-east-1a, 1). Empty for regional clusters.
                    type: string
                type: object
              controllerVersion:
                description: ControllerVersion is the version of kapro-cluster-controller
                  running on this cluster.
                type: string
              desiredAppKey:
                description: |-
                  DesiredAppKey is the key the cluster-controller uses when writing
                  ManagedCluster.status.currentVersions.
                type: string
              desiredVersion:
                description: |-
                  DesiredVersion is written by the kapro-operator.
                  cluster-controller polls this field; on change, patches the local delivery system.
                type: string
              environmentRef:
                description: EnvironmentRef names the Environment this cluster belongs
                  to.
                type: string
            required:
            - environmentRef
            type: object
          status:
            description: ManagedClusterStatus is the fleet registry entry — written
              by kapro-cluster-controller.
            properties:
              activeRelease:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentVersions:
                additionalProperties:
                  type: string
                type: object
              deliverySystem:
                type: string
              health:
                description: ClusterHealth aggregates workload health from the local
                  delivery system.
                properties:
                  allWorkloadsReady:
                    type: boolean
                  failedWorkloads:
                    type: integer
                  message:
                    type: string
                  readyWorkloads:
                    type: integer
                  totalWorkloads:
                    type: integer
                required:
                - allWorkloadsReady
                - failedWorkloads
                - readyWorkloads
                - totalWorkloads
                type: object
              lastHeartbeat:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: ClusterPhase represents the convergence state of a workload
                  cluster.
                enum:
                - Pending
                - Applying
                - Converging
                - Converged
                - Failed
                - Unreachable
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
