site_name: Kapro
site_description: Promotion control plane for Kubernetes fleets
site_url: https://kapro.dev/
repo_url: https://github.com/Kapro-dev/kapro
repo_name: Kapro-dev/kapro
docs_dir: .
site_dir: ../site
exclude_docs: |
  mkdocs.yml
  requirements.txt

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Install: getting-started/install.md
      - Adoption Guide: getting-started/adoption.md
      - Adoption CLI: getting-started/adoption-cli.md
      - First Promotion in 10 Minutes: getting-started/first-promotion-10min.md
      - Argo Quickstart: getting-started/quickstart-argo.md
      - OCI Quickstart: getting-started/quickstart-oci.md
  - Concepts:
      - Object Model: concepts/concepts.md
      - Backends: concepts/backends.md
      - API Naming: concepts/api-naming.md
