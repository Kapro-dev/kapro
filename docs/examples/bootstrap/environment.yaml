# environment.yaml — Kapro Environment CR for de-prod cluster.
#
# Apply to the management cluster AFTER the Flux bootstrap resources above.
# Once created, this cluster is eligible to receive the next Release that
# includes a pipeline stage whose selector matches its labels.
---
apiVersion: kapro.io/v1alpha1
kind: Environment
metadata:
  name: de-prod
  labels:
    # These labels drive stage targeting.
    # A Pipeline stage with selector: matchLabels: {tier: prod} will
    # include this cluster.
    kapro.io/country: de
    kapro.io/region: eu-central-1
    tier: prod
    app.kubernetes.io/part-of: kapro-fleet
spec:
  # clusterRef points to the ManagedCluster CR that represents this cluster.
  clusterRef: de-prod-cluster

  # fluxNamespace is where Kapro manages Flux objects on this cluster's behalf.
  # Must match the namespace where the OCIRepository and Kustomization live.
  fluxNamespace: flux-system

  # kustomizationRef is the root Flux Kustomization Kapro reconciles.
  kustomizationRef:
    name: workloads-de-prod
    namespace: flux-system

  # ociRepositoryRef is the Flux OCIRepository Kapro updates on each sync.
  ociRepositoryRef:
    name: fleet-bundle-de-prod
    namespace: flux-system
