# root-kustomization.yaml — Flux Kustomization that applies workloads on the leaf cluster.
#
# This Kustomization is managed by Kapro's SyncController:
#   - On sync: spec.path is updated to the correct overlay path
#   - On rollback: spec.ref.digest is reverted to the rollback digest
#
# The leaf cluster's Flux reconciler reads this object and applies the workloads.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workloads-de-prod
  namespace: flux-system
  labels:
    kapro.io/target: de-prod
spec:
  interval: 5m
  # Kapro updates path on each Sync to point at the correct overlay.
  path: overlays/de-prod
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: OCIRepository
    name: fleet-bundle-de-prod
  # postBuild substitutes ENVIRONMENT, COUNTRY, REGION, etc. from ConfigMap.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars-de-prod
