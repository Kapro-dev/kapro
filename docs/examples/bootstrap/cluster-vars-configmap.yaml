# Bootstrap resources for onboarding a new leaf cluster to Kapro.
#
# Apply these to the MANAGEMENT cluster (not the leaf cluster).
# The leaf cluster only needs Flux installed and a GitOps agent.
#
# Onboarding a new cluster (3 steps):
#
#   1. kubectl apply -f cluster-vars-configmap.yaml      # cluster identity
#   2. kubectl apply -f oci-repository.yaml              # Flux OCI source
#   3. kubectl apply -f root-kustomization.yaml          # Flux root Ks
#   4. kubectl apply -f membercluster.yaml                 # Kapro MemberCluster CR
#
# After step 4, the cluster automatically joins the fleet and receives
# the current release on the next pipeline reconcile.
---
# cluster-vars-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars-de-prod
  namespace: flux-system
  labels:
    kapro.io/target: de-prod
data:
  ENVIRONMENT: de-prod
  COUNTRY: de
  REGION: eu-central-1
  TIER: prod
  OVERLAY_PATH: overlays/de-prod
