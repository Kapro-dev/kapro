# OCIRepository — Flux OCI source for the fleet bundle.
#
# Kapro's SyncController updates spec.ref.digest on each Sync cycle.
# The leaf cluster's Flux reconciles from this source.
#
# Apply to management cluster in flux-system namespace.
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: fleet-bundle-de-prod
  namespace: flux-system
  labels:
    kapro.io/target: de-prod
spec:
  interval: 5m
  url: oci://registry.example.com/fleet-bundles
  ref:
    # Kapro updates this digest on each Sync — do not edit manually.
    digest: sha256:placeholder
  secretRef:
    name: registry-credentials
