# cluster-vars.yaml — per-country/per-environment cluster configuration.
#
# One file per environment. Committed to the monorepo.
# The cluster-controller reads this ConfigMap from the management cluster
# and exposes it to the Flux Kustomizations running on each leaf cluster.
#
# Deploy this ConfigMap to the management cluster via:
#   kubectl apply -f docs/examples/bootstrap/cluster-vars-configmap.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars-de-prod
  namespace: flux-system
  labels:
    kapro.io/environment: de-prod
    kapro.io/country: de
    kapro.io/tier: prod
data:
  # Cluster identity
  ENVIRONMENT: de-prod
  COUNTRY: de
  REGION: eu-central-1
  TIER: prod

  # Registry mirror (optional, for air-gapped environments)
  REGISTRY_MIRROR: ""

  # Flux source repository
  OCI_REPOSITORY: oci://registry.example.com/fleet-bundles

  # Kustomize overlay path within the OCI bundle
  OVERLAY_PATH: overlays/de-prod
