# app-versions.yaml — single source of truth for deployed versions.
#
# CI writes this file after a successful build and opens a PR.
# The Artifact CR name is derived from: <appKey>-<version-tag>
#
# Usage in Kustomize overlays:
#   images:
#     - name: registry.example.com/my-app
#       digest: $(APP_DIGEST)   # substituted from this file
---
app: my-app
version: v1.2.3
digest: sha256:abc123def456789012345678901234567890123456789012345678901234567890
repository: registry.example.com/my-app
tag: v1.2.3
releasedBy: ci-pipeline
description: "Regular release v1.2.3"

# For hotfix releases, set derivedFrom and changedComponents:
# derivedFrom: my-app-v1.2.2
# changedComponents:
#   - payment-service
#   - notification-service
