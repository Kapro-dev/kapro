# Apply after backend-argo.yaml and before promotion.yaml.
# This example expects Argo CD Applications named after each target cluster.
# Inline plan selectors are simple label maps; standalone Plan objects use
# selector.matchLabels.
apiVersion: kapro.io/v1alpha2
kind: Fleet
metadata:
  name: checkout-argo
  labels:
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  source:
    backendRef: argo
    units:
      - name: checkout
        backendKind: Application
        namespace: argocd
        versionField: spec.source.targetRevision
        # Catalog/default revision. Promotion.spec.version is the rollout input.
        version: v1.2.3
  delivery:
    mode: push
    backendRef: argo
    parameters:
      namespace: argocd
  clusters:
    - name: checkout-argo-canary
      labels:
        kapro.io/stage: canary
        kapro.io/region: eu
    - name: checkout-argo-production
      labels:
        kapro.io/stage: production
        kapro.io/region: eu
  plan:
    stages:
      - name: canary
        selector:
          kapro.io/stage: canary
      - name: production
        selector:
          kapro.io/stage: production
        dependsOn:
          - stage: canary
