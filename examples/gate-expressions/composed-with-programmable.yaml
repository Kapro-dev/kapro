apiVersion: kapro.io/v1alpha2
kind: GateExpression
metadata:
  name: checkout-prod-readiness
  labels:
    kapro.io/team: platform
spec:
  operator: ALL
  operands:
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: canary-error-rate
              type: canary-error-rate
              args:
                - name: threshold
                  value: "0.001"
    - expressionRef: checkout-soak-delay
    - expressionRef: checkout-any-readiness
