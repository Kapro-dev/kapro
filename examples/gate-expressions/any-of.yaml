apiVersion: kapro.io/v1alpha2
kind: GateExpression
metadata:
  name: checkout-any-readiness
  labels:
    kapro.io/team: platform
spec:
  operator: ANY
  operands:
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: readiness
              type: external-readiness
              args:
                - name: url
                  value: https://readiness.internal/check
    - inlineGate:
        mode: manual
        approval:
          required: true
