apiVersion: kapro.io/v1alpha2
kind: GateExpression
metadata:
  name: checkout-two-of-three
  labels:
    kapro.io/team: platform
spec:
  operator: THRESHOLD
  threshold: 2
  operands:
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: service-a
              type: external-readiness
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: service-b
              type: external-readiness
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: service-c
              type: external-readiness
