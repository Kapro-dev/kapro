apiVersion: kapro.io/v1alpha2
kind: GateExpression
metadata:
  name: checkout-not-blocked
  labels:
    kapro.io/team: platform
spec:
  operator: NOT
  operands:
    - inlineGate:
        mode: auto
        gate:
          templates:
            - name: blocklist
              type: cel
              cel:
                expression: "target.labels.blocked == 'true'"
