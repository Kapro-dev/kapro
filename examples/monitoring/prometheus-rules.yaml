apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kapro-operational-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kapro
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: kapro.slo-recording
      rules:
        - record: kapro:slo_controller_reconcile_error_rate10m
          expr: |
            sum by (controller) (rate(kapro_controller_reconciles_total{result="error"}[10m]))
        - record: kapro:slo_controller_reconcile_p95_seconds10m
          expr: |
            histogram_quantile(
              0.95,
              sum by (controller, le) (rate(kapro_controller_reconcile_duration_seconds_bucket[10m]))
            )
        - record: kapro:slo_gate_failure_ratio15m
          expr: |
            sum by (gate_type) (rate(kapro_gate_evaluations_total{result=~"failed|error"}[15m]))
            /
            clamp_min(sum by (gate_type) (rate(kapro_gate_evaluations_total[15m])), 0.001)
        - record: kapro:slo_stage_duration_p95_seconds30m
          expr: |
            histogram_quantile(
              0.95,
              sum by (plan, le) (rate(kapro_stage_duration_seconds_bucket[30m]))
            )
        - record: kapro:slo_lifecycle_sink_p99_seconds10m
          expr: |
            histogram_quantile(
              0.99,
              sum by (kind, le) (rate(kapro_lifecycle_hook_duration_seconds_bucket{kind="Sink"}[10m]))
            )
        - record: kapro:slo_plugin_probe_failure_rate10m
          expr: |
            sum by (type, reason) (rate(kapro_plugin_probe_results_total{result!="success"}[10m]))
        - record: kapro:slo_fleetdriftreport_non_current
          expr: |
            sum by (report, phase) (kapro_fleetdriftreport_phase{phase!="Current"} == 1)
        - record: kapro:slo_fleetdriftreport_drifted_targets
          expr: |
            kapro_fleetdriftreport_targets{state="drifted"}
        - record: kapro:slo_fleetdriftreport_drifted_backend_objects
          expr: |
            kapro_fleetdriftreport_backend_objects{state="drifted"}
        - record: kapro:slo_spoke_delivery_error_rate10m
          expr: |
            sum by (cluster, backend) (rate(kapro_spoke_delivery_reconciles_total{result="error"}[10m]))
        - record: kapro:slo_spoke_delivery_p95_seconds10m
          expr: |
            histogram_quantile(
              0.95,
              sum by (cluster, backend, le) (rate(kapro_spoke_delivery_reconcile_duration_seconds_bucket[10m]))
            )
    - name: kapro.controller
      rules:
        - alert: KaproControllerReconcileErrors
          expr: |
            kapro:slo_controller_reconcile_error_rate10m > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kapro {{ $labels.controller }} controller is returning reconcile errors"
            description: "The {{ $labels.controller }} controller has reported a non-zero reconcile error rate over the last 10 minutes."
            runbook: "docs/operations.md#first-response"
        - alert: KaproControllerReconcileLatencyP95High
          expr: |
            kapro:slo_controller_reconcile_p95_seconds10m > 30
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro {{ $labels.controller }} reconcile p95 is high"
            description: "The {{ $labels.controller }} controller p95 reconcile duration has been above 30 seconds for 15 minutes."
            runbook: "docs/operations.md#rate-limits-and-workqueue-tuning"
    - name: kapro.gates
      rules:
        - alert: KaproGateFailureRateHigh
          expr: |
            kapro:slo_gate_failure_ratio15m > 0.20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro {{ $labels.gate_type }} gate failure ratio is high"
            description: "More than 20% of {{ $labels.gate_type }} gate evaluations failed over the last 15 minutes."
            runbook: "docs/operations.md#runbook-gate-failure"
    - name: kapro.rollouts
      rules:
        - alert: KaproPromotionRunStuck
          expr: |
            (
              time() - kapro_promotionrun_created > 7200
            )
            and on (promotionrun)
            (
              kapro_promotionrun_status_phase{phase=~"Pending|Progressing"} == 1
            )
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro promotionrun {{ $labels.promotionrun }} appears stuck"
            description: "PromotionRun {{ $labels.promotionrun }} has remained non-terminal for more than 2 hours. This rule uses kube-state-metrics custom-resource state metrics; tune the threshold to match PromotionRun spec.timeout and normal rollout cadence."
            runbook: "docs/operations.md#runbook-stuck-promotionrun"
        - alert: KaproRolloutDurationP95High
          expr: |
            kapro:slo_stage_duration_p95_seconds30m > 3600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Kapro {{ $labels.plan }} rollout stage p95 is high"
            description: "Stage completion p95 for plan {{ $labels.plan }} has been above 1 hour for 30 minutes."
            runbook: "docs/operations.md#rate-limits-and-workqueue-tuning"
        - alert: KaproLifecycleSinkP99High
          expr: |
            kapro:slo_lifecycle_sink_p99_seconds10m > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kapro CloudEvents sink dispatch p99 is high"
            description: "CloudEvents sink dispatch p99 has been above 5 seconds for 10 minutes. Check sink endpoint health, retries, and lifecycle hook backoff."
            runbook: "docs/operations.md#first-response"
    - name: kapro.drift
      rules:
        - alert: KaproFleetDriftDetected
          expr: |
            kapro_fleetdriftreport_phase{phase="Drifted"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Kapro drift report {{ $labels.report }} has sustained drift"
            description: "FleetDriftReport {{ $labels.report }} has remained Drifted for 30 minutes. Inspect status.summary and status.targets, then check backend object evidence and Cluster status."
            runbook: "docs/operations.md#runbook-fleet-drift"
        - alert: KaproFleetDriftSignalsIncomplete
          expr: |
            kapro_fleetdriftreport_phase{phase="Unknown"} == 1
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: "Kapro drift report {{ $labels.report }} has incomplete signals"
            description: "FleetDriftReport {{ $labels.report }} has remained Unknown for 20 minutes. A Cluster may be missing, stale, or not reporting current versions."
            runbook: "docs/operations.md#runbook-fleet-drift"
        - alert: KaproFleetDriftReportFailed
          expr: |
            kapro_fleetdriftreport_phase{phase="Failed"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Kapro drift report {{ $labels.report }} is failed"
            description: "FleetDriftReport {{ $labels.report }} has remained Failed for 10 minutes. One or more targets or delivery loops report failure."
            runbook: "docs/operations.md#runbook-fleet-drift"
        - alert: KaproFleetDriftReportPending
          expr: |
            kapro_fleetdriftreport_phase{phase="Pending"} == 1
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: "Kapro drift report {{ $labels.report }} is pending for too long"
            description: "FleetDriftReport {{ $labels.report }} has remained Pending for 2 hours. Check rollout progress and whether Targets are still converging."
            runbook: "docs/operations.md#runbook-fleet-drift"
    - name: kapro.spokes
      rules:
        - alert: KaproSpokeDeliveryErrors
          expr: |
            kapro:slo_spoke_delivery_error_rate10m > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro spoke {{ $labels.cluster }} delivery errors detected"
            description: "Cluster {{ $labels.cluster }} backend {{ $labels.backend }} has had delivery reconcile errors for 15 minutes."
            runbook: "docs/operations.md#runbook-spoke-delivery"
        - alert: KaproSpokeDeliveryLatencyHigh
          expr: |
            kapro:slo_spoke_delivery_p95_seconds10m > 30
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: "Kapro spoke {{ $labels.cluster }} delivery p95 is high"
            description: "Cluster {{ $labels.cluster }} backend {{ $labels.backend }} delivery reconcile p95 has been above 30 seconds for 20 minutes."
            runbook: "docs/operations.md#runbook-spoke-delivery"
    - name: kapro.plugins
      rules:
        - alert: KaproPluginProbeFailure
          expr: |
            kapro:slo_plugin_probe_failure_rate10m > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro {{ $labels.type }} plugin probe failures detected"
            description: "Kapro {{ $labels.type }} plugin probes have failed with reason {{ $labels.reason }} over the last 10 minutes."
            runbook: "docs/operations.md#runbook-plugin-not-ready"
        - alert: KaproPluginNotReady
          expr: |
            kapro_plugin_status_condition{type="Ready"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro plugin {{ $labels.plugin }} is not ready"
            description: "Plugin {{ $labels.plugin }} has reported Ready=False for 15 minutes. This rule uses kube-state-metrics custom-resource state metrics."
            runbook: "docs/operations.md#runbook-plugin-not-ready"
    - name: kapro.triggers
      rules:
        - alert: KaproTriggerBlocked
          expr: |
            (
              kapro_trigger_status_condition{type="Stalled"} == 1
            )
            or
            (
              kapro_trigger_status_condition{type="PromotionUpdated",reason=~"CooldownActive|MaxActiveReached"} == 0
            )
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Kapro trigger {{ $labels.trigger }} is blocked"
            description: "Trigger {{ $labels.trigger }} is blocked by reason {{ $labels.reason }}. This covers cooldown, max-active, source resolution, signature verification, and Promotion update failures via kube-state-metrics custom-resource state metrics."
            runbook: "docs/operations.md#runbook-blocked-trigger"
