kind: CustomResourceStateMetrics
spec:
  resources:
    - groupVersionKind:
        group: kapro.io
        version: v1alpha1
        kind: PromotionRun
      metricNamePrefix: kapro_promotionrun
      labelsFromPath:
        promotionrun: [metadata, name]
      metrics:
        - name: created
          help: Kapro PromotionRun creation timestamp.
          each:
            type: Gauge
            gauge:
              path: [metadata, creationTimestamp]
        - name: status_phase
          help: Kapro PromotionRun phase.
          each:
            type: StateSet
            stateSet:
              labelName: phase
              path: [status, phase]
              list: [Pending, Progressing, Complete, Failed]
        - name: status_condition
          help: Kapro PromotionRun status condition.
          each:
            type: Gauge
            gauge:
              path: [status, conditions]
              labelsFromPath:
                type: [type]
                reason: [reason]
              valueFrom: [status]
    - groupVersionKind:
        group: kapro.io
        version: v1alpha1
        kind: Trigger
      metricNamePrefix: kapro_promotiontrigger
      labelsFromPath:
        promotiontrigger: [metadata, name]
      metrics:
        - name: status_active_promotionrun_count
          help: Number of active non-terminal PromotionRuns tracked by a Kapro PromotionTrigger.
          each:
            type: Gauge
            gauge:
              path: [status, activePromotionRunCount]
        - name: status_condition
          help: Kapro PromotionTrigger status condition.
          each:
            type: Gauge
            gauge:
              path: [status, conditions]
              labelsFromPath:
                type: [type]
                reason: [reason]
              valueFrom: [status]
    - groupVersionKind:
        group: kapro.io
        version: v1alpha1
        kind: PluginRegistration
      metricNamePrefix: kapro_pluginregistration
      labelsFromPath:
        pluginregistration: [metadata, name]
        plugin_type: [spec, type]
        plugin_name: [spec, name]
      metrics:
        - name: status_ready
          help: Kapro PluginRegistration ready status.
          each:
            type: Gauge
            gauge:
              path: [status, ready]
        - name: status_condition
          help: Kapro PluginRegistration status condition.
          each:
            type: Gauge
            gauge:
              path: [status, conditions]
              labelsFromPath:
                type: [type]
                reason: [reason]
              valueFrom: [status]
