groups:
  - name: kapro.operations
    rules:
      - alert: KaproPromotionRunStuck
        expr: kapro_promotionrun_active_total > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Kapro has active promotionruns for more than 30 minutes
          description: Check PromotionRun and Target status for blocked gates, pending approvals, or actuator failures.
          runbook: docs/operations/operations.md#runbook-stuck-promotionrun

      - alert: KaproGateFailureRateHigh
        expr: |
          (
            sum(rate(kapro_gate_evaluations_total{result=~"failed|error"}[10m]))
            /
            clamp_min(sum(rate(kapro_gate_evaluations_total[10m])), 1)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kapro gate failure rate is above 10 percent
          description: Gate failures or errors are blocking a significant share of promotion attempts.
          runbook: docs/operations/operations.md#runbook-gate-failure

      - alert: KaproPluginProbeFailures
        expr: |
          sum(rate(kapro_plugin_probe_results_total{result!="success"}[10m])) > 0
          or
          min(kapro_plugin_probe_ready) by (type, name) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kapro plugin probe failures detected
          description: One or more registered plugins are failing capability probes or reporting not-ready.
          runbook: docs/operations/operations.md#runbook-plugin-not-ready

      - alert: KaproTriggerBlocked
        expr: rate(kapro_controller_reconciles_total{controller="promotion_trigger",result="error"}[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kapro Trigger reconciles are failing
          description: Automatic Promotion updates may be blocked by source, signature, cooldown, or status update errors.
          runbook: docs/operations/operations.md#runbook-blocked-trigger

      - alert: KaproRolloutDurationP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(kapro_stage_duration_seconds_bucket[30m])) by (le, plan)
          ) > 3600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Kapro rollout stage p95 is above one hour
          description: Stage duration is above the expected fleet rollout objective for plan {{ $labels.plan }}.
          runbook: docs/controller-scalability.md#workqueue-tuning

      - alert: KaproSpokeDeliveryErrors
        expr: sum(rate(kapro_spoke_delivery_reconciles_total{result="error"}[10m])) by (cluster, substrate) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Kapro spoke {{ $labels.cluster }} delivery errors detected
          description: Substrate {{ $labels.substrate }} has had delivery reconcile errors for 15 minutes.
          runbook: docs/operations/operations.md#runbook-spoke-delivery

      - alert: KaproSpokeDeliveryStagingErrors
        expr: sum by (cluster, substrate, phase) (rate(kapro_spoke_delivery_staging_results_total{result="error"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kapro spoke {{ $labels.cluster }} {{ $labels.phase }} failures detected
          description: Substrate {{ $labels.substrate }} has had OCI staged delivery {{ $labels.phase }} failures for 10 minutes.
          runbook: docs/operations/operations.md#runbook-spoke-delivery

      - alert: KaproSpokeDeliveryLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(kapro_spoke_delivery_reconcile_duration_seconds_bucket[10m])) by (cluster, substrate, le)
          ) > 30
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Kapro spoke {{ $labels.cluster }} delivery p95 is high
          description: Substrate {{ $labels.substrate }} delivery reconcile p95 has been above 30 seconds for 20 minutes.
          runbook: docs/operations/operations.md#runbook-spoke-delivery

      - alert: KaproControllerReconcileErrors
        expr: sum(rate(kapro_controller_reconciles_total{result="error"}[10m])) by (controller) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kapro controller reconcile errors detected
          description: Controller {{ $labels.controller }} is returning reconcile errors.
          runbook: docs/operations/operations.md#first-response
