# DE development cluster — AI model validation environment
apiVersion: relay.io/v1alpha1
kind: Environment
metadata:
  name: de-llm-dev
  labels:
    country: de
    env: dev
    tier: ai-dev
    wave: pilot
    cloud: gcp
spec:
  actuator:
    type: kserve
    kserve:
      namespace: ai-workloads
      inferenceServiceName: retail-llm
      storageURITemplate: "oci://registry.schwarz.io/ai/retail-llm:{{.Version}}"
  healthCheck:
    endpoint: /v1/health/ready
    interval: 30s
---
