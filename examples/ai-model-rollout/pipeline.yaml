apiVersion: relay.io/v1alpha1
kind: Pipeline
metadata:
  name: llm-retail-global-rollout
  namespace: kapro-system
spec:
  promotion:
    steps:
      - name: ai-dev
        selector:
          matchLabels:
            tier: ai-dev
        policy: ai-dev-gate
      - name: ai-prod
        selector:
          matchLabels:
            tier: ai-prod
        dependsOn: [ai-dev]
        policy: ai-prod-gate
  progression:
    batches:
      - name: pilot
        dependsOn: []
        selectors:
          - matchLabels:
              tier: ai-prod
              wave: pilot        # de
      - name: nordics
        dependsOn: [pilot]
        selectors:
          - matchLabels:
              tier: ai-prod
              wave: nordics      # fr, fi, se, no
      - name: global
        dependsOn: [nordics]
        selectors:
          - matchLabels:
              tier: ai-prod      # all remaining countries
