# AI model promotion gate — MLflow accuracy + Prometheus latency checks
apiVersion: relay.io/v1alpha1
kind: PromotionPolicy
metadata:
  name: ai-dev-gate
  namespace: kapro-system
spec:
  mode: auto
  gate:
    soakTime: 30m
    healthCheck: true
    metrics:
      - provider: mlflow
        query: accuracy
        threshold: "0.90"
        window: 30m
  onFailure: halt
---
apiVersion: relay.io/v1alpha1
kind: PromotionPolicy
metadata:
  name: ai-prod-gate
  namespace: kapro-system
spec:
  mode: manual
  gate:
    soakTime: 2h
    healthCheck: true
    metrics:
      - provider: mlflow
        query: accuracy
        threshold: "0.93"
        window: 1h
      - provider: prometheus
        query: 'histogram_quantile(0.95, rate(inference_duration_seconds_bucket[5m])) < 0.5'
        window: 10m
  approval:
    required: true
    approvers: [mlops-team, platform-team]
  onFailure: halt
  notifications:
    - type: slack
      channel: "#ai-model-releases"
