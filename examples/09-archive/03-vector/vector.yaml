sources:
  kapro_events:
    type: http_server
    address: 0.0.0.0:8080
    path: /
    decoding:
      codec: json

transforms:
  kapro_archive_shape:
    type: remap
    inputs: [kapro_events]
    source: |
      .kapro_archive = {
        "id": .id,
        "source": .source,
        "type": .type,
        "subject": .subject,
        "time": .time,
        "promotion": .data.promotion,
        "phase": .data.phase
      }

sinks:
  console_smoke:
    type: console
    inputs: [kapro_archive_shape]
    encoding:
      codec: json

