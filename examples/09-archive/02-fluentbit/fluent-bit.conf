[SERVICE]
    Flush        1
    Log_Level    info

[INPUT]
    Name         http
    Listen       0.0.0.0
    Port         8080
    Tag          kapro.events
    successful_response_code 204

[FILTER]
    Name         modify
    Match        kapro.events
    Add          archive_source kapro

[OUTPUT]
    Name         stdout
    Match        kapro.events

# Production examples:
#
# [OUTPUT]
#     Name              cloudwatch_logs
#     Match             kapro.events
#     region            us-east-1
#     log_group_name    /kapro/events
#     log_stream_prefix promotion-
#     auto_create_group On
#
# [OUTPUT]
#     Name              stackdriver
#     Match             kapro.events
#     resource          k8s_container
#     severity_key      severity
