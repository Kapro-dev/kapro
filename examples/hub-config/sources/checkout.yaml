apiVersion: kapro.io/v1alpha1
kind: PromotionSource
metadata:
  name: checkout
spec:
  backendRef: flux
  registries:
    - name: gar
      url: oci://europe-west3-docker.pkg.dev/my-project/charts
      provider: gcp
      interval: 5m
  units:
    - name: pos-server
      version: "5.28.0"
      repo: gar
      targetNamespace: workloads
    - name: sdc
      version: "5.28.0"
      repo: gar
      targetNamespace: workloads
    - name: keycloak
      version: "26.2.5"
      repo: gar
      targetNamespace: workloads
      prune: false
  defaults:
    timeout: 10m
    retries: 3
