# Copy this workflow into your own hub config repository.
# It will NOT run inside the Kapro repo itself.
name: Apply Kapro Hub Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      # Configure kubeconfig for the hub cluster.
      # Examples:
      #   - GKE: google-github-actions/auth + get-gke-credentials
      #   - EKS: aws-actions/configure-aws-credentials
      #   - Generic: store KUBECONFIG as a GitHub secret
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"

      # Server-side dry-run catches CRD schema and admission errors.
      - name: Validate clusters
        run: kubectl apply --dry-run=server -f clusters/
      - name: Validate backends
        run: kubectl apply --dry-run=server -f backends/
      - name: Validate sources
        run: kubectl apply --dry-run=server -f sources/
      - name: Validate promotion plans
        run: kubectl apply --dry-run=server -f promotionplans/
      - name: Validate promotion runs
        run: kubectl apply --dry-run=server -f promotionruns/

      - name: Check rendered objects
        run: |
          kubectl get -f clusters/ -f backends/ -f sources/ -f promotionplans/ -f promotionruns/ --ignore-not-found

  diff:
    name: Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"
      - name: Diff clusters
        run: kubectl diff -f clusters/ || true
      - name: Diff backends
        run: kubectl diff -f backends/ || true
      - name: Diff sources
        run: kubectl diff -f sources/ || true
      - name: Diff promotion plans
        run: kubectl diff -f promotionplans/ || true
      - name: Diff promotion runs
        run: kubectl diff -f promotionruns/ || true

  apply:
    name: Apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"
      - name: Apply cluster config
        run: kubectl apply -f clusters/
      - name: Apply backends
        run: kubectl apply -f backends/
      - name: Apply sources
        run: kubectl apply -f sources/
      - name: Apply promotion plans
        run: kubectl apply -f promotionplans/
      - name: Apply promotion runs
        run: kubectl apply -f promotionruns/
      - name: Verify hub objects
        run: |
          kubectl get fleetclusters.kapro.io
          kubectl get backendprofiles.kapro.io,promotionsources.kapro.io
          kubectl get promotionruns.kapro.io,promotiontargets.kapro.io
