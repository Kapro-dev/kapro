# Copy this workflow into your own hub config repository.
# It will NOT run inside the Kapro repo itself.
name: Apply Kapro Hub Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      # Configure kubeconfig for the hub cluster.
      # Examples:
      #   - GKE: google-github-actions/auth + get-gke-credentials
      #   - EKS: aws-actions/configure-aws-credentials
      #   - Generic: store KUBECONFIG as a GitHub secret
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"

      # Server-side dry-run catches CRD schema and admission errors.
      - name: Validate clusters
        run: kubectl apply --dry-run=server -f clusters/
      - name: Validate apps
        run: kubectl apply --dry-run=server -f apps/
      - name: Validate pipelines
        run: kubectl apply --dry-run=server -f pipelines/
      - name: Validate releases
        run: kubectl apply --dry-run=server -f releases/

      - name: Check rendered objects
        run: |
          kubectl get -f clusters/ -f apps/ -f pipelines/ -f releases/ --ignore-not-found

  diff:
    name: Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"
      - name: Diff clusters
        run: kubectl diff -f clusters/ || true
      - name: Diff apps
        run: kubectl diff -f apps/ || true
      - name: Diff pipelines
        run: kubectl diff -f pipelines/ || true
      - name: Diff releases
        run: kubectl diff -f releases/ || true

  apply:
    name: Apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure hub kubeconfig
        run: echo "Configure your hub cluster auth here"
      - name: Apply cluster config
        run: kubectl apply -f clusters/
      - name: Apply apps
        run: kubectl apply -f apps/
      - name: Apply pipelines
        run: kubectl apply -f pipelines/
      - name: Apply releases
        run: kubectl apply -f releases/
      - name: Verify hub objects
        run: |
          kubectl get memberclusters.kapro.io
          kubectl get kaproapps.kapro.io,pipelines.kapro.io,releases.kapro.io
