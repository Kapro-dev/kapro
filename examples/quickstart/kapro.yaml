apiVersion: kapro.io/v1alpha2
kind: Fleet
metadata:
  name: checkout
  labels:
    # Tenancy ownership label. Required on every Kapro / Promotion /
    # PromotionPlan because the admission webhook enforces it on CREATE.
    # The controller propagates this value into every child object it
    # generates (PromotionPlan, PromotionRun, PromotionTarget). Real
    # multi-tenant clusters typically set this from an OIDC claim or a
    # platform-team label; for a single-team quickstart "platform" is
    # a fine default. See docs/rbac-tenancy.md for the full model.
    kapro.io/team: platform
spec:
  registry:
    url: oci://registry.example.com/kapro
  source:
    registries:
      - name: app
        url: oci://registry.example.com/charts
        type: oci
    defaults:
      repo: app
      targetNamespace: checkout
    units:
      - name: checkout
        chartName: checkout
        version: 1.2.3
  delivery:
    mode: pull
    backendRef: flux
  clusters:
    - name: canary-eu
      labels:
        stage: canary
    - name: prod-eu
      labels:
        stage: prod
  promotionPlan:
    stages:
      - name: canary
        selector:
          stage: canary
      - name: prod
        selector:
          stage: prod
        dependsOn:
          - stage: canary
