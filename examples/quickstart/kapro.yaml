apiVersion: kapro.io/v1alpha2
kind: Fleet
metadata:
  name: checkout
  labels:
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  registry:
    url: oci://registry.example.com/kapro
  source:
    registries:
      - name: app
        url: oci://registry.example.com/charts
        type: oci
    defaults:
      repo: app
      targetNamespace: checkout
    units:
      - name: checkout
        chartName: checkout
        version: 1.2.3
  delivery:
    mode: pull
    backendRef: flux
  clusters:
    - name: checkout-canary-eu
      labels:
        kapro.io/stage: canary
        kapro.io/region: eu
    - name: checkout-production-eu
      labels:
        kapro.io/stage: production
        kapro.io/region: eu
  plan:
    stages:
      - name: canary
        selector:
          kapro.io/stage: canary
      - name: production
        selector:
          kapro.io/stage: production
        dependsOn:
          - stage: canary
