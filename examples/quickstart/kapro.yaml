# Apply after backend-flux.yaml and before promotion.yaml.
# These registry.example.com placeholders are fine for reading the hub API
# shape; replace them before expecting real spoke workload convergence.
# Inline plan selectors are simple label maps; standalone Plan objects use
# selector.matchLabels.
apiVersion: kapro.io/v1alpha2
kind: Fleet
metadata:
  name: checkout
  labels:
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  registry:
    url: oci://registry.example.com/kapro
  source:
    registries:
      - name: app
        url: oci://registry.example.com/charts
        type: oci
    defaults:
      repo: app
      targetNamespace: checkout
    units:
      - name: checkout
        chartName: checkout
        # Catalog/default version. Promotion.spec.version is the rollout input.
        version: 1.2.3
  delivery:
    mode: pull
    backendRef: flux
  clusters:
    - name: checkout-canary-eu
      labels:
        kapro.io/stage: canary
        kapro.io/region: eu
        kapro.io/quickstart: flux
    - name: checkout-production-eu
      labels:
        kapro.io/stage: production
        kapro.io/region: eu
        kapro.io/quickstart: flux
  plan:
    stages:
      - name: canary
        selector:
          kapro.io/stage: canary
          kapro.io/quickstart: flux
      - name: production
        selector:
          kapro.io/stage: production
          kapro.io/quickstart: flux
        dependsOn:
          - stage: canary
