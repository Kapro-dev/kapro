# Deployable external Flux HelmRelease actuator substrate.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-actuator
  namespace: kapro-system
  labels:
    app.kubernetes.io/name: flux-actuator
    app.kubernetes.io/component: kapro-actuator-plugin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux-actuator
  namespace: flux-system
  labels:
    app.kubernetes.io/name: flux-actuator
    app.kubernetes.io/component: kapro-actuator-plugin
rules:
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    resourceNames: ["checkout"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux-actuator
  namespace: flux-system
  labels:
    app.kubernetes.io/name: flux-actuator
    app.kubernetes.io/component: kapro-actuator-plugin
subjects:
  - kind: ServiceAccount
    name: flux-actuator
    namespace: kapro-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux-actuator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux-actuator
  namespace: kapro-system
  labels:
    app.kubernetes.io/name: flux-actuator
    app.kubernetes.io/component: kapro-actuator-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flux-actuator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flux-actuator
        app.kubernetes.io/component: kapro-actuator-plugin
    spec:
      serviceAccountName: flux-actuator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: plugin
          image: ghcr.io/kapro-dev/flux-actuator:v0.3.7
          imagePullPolicy: IfNotPresent
          args:
            - --listen
            - :9090
            - --namespace
            - flux-system
          ports:
            - name: grpc
              containerPort: 9090
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: flux-actuator
  namespace: kapro-system
  labels:
    app.kubernetes.io/name: flux-actuator
    app.kubernetes.io/component: kapro-actuator-plugin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flux-actuator
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
