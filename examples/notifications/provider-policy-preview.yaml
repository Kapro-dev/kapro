apiVersion: kapro.io/v1alpha1
kind: NotificationProvider
metadata:
  name: promotionrun-webhook
spec:
  type: webhook
  webhook:
    url: https://events.example.com/kapro
    format: cloudevents
  secretRefs:
    - namespace: kapro-system
      name: promotionrun-webhook-token
      key: token
      purpose: bearerToken
  parameters:
    retryClass: standard
---
apiVersion: kapro.io/v1alpha1
kind: NotificationPolicy
metadata:
  name: production-failures
spec:
  subscriptions:
    - name: promotionrun-and-target-failures
      providerRef:
        name: promotionrun-webhook
      filter:
        types:
          - kapro.promotionrun.failed
          - kapro.promotionrun.target.failed
        promotionrunSelector:
          matchLabels:
            environment: production
