apiVersion: kapro.io/v1alpha1
kind: PromotionPlan
metadata:
  name: checkout-cosign-keyless
spec:
  stages:
    - name: canary
      selector:
        matchLabels:
          kapro.io/tier: canary
      gate:
        mode: auto
        gate:
          verification:
            cosignPolicy:
              keyless:
                issuer: https://token.actions.githubusercontent.com
                subject: repo:example/checkout:ref:refs/heads/main
---
apiVersion: kapro.io/v1alpha1
kind: PromotionTrigger
metadata:
  name: checkout-oci-keyless
spec:
  suspended: true
  source:
    type: oci
    oci:
      repository: oci://registry.example.com/platform/checkout
      tagPattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
      requireSignature: true
      pollInterval: 5m
  promotionTemplate:
    kaproRef: checkout
    nameTemplate: "checkout-cosign"
    promotionPlans:
      - name: production
        promotionPlan: checkout-cosign-keyless
    suspended: true
    scope:
      targets:
        - checkout-canary-eu
    labels:
      kapro.io/team: checkout
      kapro.io/environment: prod
  cooldown: 30m
  maxActive: 1
  dryRun: true
