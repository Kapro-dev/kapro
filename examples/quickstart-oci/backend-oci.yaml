# Apply this before fleet.yaml and promotion.yaml. This Backend tells Kapro to
# use spoke-side OCI pull delivery.
apiVersion: kapro.io/v1alpha2
kind: Backend
metadata:
  name: oci
spec:
  driver: oci
  runtime: Spoke
  parameters:
    repository: ghcr.io/example/checkout/{appKey}
    tag: "{version}"
    auth: anonymous
