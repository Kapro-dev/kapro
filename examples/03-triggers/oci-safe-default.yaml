apiVersion: kapro.io/v1alpha1
kind: Trigger
metadata:
  name: checkout-oci
  labels:
    kapro.io/team: checkout
spec:
  suspended: true
  source:
    type: oci
    oci:
      repository: oci://registry.example.com/platform/checkout
      tagPattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
      requireSignature: true
      pollInterval: 5m
  promotionTemplate:
    deliveryUnitRef: checkout
    fleetRef: checkout
    plans:
      - name: production
        plan: checkout-production
    suspended: true
    scope:
      targets:
        - checkout-canary-eu
  cooldown: 30m
  maxActive: 1
  dryRun: true
