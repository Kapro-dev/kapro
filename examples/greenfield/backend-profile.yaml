# Greenfield BackendProfile: OCI Delivery Core (pull mode).
#
# The spoke kapro-cluster-controller pulls OCI bundles directly using the
# two-phase staging engine in internal/delivery. No Flux or Argo on the spoke.
#
# Parameters set here are defaults; FleetCluster.spec.delivery.parameters
# overrides per cluster (cluster wins on overlap).
apiVersion: kapro.io/v1alpha1
kind: BackendProfile
metadata:
  name: oci-greenfield
spec:
  driver: oci
  runtime: Spoke
  parameters:
    # Default repository — overridden per FleetCluster when stores pull from
    # a colocated mirror (e.g. harbor.de-store-01.local for air-gap-ish stores).
    ociRepository: oci://registry.example.com/kapro/checkout-bundle
    # Default artifact format. Auto-detected when omitted; explicit here so
    # operators see what the deployment expects.
    format: helm
    # Re-apply cadence for drift detection. Default in code is 10m; raise for
    # large fleets to reduce registry load.
    reapplyInterval: 30m
