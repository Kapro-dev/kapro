# Two-stage plan: canary first, then general fleet, gated by a manual
# approval. Stages select FleetClusters by label — the same plan works as the
# fleet grows.
apiVersion: kapro.io/v1alpha1
kind: PromotionPlan
metadata:
  name: checkout-greenfield
spec:
  stages:
    - name: canary
      selector:
        matchLabels:
          tier: canary
          env: prod
      strategy:
        maxConcurrent: 1
      gate:
        mode: auto
        gate:
          soakTime: 10m
          healthCheck: true
        onFailure: halt
    - name: general
      selector:
        matchLabels:
          tier: general
          env: prod
      dependsOn:
        - name: canary
          strategy: all
          requiredSoakTime: 5m
      strategy:
        maxConcurrent: 5
      gate:
        mode: manual
        approval:
          required: true
          approvers:
            - prod-release-managers
        onFailure: halt
