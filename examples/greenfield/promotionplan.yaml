# Two-stage plan: canary first, then general fleet, gated by a manual
# approval. Stages select FleetClusters by label — the same plan works as the
# fleet grows.
apiVersion: kapro.io/v1alpha1
kind: PromotionPlan
metadata:
  name: checkout-greenfield
  labels:
    # Required by the validating admission webhook (multi-tenancy ownership).
    kapro.io/team: checkout
spec:
  stages:
    - name: canary
      selector:
        matchLabels:
          tier: canary
          env: prod
      strategy:
        # Field is maxParallel, not maxConcurrent (StageStrategySpec).
        maxParallel: 1
      gate:
        mode: auto
        gate:
          soakTime: 10m
          healthCheck: true
        onFailure: halt
    - name: general
      selector:
        matchLabels:
          tier: general
          env: prod
      dependsOn:
        # StageDependency: the upstream key is `stage`, not `name`.
        - stage: canary
          strategy: all
          requiredSoakTime: 5m
      strategy:
        maxParallel: 5
      gate:
        mode: manual
        approval:
          required: true
          approvers:
            - prod-release-managers
        onFailure: halt
