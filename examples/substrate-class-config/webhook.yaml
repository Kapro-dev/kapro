apiVersion: kapro.io/v1alpha2
kind: SubstrateClass
metadata:
  name: webhook
  labels:
    kapro.io/family: platform
    kapro.io/ledger: external-api
spec:
  controllerName: kapro.io/webhook
  executionModes:
    default: hub-push
---
apiVersion: webhook.substrate.kapro.io/v1alpha1
kind: WebhookSubstrateConfig
metadata:
  name: internal-deployer
spec:
  endpoint: https://deploy.example.com/kapro
  method: POST
  credentialsRef:
    name: deployer-token
    namespace: kapro-system
---
apiVersion: kapro.io/v1alpha2
kind: Backend
metadata:
  name: internal-deployer
spec:
  classRef:
    name: webhook
  configRef:
    apiVersion: webhook.substrate.kapro.io/v1alpha1
    kind: WebhookSubstrateConfig
    name: internal-deployer
  execution:
    mode: hub-push
