apiVersion: kapro.io/v1alpha1
kind: Trigger
metadata:
  name: checkout-kind-trigger
  labels:
    kapro.io/team: checkout
spec:
  suspended: true
  source:
    type: oci
    oci:
      repository: oci://kind.local/kapro/checkout
      tagPattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+-kind$"
      requireSignature: false
      pollInterval: 1m
  promotionTemplate:
    deliveryUnitRef: checkout
    fleetRef: checkout
    nameTemplate: "checkout-kind"
    plans:
      - name: main
        plan: checkout-progressive-kind
    suspended: false
    timeout: 30m
    labels:
      kapro.io/team: checkout
      kapro.io/demo: kind
  cooldown: 1m
  maxActive: 1
  dryRun: true
