apiVersion: kapro.io/v1alpha1
kind: PromotionTrigger
metadata:
  name: checkout-kind-trigger
spec:
  suspended: true
  source:
    type: oci
    oci:
      repository: oci://kind.local/kapro/checkout
      tagPattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+-kind$"
      requireSignature: false
      pollInterval: 1m
  promotionTemplate:
    kaproRef: checkout
    nameTemplate: "checkout-kind"
    promotionPlans:
      - name: main
        promotionPlan: checkout-progressive-kind
    suspended: false
    timeout: 30m
    labels:
      kapro.io/demo: kind
  cooldown: 1m
  maxActive: 1
  dryRun: true
