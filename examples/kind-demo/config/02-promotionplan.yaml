apiVersion: kapro.io/v1alpha2
kind: PromotionPlan
metadata:
  name: checkout-progressive-kind
spec:
  stages:
    - name: canary
      selector:
        matchLabels:
          kapro.io/tier: canary
      gate:
        mode: auto
        gate:
          soakTime: 5s
    - name: prod
      selector:
        matchLabels:
          kapro.io/tier: production
      dependsOn:
        - stage: canary
          requiredSoakTime: 5s
          strategy: all
      strategy:
        maxParallel: 1
      gate:
        mode: manual
        approval:
          required: true
          approvers:
            - demo-sre
