apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: checkout-api-config
  namespace: flux-system
  labels:
    kapro.io/import: "true"
    team: checkout
    service: api
spec:
  interval: 1m
  url: https://github.com/example/checkout-api-config.git
  ref:
    tag: 1.4.2
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: checkout-web-config
  namespace: flux-system
  labels:
    kapro.io/import: "true"
    team: checkout
    service: web
spec:
  interval: 1m
  url: https://github.com/example/checkout-web-config.git
  ref:
    tag: 3.8.0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: checkout-api-canary
  namespace: flux-system
  labels:
    kapro.io/import: "true"
    team: checkout
    service: api
    kapro.io/tier: canary
spec:
  interval: 1m
  path: ./env/canary
  prune: true
  sourceRef:
    kind: GitRepository
    name: checkout-api-config
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: checkout-api-prod-eu
  namespace: flux-system
  labels:
    kapro.io/import: "true"
    team: checkout
    service: api
    kapro.io/tier: production
    region: eu
spec:
  interval: 1m
  path: ./env/prod-eu
  prune: true
  sourceRef:
    kind: GitRepository
    name: checkout-api-config
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkout-web-prod-us
  namespace: flux-system
  labels:
    kapro.io/import: "true"
    team: checkout
    service: web
    kapro.io/tier: production
    region: us
spec:
  interval: 1m
  chart:
    spec:
      chart: checkout-web
      version: 3.8.0
      sourceRef:
        kind: GitRepository
        name: checkout-web-config
        namespace: flux-system
