apiVersion: kapro.io/v1alpha1
kind: SubstrateClass
metadata:
  name: hello-world
spec:
  controllerName: example.com/hello-world
  executionModes:
    default: hub-push
---
apiVersion: kapro.io/v1alpha1
kind: Substrate
metadata:
  name: hello-world
spec:
  classRef:
    name: hello-world
  execution:
    mode: hub-push
  parameters:
    message: hello from kapro
