apiVersion: kapro.io/v1alpha2
kind: ClusterClassifier
metadata:
  name: gcp-pull-two-phase
spec:
  rules:
    - name: gcp-pull
      match:
        capabilities:
          cloud: gcp
          deliveryMode: pull
      labels:
        kapro.io/staging: two-phase
      delivery:
        staging:
          type: TwoPhase
          failurePolicy: Abort
---
apiVersion: kapro.io/v1alpha2
kind: Cluster
metadata:
  name: de-prod-01
  labels:
    kapro.io/cloud: gcp
    kapro.io/region: europe-west1
spec:
  delivery:
    mode: pull
    backendRef: oci
    staging:
      type: TwoPhase
      failurePolicy: Abort
  bootstrap:
    ttl: 1h
    materialSource:
      type: Vault
      vault:
        address: https://vault.example.com
        mount: secret
        path: kapro/bootstrap/de-prod-01
        kubeconfigField: kubeconfig
