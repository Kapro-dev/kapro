# Apply after substrates/flux.yaml, deliveryunit.yaml, and plan.yaml.
# These registry.example.com placeholders are fine for reading the hub API
# shape; replace them before expecting real spoke workload convergence.
apiVersion: kapro.io/v1alpha1
kind: Fleet
metadata:
  name: checkout
  labels:
    kapro.io/unit: checkout
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  delivery:
    mode: pull
    ref: flux
  clusters:
    - name: checkout-canary-eu
      labels:
        kapro.io/stage: canary
        kapro.io/region: eu
        kapro.io/quickstart: flux
    - name: checkout-production-eu
      labels:
        kapro.io/stage: production
        kapro.io/region: eu
        kapro.io/quickstart: flux
