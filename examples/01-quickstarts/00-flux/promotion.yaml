# records after this Promotion reconciles.
apiVersion: kapro.io/v1alpha1
kind: Promotion
metadata:
  name: checkout-v1-2-3
  labels:
    kapro.io/unit: checkout
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  unit: checkout
  fleet: checkout
  plan: checkout
  version: v1.2.3
  timeout: 30m
