apiVersion: kapro.io/v1alpha1
kind: DeliveryUnit
metadata:
  name: checkout
  labels:
    kapro.io/unit: checkout
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  defaultFleet: checkout
  defaultPlan: checkout
  source:
    substrate: flux
    registries:
      - name: app
        url: oci://registry.example.com/charts
        type: oci
    defaults:
      repo: app
      targetNamespace: checkout
    units:
      - name: checkout
        chartName: checkout
        version: 1.2.3
