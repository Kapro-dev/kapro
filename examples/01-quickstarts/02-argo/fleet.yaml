# Apply after substrates/argo.yaml, deliveryunit.yaml, and plan.yaml.
# This example expects Argo CD Applications named after each target cluster.
apiVersion: kapro.io/v1alpha1
kind: Fleet
metadata:
  name: checkout-argo
  labels:
    kapro.io/unit: checkout-argo
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  delivery:
    mode: push
    ref: argo
    parameters:
      namespace: argocd
  clusters:
    - name: checkout-argo-canary
      labels:
        kapro.io/stage: canary
        kapro.io/region: eu
        kapro.io/quickstart: argo
    - name: checkout-argo-production
      labels:
        kapro.io/stage: production
        kapro.io/region: eu
        kapro.io/quickstart: argo
