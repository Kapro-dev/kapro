apiVersion: kapro.io/v1alpha1
kind: DeliveryUnit
metadata:
  name: checkout-oci
  labels:
    kapro.io/unit: checkout-oci
    kapro.io/team: platform
    app.kubernetes.io/name: checkout
spec:
  defaultFleet: checkout-oci
  defaultPlan: checkout-oci
  source:
    substrate: oci
    registries:
      - name: app
        url: oci://ghcr.io/example/charts
        type: oci
    defaults:
      repo: app
      targetNamespace: checkout
    units:
      - name: checkout
        chartName: checkout
        version: 1.2.3
