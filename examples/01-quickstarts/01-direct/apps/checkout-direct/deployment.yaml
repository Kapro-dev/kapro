apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-direct
  namespace: default
  labels:
    app.kubernetes.io/name: checkout-direct
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-direct
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-direct
    spec:
      containers:
        - name: app
          image: ghcr.io/example/checkout-direct:0.1.0
          ports:
            - containerPort: 8080
