# Recommended Kapro RBAC split for a shared hub cluster.
#
# Bind these ClusterRoles to identity-provider groups with ClusterRoleBinding.
# Keep Secret management in platform namespaces and bind the Secret Role only
# where the referenced Secrets live.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-platform-admin
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - agentpolicies
      - promotionsources
      - kaproes
      - fleetclusters
      - promotionplans
      - pluginregistrations
      - promotionruns
      - promotiontriggers
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - approvals
      - promotiontargets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - agentpolicies/status
      - approvals/status
      - kaproes/status
      - fleetclusters/status
      - pluginregistrations/status
      - promotionruns/status
      - promotiontargets/status
      - promotiontriggers/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-promotionrun-engineer
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - promotionsources
      - fleetclusters
      - promotionplans
      - promotionruns
      - promotiontargets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - promotionruns
    verbs: ["create", "delete", "patch", "update"]
  - apiGroups: ["kapro.io"]
    resources:
      - promotionruns/status
      - promotiontargets/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-promotion-trigger-admin
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - promotionsources
      - fleetclusters
      - promotionplans
      - promotionruns
      - promotiontriggers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - promotiontriggers
    verbs: ["create", "delete", "patch", "update"]
  - apiGroups: ["kapro.io"]
    resources:
      - promotionruns/status
      - promotiontargets/status
      - promotiontriggers/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-approver
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - approvals
      - promotionsources
      - fleetclusters
      - promotionplans
      - promotionruns
      - promotiontargets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - approvals
    verbs: ["create"]
  - apiGroups: ["kapro.io"]
    resources:
      - approvals/status
      - promotionruns/status
      - promotiontargets/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-auditor
rules:
  - apiGroups: ["kapro.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kapro-secret-reference-manager
  namespace: kapro-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
