# Recommended Kapro RBAC split for a shared hub cluster.
#
# Bind these ClusterRoles to identity-provider groups with ClusterRoleBinding.
# Runtime objects are intentionally read-only for humans; controllers own writes
# to runtime.kapro.io.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-platform-admin
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - substratediscoverypolicies
      - approvals
      - clusters
      - clustertemplates
      - fleets
      - plans
      - plugins
      - policies
      - promotions
      - sources
      - substrateclasses
      - substrates
      - triggers
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - substratediscoverypolicies/status
      - approvals/status
      - clusters/status
      - clustertemplates/status
      - fleets/status
      - plugins/status
      - policies/status
      - promotions/status
      - substrateclasses/status
      - substrates/status
      - triggers/status
    verbs: ["get", "list", "watch"]
  - apiGroups: ["runtime.kapro.io"]
    resources:
      - decisiontraces
      - promotionruns
      - targets
      - decisiontraces/status
      - promotionruns/status
      - targets/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-promotion-engineer
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - clusters
      - plans
      - promotions
      - sources
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - promotions
    verbs: ["create", "delete", "patch", "update"]
  - apiGroups: ["runtime.kapro.io"]
    resources:
      - decisiontraces
      - promotionruns
      - targets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-approver
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - approvals
      - clusters
      - plans
      - promotions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kapro.io"]
    resources:
      - approvals
    verbs: ["create"]
  - apiGroups: ["runtime.kapro.io"]
    resources:
      - promotionruns
      - targets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kapro-auditor
rules:
  - apiGroups: ["kapro.io"]
    resources:
      - substratediscoverypolicies
      - approvals
      - clusters
      - clustertemplates
      - fleets
      - plans
      - plugins
      - policies
      - promotions
      - sources
      - substrateclasses
      - substrates
      - triggers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["runtime.kapro.io"]
    resources:
      - decisiontraces
      - promotionruns
      - targets
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kapro-secret-reference-manager
  namespace: kapro-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
