# drift-guarded-prod
# ------------------
# Prod promotes only when the fleet-level drift report is fresh and inside the
# configured zero-drift budget. Create the FleetDriftReport first and enable
# the fleetdriftreport controller.
apiVersion: kapro.io/v1alpha2
kind: Plan
metadata:
  name: drift-guarded-prod
spec:
  stages:
    - name: canary
      selector:
        matchLabels:
          kapro.io/tier: canary
      gate:
        mode: auto
        gate:
          soakTime: 10m
    - name: prod
      selector:
        matchLabels:
          kapro.io/tier: production
      dependsOn:
        - stage: canary
          requiredSoakTime: 10m
          strategy: all
      gate:
        mode: auto
        gate:
          templates:
            - name: prod-drift-budget
              type: max-drift
              args:
                - name: reportRef
                  value: checkout-prod
                - name: maxDriftedTargets
                  value: "0"
                - name: maxDriftedBackendObjects
                  value: "0"
                - name: maxPendingTargets
                  value: "0"
                - name: maxFailedTargets
                  value: "0"
                - name: maxUnknownTargets
                  value: "0"
                - name: maxAge
                  value: 10m
