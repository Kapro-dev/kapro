apiVersion: kapro.io/v1alpha1
kind: Fleet
metadata:
  name: checkout-direct
  labels:
    kapro.io/unit: checkout-direct
    kapro.io/team: platform
spec:
  substrate:
    mode: push
    substrateRef: direct
    parameters:
      deployment: checkout-direct
      container: app
      manifestPath: apps/checkout-direct
      namespace: default
  clusters:
    - name: canary-eu
      labels:
        kapro.io/stage: canary
    - name: prod-eu
      labels:
        kapro.io/stage: production
