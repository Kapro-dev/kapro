apiVersion: kapro.io/v1alpha1
kind: SubstrateClass
metadata:
  name: oci
  labels:
    kapro.io/family: artifact
    kapro.io/ledger: oci-registry
spec:
  controllerName: kapro.io/oci
  executionModes:
    default: spoke-pull
---
apiVersion: oci.substrate.kapro.io/v1alpha1
kind: OCIBundleApplyConfig
metadata:
  name: prod-oci
spec:
  serverSideApply: true
  fieldManager: kapro
  registryCredentialsRef:
    name: prod-registry
    namespace: kapro-system
---
apiVersion: kapro.io/v1alpha1
kind: Substrate
metadata:
  name: prod-oci
spec:
  classRef:
    name: oci
  configRef:
    apiVersion: oci.substrate.kapro.io/v1alpha1
    kind: OCIBundleApplyConfig
    name: prod-oci
  execution:
    mode: spoke-pull
