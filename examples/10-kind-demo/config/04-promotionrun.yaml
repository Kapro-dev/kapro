# Compatibility/demo shortcut: this authors a PromotionRun directly so the Kind
# demo can exercise runtime controllers in isolation. Most users should author a
# Promotion and let the controller create PromotionRun attempts.
apiVersion: runtime.kapro.io/v1alpha1
kind: PromotionRun
metadata:
  name: checkout-kind
  labels:
    kapro.io/team: checkout
    kapro.io/unit: checkout
    kapro.io/demo: kind
spec:
  unit: checkout
  fleet: checkout
  version: v1.2.3-kind
  plans:
    - name: main
      plan: checkout-progressive-kind
  suspended: false
  timeout: 30m
