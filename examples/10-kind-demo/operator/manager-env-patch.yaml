apiVersion: apps/v1
kind: Deployment
metadata:
  name: kapro-operator
  namespace: kapro-system
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
            - name: KAPRO_CONTROLLERS
              value: fleet,plan,promotion,promotionrun,cluster,approval,plugin,trigger
            - name: KAPRO_APPROVAL_SECRET
              value: kind-demo-approval-secret
