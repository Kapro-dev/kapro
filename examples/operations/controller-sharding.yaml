# Example: label Releases for controller sharding.
#
# Shard workers run the high-cardinality controllers only:
#
#   KAPRO_CONTROLLERS=release,release-target
#   KAPRO_SHARD=shard-a
#
# Each active shard manager must use an independent leader-election identity.
# The singleton manager runs non-shard-aware controllers:
#
#   KAPRO_CONTROLLERS=approval,kapro,plugin-registration,release-trigger
#
# Apply the shard label when the Release is created so the correct shard sees
# the first watch event.
---
apiVersion: kapro.io/v1alpha1
kind: Release
metadata:
  name: checkout-v1-2-3-shard-a
  labels:
    kapro.io/shard: shard-a
spec:
  appRef:
    name: checkout
  version: 1.2.3
  pipelines:
    - name: checkout-progressive
---
apiVersion: kapro.io/v1alpha1
kind: Release
metadata:
  name: checkout-v1-2-3-shard-b
  labels:
    kapro.io/shard: shard-b
spec:
  appRef:
    name: checkout
  version: 1.2.3
  pipelines:
    - name: checkout-progressive
