syntax = "proto3";

package kapro.kpi.v1alpha1;

option go_package = "kapro.io/kapro/spec/kpi/v1alpha1;kpiv1alpha1";

// PlannerService is the Kapro Planner Interface (KPI).
//
// A planner plugin filters and orders eligible targets before Kapro binds
// PromotionTarget objects. Kapro owns promotion_run state, retries, failure policy, and
// binding. Planner plugins only return planning decisions.
service PlannerService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc Plan(PlanRequest) returns (PlanResponse);
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  string contract_version = 1;
  string plugin_version = 2;
  repeated string capabilities = 3;
}

message PlanRequest {
  string promotion_run = 1;
  string promotion_plan = 2;
  string stage = 3;
  string version = 4;
  StageStrategy strategy = 5;
  repeated Target targets = 6;
  map<string, string> parameters = 7;
}

message StageStrategy {
  int32 max_parallel = 1;
  int32 max_unavailable = 2;
}

message Target {
  string name = 1;
  map<string, string> labels = 2;
  bool ready = 3;
  string active_promotion_run = 4;
}

message PlanResponse {
  repeated PlannedTarget targets = 1;
}

message PlannedTarget {
  string name = 1;
  PlanningDecision decision = 2;
  int64 score = 3;
  string reason = 4;
  string message = 5;
}

enum PlanningDecision {
  PLANNING_DECISION_UNSPECIFIED = 0;
  PLANNING_DECISION_INCLUDE = 1;
  PLANNING_DECISION_SKIP = 2;
  PLANNING_DECISION_DEFER = 3;
}
