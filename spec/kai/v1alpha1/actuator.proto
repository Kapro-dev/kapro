syntax = "proto3";

package kapro.kai.v1alpha1;

option go_package = "kapro.io/kapro/spec/kai/v1alpha1;kaiv1alpha1";

// ActuatorService is the Kapro Actuator Interface (KAI).
//
// An actuator applies one artifact version to one target and reports backend
// convergence. Kapro owns promotion_run ordering, retries, rollback intent, and
// status; the actuator owns backend-specific mutation and readiness checks.
service ActuatorService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  rpc IsConverged(IsConvergedRequest) returns (IsConvergedResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  string contract_version = 1;
  string plugin_version = 2;
  repeated string capabilities = 3;
}

message ApplyRequest {
  string promotion_run = 1;
  string target = 2;
  string promotion_plan = 3;
  string stage = 4;
  string version = 5;
  string previous_version = 6;
  map<string, string> parameters = 7;
}

message ApplyResponse {
  bool accepted = 1;
  string message = 2;
}

message IsConvergedRequest {
  string promotion_run = 1;
  string target = 2;
  string version = 3;
  map<string, string> parameters = 4;
}

message IsConvergedResponse {
  bool converged = 1;
  string message = 2;
}

message RollbackRequest {
  string promotion_run = 1;
  string target = 2;
  string version = 3;
  string previous_version = 4;
  map<string, string> parameters = 5;
}

message RollbackResponse {
  bool accepted = 1;
  string message = 2;
}
