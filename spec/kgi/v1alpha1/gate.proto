syntax = "proto3";

package kapro.kgi.v1alpha1;

option go_package = "kapro.io/kapro/spec/kgi/v1alpha1;kgiv1alpha1";

// GateService is the Kapro Gate Interface (KGI).
//
// A gate evaluates whether one target may advance. Kapro owns timing, retries,
// failure policy, and persisted status; the gate owns the safety decision.
service GateService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  string contract_version = 1;
  string plugin_version = 2;
  repeated string capabilities = 3;
}

message EvaluateRequest {
  string release = 1;
  string target = 2;
  string pipeline = 3;
  string stage = 4;
  string version = 5;
  string gate = 6;
  map<string, string> parameters = 7;
}

message EvaluateResponse {
  GatePhase phase = 1;
  string message = 2;
  repeated GateEvidence evidence = 3;
}

message GateEvidence {
  string type = 1;
  string provider = 2;
  string analysis_mode = 3;
  string comparator = 4;
  string query = 5;
  string baseline_query = 6;
  string baseline_health_query = 7;
  string window = 8;
  string interval = 9;
  string observed_value = 10;
  string threshold = 11;
  string baseline_value = 12;
  optional bool baseline_healthy = 13;
  int64 sample_count = 14;
  optional double confidence = 15;
  optional double alpha = 16;
  optional double p_value = 17;
  string effect_size = 18;
  optional double score = 19;
  string decision_rule = 20;
  string reason = 21;
  GateProjection projection = 22;
}

message GateProjection {
  string horizon = 1;
  string value = 2;
  string reason = 3;
}

enum GatePhase {
  GATE_PHASE_UNSPECIFIED = 0;
  GATE_PHASE_PASSED = 1;
  GATE_PHASE_FAILED = 2;
  GATE_PHASE_RUNNING = 3;
  GATE_PHASE_INCONCLUSIVE = 4;
}
